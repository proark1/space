<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SIGNAL LOST — the derelict (exterior)</title>
<style>
  html,body{margin:0;height:100%;background:#02030a;overflow:hidden}
  #c{width:100vw;height:100vh;display:block;image-rendering:pixelated}
  #hud{position:fixed;left:14px;bottom:12px;font:11px ui-monospace,Menlo,monospace;color:#7a8794;pointer-events:none}
  #hud b{color:#E8A33D}
  #nav{position:fixed;right:14px;top:12px;font:12px ui-monospace,monospace}
  #nav a{color:#9fd0ff;text-decoration:none;background:rgba(8,12,18,.7);border:1px solid #20303c;border-radius:6px;padding:6px 10px}
  #title{position:fixed;left:14px;top:12px;font:600 13px ui-monospace,monospace;letter-spacing:3px;color:#E8A33D;pointer-events:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="title">SIGNAL&nbsp;LOST · THE DERELICT</div>
<div id="nav"><a href="/">▸ enter the ship</a></div>
<div id="hud"><b>drag</b> to orbit · <b>scroll</b> to zoom · the lone capsule shows the scale</div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';

const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:false,powerPreference:'high-performance'});
renderer.setPixelRatio(1); renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.15;

const scene=new THREE.Scene(); scene.background=new THREE.Color(0x03040a);
scene.fog=new THREE.FogExp2(0x05060f,0.0016);
const camera=new THREE.PerspectiveCamera(55,1,0.5,4000); camera.position.set(46,20,92);

// ---- post (same PS1 grade as the game) ----
const INTERNAL=0.55;
const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
const bloom=new UnrealBloomPass(new THREE.Vector2(1,1),0.9,0.6,0.55); composer.addPass(bloom);
composer.addPass(new OutputPass());
const Grade=new ShaderPass({
 uniforms:{tDiffuse:{value:null},uTime:{value:0},uRes:{value:new THREE.Vector2(1,1)}},
 vertexShader:`varying vec2 vUv; void main(){vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
 fragmentShader:`varying vec2 vUv; uniform sampler2D tDiffuse; uniform float uTime; uniform vec2 uRes;
  float bayer(vec2 p){int i=int(mod(p.x,4.0))+int(mod(p.y,4.0))*4; float m[16]; m[0]=0.;m[1]=8.;m[2]=2.;m[3]=10.;m[4]=12.;m[5]=4.;m[6]=14.;m[7]=6.;m[8]=3.;m[9]=11.;m[10]=1.;m[11]=9.;m[12]=15.;m[13]=7.;m[14]=13.;m[15]=5.; float v=0.; for(int k=0;k<16;k++){if(k==i)v=m[k];} return v/16.0-0.5;}
  float rnd(vec2 p){return fract(sin(dot(p,vec2(12.9898,78.233)))*43758.5);}
  void main(){vec2 uv=vUv,d=uv-0.5; uv+=d*dot(d,d)*0.04; float ca=0.001+dot(d,d)*0.01;
   vec3 col; col.r=texture2D(tDiffuse,uv+d*ca).r; col.g=texture2D(tDiffuse,uv).g; col.b=texture2D(tDiffuse,uv-d*ca).b;
   float lv=26.0; col=floor(col*lv+bayer(gl_FragCoord.xy))/lv;
   col*=0.94+0.06*sin(gl_FragCoord.y*3.14159); col+=(rnd(uv*uRes+uTime)-0.5)*0.03;
   col*=mix(0.3,1.0,smoothstep(1.05,0.2,length(d))); gl_FragColor=vec4(max(col,0.0),1.0);} `
});
composer.addPass(Grade);
function resize(){const w=innerWidth,h=innerHeight,lw=Math.max(2,Math.floor(w*INTERNAL)),lh=Math.max(2,Math.floor(h*INTERNAL));
 renderer.setSize(lw,lh,false); composer.setSize(lw,lh); bloom.setSize(lw,lh); Grade.uniforms.uRes.value.set(lw,lh);
 camera.aspect=w/h; camera.updateProjectionMatrix();}

const controls=new OrbitControls(camera,canvas);
controls.enableDamping=true; controls.dampingFactor=0.06; controls.autoRotate=true; controls.autoRotateSpeed=0.45;
controls.minDistance=40; controls.maxDistance=320; controls.target.set(0,1,0);

// ---- lights ----
scene.add(new THREE.AmbientLight(0x223044,0.35));
const sun=new THREE.DirectionalLight(0xfff1d8,3.1); sun.position.set(420,230,-260); sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048); sun.shadow.camera.near=200; sun.shadow.camera.far=1200;
sun.shadow.camera.left=-70; sun.shadow.camera.right=70; sun.shadow.camera.top=70; sun.shadow.camera.bottom=-70; sun.shadow.bias=-0.0004;
scene.add(sun);
const rim=new THREE.DirectionalLight(0x3a5a8a,0.9); rim.position.set(-300,-80,200); scene.add(rim);

// ---- starfield ----
{ const N=3600,p=new Float32Array(N*3),col=new Float32Array(N*3);
  for(let i=0;i<N;i++){ const v=new THREE.Vector3().randomDirection().multiplyScalar(1400+Math.random()*900);
    p[i*3]=v.x;p[i*3+1]=v.y;p[i*3+2]=v.z; const c=Math.random(); const r=0.7+Math.random()*0.3;
    col[i*3]=r; col[i*3+1]=r*(0.8+c*0.2); col[i*3+2]=r*(0.85+c*0.15); }
  const g=new THREE.BufferGeometry(); g.setAttribute('position',new THREE.BufferAttribute(p,3)); g.setAttribute('color',new THREE.BufferAttribute(col,3));
  scene.add(new THREE.Points(g,new THREE.PointsMaterial({size:2.2,sizeAttenuation:false,vertexColors:true,transparent:true,opacity:0.9}))); }

// ---- distant sun disc ----
{ const s=new THREE.Mesh(new THREE.SphereGeometry(26,16,16),new THREE.MeshBasicMaterial({color:0xffe8c0,fog:false}));
  s.position.copy(sun.position).multiplyScalar(2.0); scene.add(s); }

// ---- planet (Earth, for scale + the launch fiction) ----
function tex(draw,w=512,h=256){const c=document.createElement('canvas');c.width=w;c.height=h;draw(c.getContext('2d'));const t=new THREE.CanvasTexture(c);t.colorSpace=THREE.SRGBColorSpace;return t;}
const planetTex=tex(x=>{ x.fillStyle='#0b3a6b'; x.fillRect(0,0,512,256);
  for(let i=0;i<26;i++){ x.fillStyle=['#2e6b34','#3a7a3e','#5d6b39','#7a6b40'][i%4]; x.beginPath(); x.ellipse(Math.random()*512,30+Math.random()*196,24+Math.random()*80,16+Math.random()*48,Math.random()*6,0,7); x.fill(); }
  x.fillStyle='#e6eef4'; x.fillRect(0,0,512,14); x.fillRect(0,242,512,14);
  x.globalAlpha=0.5; x.fillStyle='#fff'; for(let i=0;i<44;i++){ x.beginPath(); x.ellipse(Math.random()*512,Math.random()*256,12+Math.random()*46,6+Math.random()*14,0,0,7); x.fill(); } x.globalAlpha=1; });
const planet=new THREE.Mesh(new THREE.SphereGeometry(150,40,40),new THREE.MeshStandardMaterial({map:planetTex,roughness:1,metalness:0}));
planet.position.set(-300,-150,-560); scene.add(planet);
const atmo=new THREE.Mesh(new THREE.SphereGeometry(162,40,40),new THREE.MeshBasicMaterial({color:0x5a9bd8,transparent:true,opacity:0.16,side:THREE.BackSide,fog:false}));
atmo.position.copy(planet.position); scene.add(atmo);

// ---- materials (low-poly, flat-shaded, grimy — same family as the interior) ----
const grime=tex(x=>{ x.fillStyle='#8a8a86'; x.fillRect(0,0,256,256);
  for(let i=0;i<3000;i++){ const v=(Math.random()*70-35)|0; x.fillStyle=`rgba(${128+v},${128+v},${128+v},${Math.random()*0.5})`; const s=Math.random()*3+1; x.fillRect(Math.random()*256,Math.random()*256,s,s);}
  for(let i=0;i<22;i++){ x.strokeStyle=`rgba(20,18,14,${Math.random()*0.5})`; x.beginPath(); x.moveTo(Math.random()*256,0); x.lineTo(Math.random()*256+40,256); x.stroke(); } },256,256);
grime.wrapS=grime.wrapT=THREE.RepeatWrapping; grime.repeat.set(3,3);
const M={
  hull: new THREE.MeshStandardMaterial({color:0x4a525c, map:grime, roughness:0.85, metalness:0.35, flatShading:true}),
  dark: new THREE.MeshStandardMaterial({color:0x2a3038, map:grime, roughness:0.9, metalness:0.4, flatShading:true}),
  rust: new THREE.MeshStandardMaterial({color:0x6a4630, map:grime, roughness:0.95, metalness:0.2, flatShading:true}),
  metal:new THREE.MeshStandardMaterial({color:0x6b7480, roughness:0.4, metalness:0.7, flatShading:true}),
  amber:new THREE.MeshStandardMaterial({color:0x180f04, emissive:0xE8A33D, emissiveIntensity:2.2, roughness:1}),
  cyan: new THREE.MeshStandardMaterial({color:0x05131a, emissive:0x7fd0ff, emissiveIntensity:1.6, roughness:1}),
  engine:new THREE.MeshStandardMaterial({color:0x031314, emissive:0x36e0d0, emissiveIntensity:3.4, roughness:1}),
};

const ship=new THREE.Group(); scene.add(ship);
function b(w,h,d,m,x,y,z,rx=0,ry=0,rz=0){const o=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),m);o.position.set(x,y,z);o.rotation.set(rx,ry,rz);o.castShadow=o.receiveShadow=true;ship.add(o);return o;}
function cy(r1,r2,h,m,x,y,z,rx=0,rz=0,seg=10){const o=new THREE.Mesh(new THREE.CylinderGeometry(r1,r2,h,seg),m);o.position.set(x,y,z);o.rotation.set(rx,0,rz);o.castShadow=o.receiveShadow=true;ship.add(o);return o;}

// hull spine
b(9,7,52, M.hull, 0,0,0);
b(7.5,5.5,12, M.hull, 0,0,-30);            // forward hull
b(5.5,4.2,8, M.dark, 0,0.2,-37);           // nose
b(2.4,2.4,5, M.metal, 0,0.4,-41.5);        // forward sensor mast
// bridge / command tower
b(7,3.4,7, M.dark, 0,4.6,-20);
b(5.2,2,5.2, M.hull, 0,6.6,-20);
const bridgeWin=b(5.4,1.2,5.4, M.amber, 0,6.4,-19.6);
// engine block + nozzles
b(12,10,9, M.dark, 0,0,28);
b(13.5,2,11, M.metal, 0,5.4,28);
const flicker=[];
[[-3,-2.6],[3,-2.6],[-3,2.6],[3,2.6]].forEach(([ex,ey])=>{
  cy(1.9,2.2,3.5, M.metal, ex,ey,33.6, Math.PI/2,0,12);
  const glow=cy(1.5,0.4,1.2, M.engine, ex,ey,35.6, Math.PI/2,0,12); flicker.push({m:glow,base:3.4,seed:Math.random()*9});
});
const eLight=new THREE.PointLight(0x36e0d0,40,60,2); eLight.position.set(0,0,38); ship.add(eLight);
// side cargo pods
for(let z=-16; z<=18; z+=8.5){ b(3.2,4.5,7, M.hull, 5.6,0,z); b(3.2,4.5,7, M.hull, -5.6,0,z); b(3.4,1,7, M.rust,5.6,2.6,z); }
// radiator wings
b(22,0.4,12, M.metal, 13,7,22, 0,0,-0.5); b(22,0.4,12, M.metal, -13,7,22, 0,0,0.5);
for(let i=-4;i<5;i++){ b(0.3,0.5,12,M.dark, 13+i*2.0,7+i*1.0,22,0,0,-0.5); }
// antennae + comms dish
cy(0.18,0.18,9,M.metal,2.5,5,-8,0,0.2); cy(0.14,0.14,7,M.metal,-2.2,5,2,0,-0.2);
cy(0.3,0.3,2,M.metal,0,7.6,4); const dish=new THREE.Mesh(new THREE.ConeGeometry(2.4,1.2,14,1,true),M.metal); dish.position.set(0,9,4); dish.rotation.x=Math.PI; dish.castShadow=true; ship.add(dish);
// greeble (chunky panels for scale + detail)
for(let i=0;i<70;i++){ const s=0.5+Math.random()*1.6; const side=Math.floor(Math.random()*3);
  let x,y,z=-24+Math.random()*52;
  if(side===0){ y=3.6+Math.random()*0.3; x=(Math.random()-0.5)*8; } else if(side===1){ x=4.6; y=(Math.random()-0.5)*6; } else { x=-4.6; y=(Math.random()-0.5)*6; }
  b(s,s*0.5,s*(0.6+Math.random()), Math.random()>0.8?M.rust:M.dark, x,y,z); }
// window grid (rows of lit ports along the hull) + a few flicker
for(let z=-24; z<=22; z+=3){ for(const yy of [1.6,-0.2,-1.8]){
  const lit=Math.random()>0.32; const wL=b(0.15,0.7,1.4, lit?M.amber.clone():M.dark, 4.55,yy,z); const wR=b(0.15,0.7,1.4, lit?M.amber.clone():M.dark, -4.55,yy,z);
  if(lit && Math.random()>0.8){ flicker.push({m:wL,base:2.2,seed:Math.random()*9}); } }}
// running lights
const rl=(c,x,y,z)=>{ const m=new THREE.Mesh(new THREE.SphereGeometry(0.35,8,8),new THREE.MeshStandardMaterial({color:0,emissive:c,emissiveIntensity:4,roughness:1})); m.position.set(x,y,z); ship.add(m); return m; };
rl(0xff3030,-5,0,-30); rl(0x30ff60,5,0,-30); const beacon=rl(0xffffff,0,7.4,0);
// hull breach (the derelict's wound)
b(4,3.2,0.6, new THREE.MeshBasicMaterial({color:0x000000}), 4.7,0.5,-4);
for(let i=0;i<7;i++){ b(0.2,0.2,1+Math.random()*2, M.metal, 4.6,(Math.random()-0.5)*2.6,-4+(Math.random()-0.5)*3, Math.random(),Math.random(),Math.random()); }
ship.rotation.y=-0.5;

// ---- the lone capsule (scale cue) ----
const cap=new THREE.Group();
const capMat=new THREE.MeshStandardMaterial({color:0xb6b2a6,roughness:0.5,metalness:0.4,flatShading:true});
const cone=new THREE.Mesh(new THREE.ConeGeometry(1,2.2,10),capMat); cone.rotation.x=Math.PI/2; cone.position.z=-0.6; cap.add(cone);
const body=new THREE.Mesh(new THREE.CylinderGeometry(1,1.1,1.6,10),capMat); body.rotation.x=Math.PI/2; body.position.z=0.9; cap.add(body);
const cwin=new THREE.Mesh(new THREE.SphereGeometry(0.5,10,10),new THREE.MeshStandardMaterial({color:0,emissive:0x9fd0ff,emissiveIntensity:1.4})); cwin.position.set(0,0.5,-0.3); cap.add(cwin);
cap.traverse(o=>{o.castShadow=true;}); cap.scale.setScalar(1.0); cap.position.set(-26,-6,-20); scene.add(cap);

// ---- loop ----
const clock=new THREE.Clock();
function animate(){ requestAnimationFrame(animate); const dt=clock.getDelta(), t=clock.elapsedTime;
  controls.update();
  ship.position.y=Math.sin(t*0.25)*0.6; ship.rotation.z=Math.sin(t*0.18)*0.02;       // slow drift
  cap.position.x=-26+Math.sin(t*0.2)*1.5; cap.position.y=-6+Math.cos(t*0.18)*1.0; cap.rotation.z=t*0.1; cap.lookAt(ship.position);
  for(const f of flicker){ const n=Math.sin(t*18+f.seed)*0.5+0.5; const drop=(Math.sin(t*2.6+f.seed)>0.86)?0.1:1.0; f.m.material.emissiveIntensity=f.base*(0.4+0.6*n)*drop; }
  beacon.material.emissiveIntensity=(Math.sin(t*3)>0.7)?6:0.3; eLight.intensity=36+Math.sin(t*5)*6;
  planet.rotation.y+=dt*0.006;
  Grade.uniforms.uTime.value=t; composer.render();
}
addEventListener('resize',resize); resize(); animate();
</script>
</body>
</html>
