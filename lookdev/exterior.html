<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SIGNAL LOST — the derelict (exterior)</title>
<style>
  html,body{margin:0;height:100%;background:#04060e;overflow:hidden}
  #c{width:100vw;height:100vh;display:block;image-rendering:pixelated}
  #hud{position:fixed;left:14px;bottom:12px;font:11px ui-monospace,Menlo,monospace;color:#8a97a4;pointer-events:none}
  #hud b{color:#E8A33D}
  #nav{position:fixed;right:14px;top:12px;font:12px ui-monospace,monospace}
  #nav a{color:#9fd0ff;text-decoration:none;background:rgba(8,12,18,.7);border:1px solid #20303c;border-radius:6px;padding:6px 10px}
  #title{position:fixed;left:14px;top:12px;font:600 13px ui-monospace,monospace;letter-spacing:3px;color:#E8A33D;pointer-events:none}
  #cap{position:fixed;left:50%;bottom:34px;transform:translateX(-50%);font:11px ui-monospace,monospace;color:#9fd0ff;pointer-events:none;opacity:0;transition:opacity .4s}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="title">SIGNAL&nbsp;LOST · THE DERELICT</div>
<div id="nav"><a href="/">▸ enter the ship</a></div>
<div id="hud"><b>drag</b> to orbit · <b>scroll</b> to zoom · watch the capsule dock at the bay</div>
<div id="cap">▸ DOCKING</div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';

const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:false,powerPreference:'high-performance'});
renderer.setPixelRatio(1); renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.5;

const scene=new THREE.Scene(); scene.background=new THREE.Color(0x05070f);
scene.fog=new THREE.FogExp2(0x070a14,0.0006);
const camera=new THREE.PerspectiveCamera(55,1,0.5,5000); camera.position.set(52,16,40);

// ---- post (PS1 grade, softened so the hull reads clearly) ----
const INTERNAL=0.6;
const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
const bloom=new UnrealBloomPass(new THREE.Vector2(1,1),0.5,0.5,0.72); composer.addPass(bloom);   // gentler + higher threshold = no blow-out blobs
composer.addPass(new OutputPass());
const Grade=new ShaderPass({
 uniforms:{tDiffuse:{value:null},uTime:{value:0},uRes:{value:new THREE.Vector2(1,1)}},
 vertexShader:`varying vec2 vUv; void main(){vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
 fragmentShader:`varying vec2 vUv; uniform sampler2D tDiffuse; uniform float uTime; uniform vec2 uRes;
  float bayer(vec2 p){int i=int(mod(p.x,4.0))+int(mod(p.y,4.0))*4; float m[16]; m[0]=0.;m[1]=8.;m[2]=2.;m[3]=10.;m[4]=12.;m[5]=4.;m[6]=14.;m[7]=6.;m[8]=3.;m[9]=11.;m[10]=1.;m[11]=9.;m[12]=15.;m[13]=7.;m[14]=13.;m[15]=5.; float v=0.; for(int k=0;k<16;k++){if(k==i)v=m[k];} return v/16.0-0.5;}
  float rnd(vec2 p){return fract(sin(dot(p,vec2(12.9898,78.233)))*43758.5);}
  void main(){vec2 uv=vUv,d=uv-0.5; float ca=0.0008+dot(d,d)*0.006;
   vec3 col; col.r=texture2D(tDiffuse,uv+d*ca).r; col.g=texture2D(tDiffuse,uv).g; col.b=texture2D(tDiffuse,uv-d*ca).b;
   float lv=28.0; col=floor(col*lv+bayer(gl_FragCoord.xy))/lv;
   col*=0.965+0.035*sin(gl_FragCoord.y*3.14159); col+=(rnd(uv*uRes+uTime)-0.5)*0.022;
   col*=mix(0.62,1.0,smoothstep(1.1,0.15,length(d))); gl_FragColor=vec4(max(col,0.0),1.0);} `
});
composer.addPass(Grade);
function resize(){const w=innerWidth,h=innerHeight,lw=Math.max(2,Math.floor(w*INTERNAL)),lh=Math.max(2,Math.floor(h*INTERNAL));
 renderer.setSize(lw,lh,false); composer.setSize(lw,lh); bloom.setSize(lw,lh); Grade.uniforms.uRes.value.set(lw,lh);
 camera.aspect=w/h; camera.updateProjectionMatrix();}

const controls=new OrbitControls(camera,canvas);
controls.enableDamping=true; controls.dampingFactor=0.06; controls.autoRotate=false;
controls.minDistance=24; controls.maxDistance=320; controls.target.set(2,1,-10);

// ---- lights (bright enough to clearly read the hull) ----
scene.add(new THREE.AmbientLight(0x3a4a60,0.9));
scene.add(new THREE.HemisphereLight(0x44607e,0x0c1018,0.7));
const sun=new THREE.DirectionalLight(0xfff0d6,3.4); sun.position.set(240,200,210); sun.castShadow=true; // behind camera → lights the side we see
sun.shadow.mapSize.set(2048,2048); sun.shadow.camera.near=120; sun.shadow.camera.far=900;
sun.shadow.camera.left=-70; sun.shadow.camera.right=70; sun.shadow.camera.top=70; sun.shadow.camera.bottom=-70; sun.shadow.bias=-0.0004;
scene.add(sun);
const fill=new THREE.DirectionalLight(0x6f8bb0,0.8); fill.position.set(-160,40,120); scene.add(fill); // soft fill on the shadow side

// ---- starfield ----
{ const N=3200,p=new Float32Array(N*3),col=new Float32Array(N*3);
  for(let i=0;i<N;i++){ const v=new THREE.Vector3().randomDirection().multiplyScalar(1500+Math.random()*900);
    p[i*3]=v.x;p[i*3+1]=v.y;p[i*3+2]=v.z; const c=Math.random(),r=0.65+Math.random()*0.35; col[i*3]=r;col[i*3+1]=r*(0.82+c*0.18);col[i*3+2]=r*(0.88+c*0.12); }
  const g=new THREE.BufferGeometry(); g.setAttribute('position',new THREE.BufferAttribute(p,3)); g.setAttribute('color',new THREE.BufferAttribute(col,3));
  scene.add(new THREE.Points(g,new THREE.PointsMaterial({size:2,sizeAttenuation:false,vertexColors:true,transparent:true,opacity:0.85}))); }
{ const s=new THREE.Mesh(new THREE.SphereGeometry(30,16,16),new THREE.MeshBasicMaterial({color:0xffe9c4,fog:false})); s.position.set(560,470,490); scene.add(s); }

// ---- planet (clearly visible backdrop) ----
function tex(draw,w=512,h=256){const c=document.createElement('canvas');c.width=w;c.height=h;draw(c.getContext('2d'));const t=new THREE.CanvasTexture(c);t.colorSpace=THREE.SRGBColorSpace;return t;}
const planetTex=tex(x=>{ x.fillStyle='#0e4377'; x.fillRect(0,0,512,256);
  for(let i=0;i<26;i++){ x.fillStyle=['#2f7038','#3c8042','#5d7039','#7a6e42'][i%4]; x.beginPath(); x.ellipse(Math.random()*512,30+Math.random()*196,26+Math.random()*82,16+Math.random()*48,Math.random()*6,0,7); x.fill(); }
  x.fillStyle='#eef4f8'; x.fillRect(0,0,512,16); x.fillRect(0,240,512,16);
  x.globalAlpha=0.55; x.fillStyle='#fff'; for(let i=0;i<46;i++){ x.beginPath(); x.ellipse(Math.random()*512,Math.random()*256,12+Math.random()*48,6+Math.random()*14,0,0,7); x.fill(); } x.globalAlpha=1; });
const planet=new THREE.Mesh(new THREE.SphereGeometry(150,44,44),new THREE.MeshStandardMaterial({map:planetTex,roughness:1,metalness:0,emissive:0x07203a,emissiveIntensity:0.25}));
planet.position.set(-250,-70,-430); scene.add(planet);
const atmo=new THREE.Mesh(new THREE.SphereGeometry(163,44,44),new THREE.MeshBasicMaterial({color:0x6aa6e0,transparent:true,opacity:0.22,side:THREE.BackSide,fog:false}));
atmo.position.copy(planet.position); scene.add(atmo);

// ---- materials ----
const grime=tex(x=>{ x.fillStyle='#9a9a94'; x.fillRect(0,0,256,256);
  for(let i=0;i<2800;i++){ const v=(Math.random()*60-30)|0; x.fillStyle=`rgba(${140+v},${140+v},${140+v},${Math.random()*0.45})`; const s=Math.random()*3+1; x.fillRect(Math.random()*256,Math.random()*256,s,s);}
  for(let i=0;i<20;i++){ x.strokeStyle=`rgba(30,26,20,${Math.random()*0.45})`; x.beginPath(); x.moveTo(Math.random()*256,0); x.lineTo(Math.random()*256+40,256); x.stroke(); } },256,256);
grime.wrapS=grime.wrapT=THREE.RepeatWrapping; grime.repeat.set(3,3);
const M={
  hull: new THREE.MeshStandardMaterial({color:0x6b7480, map:grime, roughness:0.8, metalness:0.35, flatShading:true}),
  dark: new THREE.MeshStandardMaterial({color:0x44505c, map:grime, roughness:0.85, metalness:0.4, flatShading:true}),
  rust: new THREE.MeshStandardMaterial({color:0x7a553a, map:grime, roughness:0.92, metalness:0.2, flatShading:true}),
  metal:new THREE.MeshStandardMaterial({color:0x80899a, roughness:0.35, metalness:0.75, flatShading:true}),
  amber:new THREE.MeshStandardMaterial({color:0x1a1004, emissive:0xE8A33D, emissiveIntensity:1.25, roughness:1}),
  cyan: new THREE.MeshStandardMaterial({color:0x06131a, emissive:0x8fd6ff, emissiveIntensity:1.5, roughness:1}),
  engine:new THREE.MeshStandardMaterial({color:0x041416, emissive:0x36e0d0, emissiveIntensity:2.4, roughness:1}),
};

const ship=new THREE.Group(); scene.add(ship);
function b(w,h,d,m,x,y,z,rx=0,ry=0,rz=0,par=ship){const o=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),m);o.position.set(x,y,z);o.rotation.set(rx,ry,rz);o.castShadow=o.receiveShadow=true;par.add(o);return o;}
function cy(r1,r2,h,m,x,y,z,rx=0,rz=0,seg=10){const o=new THREE.Mesh(new THREE.CylinderGeometry(r1,r2,h,seg),m);o.position.set(x,y,z);o.rotation.set(rx,0,rz);o.castShadow=o.receiveShadow=true;ship.add(o);return o;}

// hull
b(9,7,52,M.hull,0,0,0); b(7.5,5.5,12,M.hull,0,0,-30); b(5.5,4.2,8,M.dark,0,0.2,-37); b(2.4,2.4,5,M.metal,0,0.4,-41.5);
b(7,3.4,7,M.dark,0,4.6,-24); b(5.2,2,5.2,M.hull,0,6.6,-24); b(5.4,1.2,5.4,M.amber,0,6.4,-23.6);
// engines
b(12,10,9,M.dark,0,0,28); b(13.5,2,11,M.metal,0,5.4,28);
const flicker=[];
[[-3,-2.6],[3,-2.6],[-3,2.6],[3,2.6]].forEach(([ex,ey])=>{ cy(1.9,2.2,3.5,M.metal,ex,ey,33.6,Math.PI/2,0,12); const glow=cy(1.5,0.4,1.2,M.engine,ex,ey,35.6,Math.PI/2,0,12); flicker.push({m:glow,base:2.4,seed:Math.random()*9}); });
const eLight=new THREE.PointLight(0x36e0d0,28,60,2); eLight.position.set(0,0,38); ship.add(eLight);
// cargo pods
for(let z=-16;z<=18;z+=8.5){ b(3.2,4.5,7,M.hull,5.6,0,z); b(3.2,4.5,7,M.hull,-5.6,0,z); b(3.4,1,7,M.rust,5.6,2.6,z); }
// radiator wings
b(22,0.4,12,M.metal,13,7,22,0,0,-0.5); b(22,0.4,12,M.metal,-13,7,22,0,0,0.5);
// antennae + dish
cy(0.18,0.18,9,M.metal,2.5,5,-8,0,0.2); cy(0.14,0.14,7,M.metal,-2.2,5,2,0,-0.2);
const dish=new THREE.Mesh(new THREE.ConeGeometry(2.4,1.2,14,1,true),M.metal); dish.position.set(0,8.4,4); dish.rotation.x=Math.PI; dish.castShadow=true; ship.add(dish);
// greeble
for(let i=0;i<60;i++){ const s=0.5+Math.random()*1.5; const side=Math.floor(Math.random()*3); let x,y,z=-22+Math.random()*48;
  if(side===0){y=3.6;x=(Math.random()-0.5)*8;} else if(side===1){x=4.6;y=(Math.random()-0.5)*6;} else {x=-4.6;y=(Math.random()-0.5)*6;}
  b(s,s*0.5,s*(0.6+Math.random()),Math.random()>0.8?M.rust:M.dark,x,y,z); }
// window grid
for(let z=-20;z<=22;z+=3){ for(const yy of [1.6,-0.2,-1.8]){ const lit=Math.random()>0.3; const wL=b(0.15,0.7,1.4,lit?M.amber.clone():M.dark,4.55,yy,z); b(0.15,0.7,1.4,lit?M.amber.clone():M.dark,-4.55,yy,z); if(lit&&Math.random()>0.82) flicker.push({m:wL,base:1.25,seed:Math.random()*9}); }}
// running lights + hull breach
const rl=(c,x,y,z)=>{const m=new THREE.Mesh(new THREE.SphereGeometry(0.35,8,8),new THREE.MeshStandardMaterial({color:0,emissive:c,emissiveIntensity:3.5,roughness:1}));m.position.set(x,y,z);ship.add(m);return m;};
rl(0xff3030,-5,0,-34); rl(0x30ff60,5,0,-34); const beacon=rl(0xffffff,0,7.2,0);
b(4,3.2,0.6,new THREE.MeshBasicMaterial({color:0x000000}),4.7,0.5,6);
for(let i=0;i<7;i++) b(0.2,0.2,1+Math.random()*2,M.metal,4.6,(Math.random()-0.5)*2.6,6+(Math.random()-0.5)*3,Math.random(),Math.random(),Math.random());

// ---- DOCKING BAY (lit, on the +x forward hull) ----
const bay=new THREE.Group(); bay.position.set(4.5,0,-12); ship.add(bay);
b(3.2,5.2,7,new THREE.MeshStandardMaterial({color:0x0c1820,emissive:0x1f3d49,emissiveIntensity:0.7,roughness:1}),-1.2,0,0,0,0,0,bay); // cavity
b(0.4,4.8,6.4,new THREE.MeshStandardMaterial({color:0x05131c,emissive:0x8fd6ff,emissiveIntensity:1.8,roughness:1}),-2.7,0,0,0,0,0,bay);  // glowing back wall
const fr=new THREE.MeshStandardMaterial({color:0x14181e,emissive:0xE8A33D,emissiveIntensity:1.4,roughness:1});
b(0.6,0.6,7.4,fr,0.3,2.7,0,0,0,0,bay); b(0.6,0.6,7.4,fr,0.3,-2.7,0,0,0,0,bay); b(0.6,5.8,0.6,fr,0.3,0,3.6,0,0,0,bay); b(0.6,5.8,0.6,fr,0.3,0,-3.6,0,0,0,bay);
for(let z=-2;z<=2;z+=1){ b(2.6,0.12,0.3,M.cyan,-1.2,2.3,z,0,0,0,bay); b(2.6,0.12,0.3,M.cyan,-1.2,-2.3,z,0,0,0,bay); }
const bayLight=new THREE.PointLight(0x9fd6ff,16,22,2); bayLight.position.set(2,0,0); bay.add(bayLight);
// approach guide lights (chase toward the bay)
const guides=[]; for(let i=1;i<=6;i++){ const gm=new THREE.Mesh(new THREE.SphereGeometry(0.26,8,8),new THREE.MeshStandardMaterial({color:0,emissive:0xff9040,emissiveIntensity:3,roughness:1})); gm.position.set(4.5+i*3.4,0,-12); ship.add(gm); guides.push({m:gm,i}); }

// ---- the arriving capsule ----
const cap=new THREE.Group();
const capMat=new THREE.MeshStandardMaterial({color:0xc8c4b6,roughness:0.45,metalness:0.4,flatShading:true});
const nose=new THREE.Mesh(new THREE.ConeGeometry(1.1,2.8,12),capMat); nose.rotation.x=-Math.PI/2; nose.position.z=-1.5; cap.add(nose);
const cbody=new THREE.Mesh(new THREE.CylinderGeometry(1.15,1.35,2.4,12),capMat); cbody.rotation.x=Math.PI/2; cbody.position.z=0.4; cap.add(cbody);
const cwin=new THREE.Mesh(new THREE.SphereGeometry(0.55,12,12),new THREE.MeshStandardMaterial({color:0x02060a,emissive:0x9fd0ff,emissiveIntensity:1.6})); cwin.position.set(0,0.6,-0.9); cap.add(cwin);
const thrMat=new THREE.MeshStandardMaterial({color:0x050608,emissive:0xff8a3a,emissiveIntensity:1.5,roughness:1}); const thr=[];
[[-0.55,0],[0.55,0],[0,0.55]].forEach(([x,y])=>{ const tc=new THREE.Mesh(new THREE.ConeGeometry(0.34,0.8,10),thrMat); tc.rotation.x=Math.PI/2; tc.position.set(x,y,1.9); cap.add(tc); thr.push(tc); });
const thrLight=new THREE.PointLight(0xff8a3a,0,12,2); thrLight.position.z=2.6; cap.add(thrLight);
cap.traverse(o=>{if(o.isMesh)o.castShadow=true;}); cap.scale.setScalar(1.3); scene.add(cap);
const P0=new THREE.Vector3(78,26,12), PM=new THREE.Vector3(13,0,-12), PD=new THREE.Vector3(6.6,0,-12), LK=new THREE.Vector3(-8,0,-12);
const capEl=document.getElementById('cap'); const ez=k=>1-Math.pow(1-k,3);

// ---- loop ----
const clock=new THREE.Clock(); const T=16, tmp=new THREE.Vector3();
function animate(){ requestAnimationFrame(animate); const dt=clock.getDelta(), t=clock.elapsedTime; controls.update();
  ship.position.y=Math.sin(t*0.22)*0.5; ship.rotation.z=Math.sin(t*0.16)*0.015;
  // capsule arrival → dock → hold → repeat
  const tt=(t%T)/T; let burn=0, docking=false;
  if(tt<0.6){ const k=ez(tt/0.6); tmp.copy(P0).lerp(PM,k); burn=0.5+0.5*Math.sin(tt*30)*(k>0.6?1:0.3); cap.position.copy(tmp); cap.lookAt(LK); }
  else if(tt<0.78){ const k=(tt-0.6)/0.18; tmp.copy(PM).lerp(PD,k); burn=0.9; docking=true; cap.position.copy(tmp); cap.lookAt(LK); }
  else { cap.position.copy(PD); cap.lookAt(LK); burn=0.05; docking=true; }
  capEl.style.opacity = (tt>0.45 && tt<0.85) ? 0.9 : 0;
  thrLight.intensity=burn*9; thr.forEach(c=>c.material.emissiveIntensity=0.6+burn*4);
  // chase the guide lights toward the bay
  for(const g of guides){ const ph=(t*2.2 - g.i*0.5); g.m.material.emissiveIntensity=1.0+3.0*Math.max(0,Math.sin(ph)); }
  bayLight.intensity=14+Math.sin(t*4)*2;
  for(const f of flicker){ const n=Math.sin(t*16+f.seed)*0.5+0.5; const drop=(Math.sin(t*2.5+f.seed)>0.88)?0.12:1.0; f.m.material.emissiveIntensity=f.base*(0.45+0.55*n)*drop; }
  beacon.material.emissiveIntensity=(Math.sin(t*3)>0.7)?5:0.3; eLight.intensity=26+Math.sin(t*5)*5; planet.rotation.y+=dt*0.006;
  Grade.uniforms.uTime.value=t; composer.render();
}
addEventListener('resize',resize); resize(); animate();
</script>
</body>
</html>
