<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SIGNAL LOST — the derelict (exterior)</title>
<style>
  html,body{margin:0;height:100%;background:#04060e;overflow:hidden}
  #c{width:100vw;height:100vh;display:block;image-rendering:pixelated}
  #hud{position:fixed;left:14px;bottom:12px;font:11px ui-monospace,Menlo,monospace;color:#8a97a4;pointer-events:none}
  #hud b{color:#E8A33D}
  #nav{position:fixed;right:14px;top:12px;font:12px ui-monospace,monospace}
  #nav a{color:#9fd0ff;text-decoration:none;background:rgba(8,12,18,.7);border:1px solid #20303c;border-radius:6px;padding:6px 10px}
  #title{position:fixed;left:14px;top:12px;font:600 13px ui-monospace,monospace;letter-spacing:3px;color:#E8A33D;pointer-events:none}
  #cap{position:fixed;left:50%;bottom:34px;transform:translateX(-50%);font:11px ui-monospace,monospace;color:#9fd0ff;pointer-events:none;opacity:0;transition:opacity .4s}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="title">SIGNAL&nbsp;LOST · THE DERELICT</div>
<div id="nav"><a href="/">▸ enter the ship</a></div>
<div id="hud"><b>drag</b> to orbit · <b>scroll</b> to zoom · the capsule docks at the port (clamps go green)</div>
<div id="cap">▸ DOCKING</div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';

const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:false,powerPreference:'high-performance'});
renderer.setPixelRatio(1); renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.5;

const scene=new THREE.Scene(); scene.background=new THREE.Color(0x05070f);
scene.fog=new THREE.FogExp2(0x070a14,0.00045);
const camera=new THREE.PerspectiveCamera(54,1,0.5,6000); camera.position.set(120,42,96);

const INTERNAL=0.6;
const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
const bloom=new UnrealBloomPass(new THREE.Vector2(1,1),0.5,0.5,0.72); composer.addPass(bloom);
composer.addPass(new OutputPass());
const Grade=new ShaderPass({
 uniforms:{tDiffuse:{value:null},uTime:{value:0},uRes:{value:new THREE.Vector2(1,1)}},
 vertexShader:`varying vec2 vUv; void main(){vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
 fragmentShader:`varying vec2 vUv; uniform sampler2D tDiffuse; uniform float uTime; uniform vec2 uRes;
  float bayer(vec2 p){int i=int(mod(p.x,4.0))+int(mod(p.y,4.0))*4; float m[16]; m[0]=0.;m[1]=8.;m[2]=2.;m[3]=10.;m[4]=12.;m[5]=4.;m[6]=14.;m[7]=6.;m[8]=3.;m[9]=11.;m[10]=1.;m[11]=9.;m[12]=15.;m[13]=7.;m[14]=13.;m[15]=5.; float v=0.; for(int k=0;k<16;k++){if(k==i)v=m[k];} return v/16.0-0.5;}
  float rnd(vec2 p){return fract(sin(dot(p,vec2(12.9898,78.233)))*43758.5);}
  void main(){vec2 uv=vUv,d=uv-0.5; float ca=0.0007+dot(d,d)*0.005;
   vec3 col; col.r=texture2D(tDiffuse,uv+d*ca).r; col.g=texture2D(tDiffuse,uv).g; col.b=texture2D(tDiffuse,uv-d*ca).b;
   float lv=30.0; col=floor(col*lv+bayer(gl_FragCoord.xy))/lv;
   col*=0.97+0.03*sin(gl_FragCoord.y*3.14159); col+=(rnd(uv*uRes+uTime)-0.5)*0.02;
   col*=mix(0.65,1.0,smoothstep(1.15,0.12,length(d))); gl_FragColor=vec4(max(col,0.0),1.0);} `
});
composer.addPass(Grade);
function resize(){const w=innerWidth,h=innerHeight,lw=Math.max(2,Math.floor(w*INTERNAL)),lh=Math.max(2,Math.floor(h*INTERNAL));
 renderer.setSize(lw,lh,false); composer.setSize(lw,lh); bloom.setSize(lw,lh); Grade.uniforms.uRes.value.set(lw,lh);
 camera.aspect=w/h; camera.updateProjectionMatrix();}

const controls=new OrbitControls(camera,canvas);
controls.enableDamping=true; controls.dampingFactor=0.06; controls.autoRotate=false;
controls.minDistance=30; controls.maxDistance=480; controls.target.set(8,1,-10);

const pos=(o,x,y,z)=>{ y===undefined ? o.position.copy(x) : o.position.set(x,y,z); return o; }; // .position is read-only in three; mutate, never reassign
// ---- lights ----
scene.add(new THREE.AmbientLight(0x3a4a60,0.85));
scene.add(new THREE.HemisphereLight(0x44607e,0x0c1018,0.7));
const sun=new THREE.DirectionalLight(0xfff0d6,3.3); sun.position.set(320,260,300); sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048); sun.shadow.camera.near=160; sun.shadow.camera.far=1200;
sun.shadow.camera.left=-110; sun.shadow.camera.right=110; sun.shadow.camera.top=110; sun.shadow.camera.bottom=-110; sun.shadow.bias=-0.0004;
scene.add(sun);
scene.add(pos(new THREE.DirectionalLight(0x6f8bb0,0.8),-200,50,150));

// ---- stars + sun disc ----
{ const N=3400,p=new Float32Array(N*3),col=new Float32Array(N*3);
  for(let i=0;i<N;i++){ const v=new THREE.Vector3().randomDirection().multiplyScalar(1800+Math.random()*1100); p[i*3]=v.x;p[i*3+1]=v.y;p[i*3+2]=v.z; const c=Math.random(),r=0.65+Math.random()*0.35; col[i*3]=r;col[i*3+1]=r*(0.82+c*0.18);col[i*3+2]=r*(0.88+c*0.12); }
  const g=new THREE.BufferGeometry(); g.setAttribute('position',new THREE.BufferAttribute(p,3)); g.setAttribute('color',new THREE.BufferAttribute(col,3));
  scene.add(new THREE.Points(g,new THREE.PointsMaterial({size:2,sizeAttenuation:false,vertexColors:true,transparent:true,opacity:0.85}))); }
{ const s=new THREE.Mesh(new THREE.SphereGeometry(34,16,16),new THREE.MeshBasicMaterial({color:0xffe9c4,fog:false})); s.position.set(720,600,640); scene.add(s); }

// ---- planet ----
function tex(draw,w=512,h=256){const c=document.createElement('canvas');c.width=w;c.height=h;draw(c.getContext('2d'));const t=new THREE.CanvasTexture(c);t.colorSpace=THREE.SRGBColorSpace;return t;}
const planetTex=tex(x=>{ x.fillStyle='#0e4377'; x.fillRect(0,0,512,256);
  for(let i=0;i<26;i++){ x.fillStyle=['#2f7038','#3c8042','#5d7039','#7a6e42'][i%4]; x.beginPath(); x.ellipse(Math.random()*512,30+Math.random()*196,26+Math.random()*82,16+Math.random()*48,Math.random()*6,0,7); x.fill(); }
  x.fillStyle='#eef4f8'; x.fillRect(0,0,512,16); x.fillRect(0,240,512,16);
  x.globalAlpha=0.55; x.fillStyle='#fff'; for(let i=0;i<46;i++){ x.beginPath(); x.ellipse(Math.random()*512,Math.random()*256,12+Math.random()*48,6+Math.random()*14,0,0,7); x.fill(); } x.globalAlpha=1; });
const planet=new THREE.Mesh(new THREE.SphereGeometry(190,48,48),new THREE.MeshStandardMaterial({map:planetTex,roughness:1,metalness:0,emissive:0x07203a,emissiveIntensity:0.22}));
planet.position.set(330,-30,-260); scene.add(planet);
scene.add(pos(new THREE.Mesh(new THREE.SphereGeometry(206,48,48),new THREE.MeshBasicMaterial({color:0x6aa6e0,transparent:true,opacity:0.2,side:THREE.BackSide,fog:false})),planet.position.clone()));

// ---- materials ----
const grime=tex(x=>{ x.fillStyle='#9a9a94'; x.fillRect(0,0,256,256);
  for(let i=0;i<2600;i++){ const v=(Math.random()*56-28)|0; x.fillStyle=`rgba(${140+v},${140+v},${140+v},${Math.random()*0.4})`; const s=Math.random()*3+1; x.fillRect(Math.random()*256,Math.random()*256,s,s);}
  for(let i=0;i<18;i++){ x.strokeStyle=`rgba(30,26,20,${Math.random()*0.4})`; x.beginPath(); x.moveTo(Math.random()*256,0); x.lineTo(Math.random()*256+40,256); x.stroke(); } },256,256);
grime.wrapS=grime.wrapT=THREE.RepeatWrapping; grime.repeat.set(2,2);
const M={
  hull: new THREE.MeshStandardMaterial({color:0x717a86, map:grime, roughness:0.8, metalness:0.35, flatShading:true}),
  hull2:new THREE.MeshStandardMaterial({color:0x5e6772, map:grime, roughness:0.82, metalness:0.36, flatShading:true}),
  dark: new THREE.MeshStandardMaterial({color:0x434e5a, map:grime, roughness:0.85, metalness:0.42, flatShading:true}),
  rust: new THREE.MeshStandardMaterial({color:0x7c563b, map:grime, roughness:0.92, metalness:0.2, flatShading:true}),
  metal:new THREE.MeshStandardMaterial({color:0x868f9e, roughness:0.32, metalness:0.78, flatShading:true}),
  panel:new THREE.MeshStandardMaterial({color:0x10243a, roughness:0.4, metalness:0.5, flatShading:true}),
  amber:new THREE.MeshStandardMaterial({color:0x1a1004, emissive:0xE8A33D, emissiveIntensity:1.25, roughness:1}),
  cyan: new THREE.MeshStandardMaterial({color:0x06131a, emissive:0x8fd6ff, emissiveIntensity:1.5, roughness:1}),
  engine:new THREE.MeshStandardMaterial({color:0x041416, emissive:0x36e0d0, emissiveIntensity:2.4, roughness:1}),
};

const ship=new THREE.Group(); scene.add(ship);
function bx(w,h,d,m,x,y,z,par,rx,ry,rz){const o=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),m);o.position.set(x,y,z);o.rotation.set(rx||0,ry||0,rz||0);o.castShadow=o.receiveShadow=true;(par||ship).add(o);return o;}
function cl(r1,r2,h,m,x,y,z,par,rx,rz,seg){const o=new THREE.Mesh(new THREE.CylinderGeometry(r1,r2,h,seg||12),m);o.position.set(x,y,z);o.rotation.set(rx||0,0,rz||0);o.castShadow=o.receiveShadow=true;(par||ship).add(o);return o;}
const flicker=[];

// ---- BIG detailed hull (segmented for panel breaks) ----
for(let i=0;i<6;i++){ const z=-37.5+i*15; bx(13,9,15,(i%2?M.hull2:M.hull),0,0,z); bx(13.4,1.2,15,M.dark,0,4.6,z); bx(13.4,1.2,15,M.dark,0,-4.6,z); }
bx(9,4.5,76,M.dark,0,-5.5,0);                                    // keel
bx(0.7,0.7,84,M.metal,4.6,4.7,0); bx(0.7,0.7,84,M.metal,-4.6,4.7,0); bx(0.6,0.6,84,M.rust,0,5.0,0); // dorsal conduits
// nose
bx(10,7,12,M.hull,0,0,-46); bx(7,5,9,M.dark,0,0,-53); bx(4,3,6,M.metal,0,0.4,-58); cl(0.4,0.4,9,M.metal,0,1.5,-61,null,Math.PI/2);
// command superstructure
bx(12,5,13,M.dark,0,6.5,-28); bx(9,4,10,M.hull,0,10,-28); bx(8,1.8,8,M.amber,0,11.6,-28);
for(let z=-32;z<=-24;z+=2){ bx(0.2,1.2,1.4,M.amber,4.6,7,z); bx(0.2,1.2,1.4,M.amber,-4.6,7,z); }
// engine cluster
bx(16,14,15,M.dark,0,0,46); bx(17.5,2.2,17,M.metal,0,7.5,46);
[[-4.5,-3.6],[0,-3.6],[4.5,-3.6],[-4.5,3.6],[0,3.6],[4.5,3.6]].forEach(([ex,ey])=>{ cl(2.5,2.9,4.5,M.metal,ex,ey,53,null,Math.PI/2,0,14); const g=cl(2.0,0.5,1.6,M.engine,ex,ey,55.8,null,Math.PI/2,0,14); flicker.push({m:g,base:2.4,seed:Math.random()*9}); });
const eLight=new THREE.PointLight(0x36e0d0,40,90,2); eLight.position.set(0,0,62); ship.add(eLight);
// cargo modules (stacked containers along both sides)
const ccol=[M.hull2,M.rust,M.dark,M.hull];
for(let z=-30;z<=30;z+=9){ for(const sx of [7.4,-7.4]){ bx(3.5,5,8,ccol[(z+30)/9%4|0],sx,0,z); bx(3.5,5,8,ccol[((z+30)/9+1)%4|0],sx,5.4,z); bx(3.6,0.6,8,M.metal,sx,2.6,z); } }
// radiator wings + solar arrays
bx(30,0.5,18,M.metal,20,10,36,null,0,0,-0.55); bx(30,0.5,18,M.metal,-20,10,36,null,0,0,0.55);
for(let i=-5;i<6;i++) bx(0.3,0.6,18,M.dark,20+i*2.6,10+i*1.45,36,null,0,0,-0.55);
bx(24,0.4,9,M.panel,-22,-3,-30,null,0.18,0,0); bx(24,0.4,9,M.panel,22,-3,-30,null,-0.18,0,0);
for(let i=-3;i<4;i++) bx(0.2,0.5,9,M.metal,-22+i*3.4,-3-i*0.6,-30,null,0.18,0,0);
// dishes + masts
const dish=new THREE.Mesh(new THREE.ConeGeometry(3,1.6,16,1,true),M.metal); dish.position.set(0,9.5,6); dish.rotation.x=Math.PI; dish.castShadow=true; ship.add(dish);
cl(0.22,0.22,11,M.metal,3.5,6,-10,null,0,0.2); cl(0.18,0.18,9,M.metal,-3,6,8,null,0,-0.2); cl(0.3,0.3,3,M.metal,5,5,18);
// greeble
for(let i=0;i<140;i++){ const s=0.5+Math.random()*1.8; const side=Math.floor(Math.random()*3); let x,y,z=-42+Math.random()*84;
  if(side===0){y=4.2;x=(Math.random()-0.5)*10;} else if(side===1){x=6.7;y=(Math.random()-0.5)*7.5;} else {x=-6.7;y=(Math.random()-0.5)*7.5;}
  bx(s,s*0.5,s*(0.6+Math.random()),Math.random()>0.8?M.rust:M.dark,x,y,z); }
// windows
for(let z=-38;z<=36;z+=2.6){ for(const yy of [2.4,0.8,-0.8,-2.4]){ const lit=Math.random()>0.32; const wL=bx(0.15,0.6,1.3,lit?M.amber.clone():M.dark,6.62,yy,z); bx(0.15,0.6,1.3,lit?M.amber.clone():M.dark,-6.62,yy,z); if(lit&&Math.random()>0.85) flicker.push({m:wL,base:1.25,seed:Math.random()*9}); }}
// running lights, beacon, hull breach
const rl=(c,x,y,z)=>{const m=new THREE.Mesh(new THREE.SphereGeometry(0.4,8,8),new THREE.MeshStandardMaterial({color:0,emissive:c,emissiveIntensity:3.5,roughness:1}));m.position.set(x,y,z);ship.add(m);return m;};
rl(0xff3030,-7,0,-46); rl(0x30ff60,7,0,-46); const beacon=rl(0xffffff,0,11.4,-28);
bx(5,4,0.6,new THREE.MeshBasicMaterial({color:0x000000}),6.8,1,16); for(let i=0;i<9;i++) bx(0.25,0.25,1+Math.random()*2.5,M.metal,6.7,(Math.random()-0.5)*3,16+(Math.random()-0.5)*4,null,Math.random(),Math.random(),Math.random());
ship.rotation.y=0.15;

// ===== REAL DOCKING PORT (boom + airlock tube + collar + ring lights + clamps) =====
const dock=new THREE.Group(); dock.position.set(6.5,1,-12); ship.add(dock);
bx(8,2.2,2.6,M.metal,4,0,0,dock); bx(8,0.4,0.4,M.amber,4,1.2,0,dock); bx(8,0.4,0.4,M.amber,4,-1.2,0,dock);  // boom + lit rails
for(let i=0;i<4;i++) cl(1.7,1.7,0.7,(i%2?M.dark:M.metal),5+i*0.75,0,0,dock,0,Math.PI/2,16);                  // concertina airlock tube
bx(0.5,3,3,new THREE.MeshStandardMaterial({color:0,emissive:0x8fd6ff,emissiveIntensity:1.8,roughness:1}),8.0,0,0,dock); // glowing airlock door
cl(2.0,2.0,1.2,M.metal,8.7,0,0,dock,0,Math.PI/2,20);                                                          // the docking collar
const ringLights=[]; for(let a=0;a<12;a++){ const ang=a/12*Math.PI*2; const lm=new THREE.Mesh(new THREE.SphereGeometry(0.18,6,6),new THREE.MeshStandardMaterial({color:0,emissive:0xff5030,emissiveIntensity:3,roughness:1})); lm.position.set(8.9,Math.cos(ang)*1.85,Math.sin(ang)*1.85); dock.add(lm); ringLights.push(lm.material); }
const clamps=[]; for(let a=0;a<3;a++){ const ang=a/3*Math.PI*2+0.4; const piv=new THREE.Group(); piv.position.set(8.5,Math.cos(ang)*2.0,Math.sin(ang)*2.0); piv.rotation.set(ang,0,0); dock.add(piv); bx(1.8,0.4,0.7,M.metal,0.8,-0.7,0,piv); clamps.push(piv); }
const dockLight=new THREE.PointLight(0xff7050,10,20,2); dockLight.position.set(11,0,0); dock.add(dockLight);
// approach guide lights leading out from the collar
const guides=[]; for(let i=1;i<=7;i++){ const gm=new THREE.Mesh(new THREE.SphereGeometry(0.3,8,8),new THREE.MeshStandardMaterial({color:0,emissive:0xff9040,emissiveIntensity:3,roughness:1})); gm.position.set(6.5+8.7+i*4.2,1,-12); ship.add(gm); guides.push({m:gm.material,i}); }
const COLLAR=new THREE.Vector3(); // world position of the collar mouth, computed each frame

// ---- arriving capsule ----
const cap=new THREE.Group();
const capMat=new THREE.MeshStandardMaterial({color:0xc8c4b6,roughness:0.45,metalness:0.4,flatShading:true});
const nose=new THREE.Mesh(new THREE.ConeGeometry(1.2,3,12),capMat); nose.rotation.x=-Math.PI/2; nose.position.z=-1.7; cap.add(nose);
const cbody=new THREE.Mesh(new THREE.CylinderGeometry(1.25,1.5,2.8,12),capMat); cbody.rotation.x=Math.PI/2; cbody.position.z=0.5; cap.add(cbody);
cap.add(pos(new THREE.Mesh(new THREE.SphereGeometry(0.6,12,12),new THREE.MeshStandardMaterial({color:0x02060a,emissive:0x9fd0ff,emissiveIntensity:1.7})),0,0.65,-1.0));
const thrMat=new THREE.MeshStandardMaterial({color:0x050608,emissive:0xff8a3a,emissiveIntensity:1.5,roughness:1}); const thr=[];
[[-0.6,0],[0.6,0],[0,0.6]].forEach(([x,y])=>{ const tc=new THREE.Mesh(new THREE.ConeGeometry(0.36,0.9,10),thrMat); tc.rotation.x=Math.PI/2; tc.position.set(x,y,2.2); cap.add(tc); thr.push(tc); });
const thrLight=new THREE.PointLight(0xff8a3a,0,14,2); thrLight.position.z=3; cap.add(thrLight);
cap.traverse(o=>{if(o.isMesh)o.castShadow=true;}); cap.scale.setScalar(1.35); scene.add(cap);
const P0=new THREE.Vector3(120,34,-12), PM=new THREE.Vector3(34,5,-12), _v=new THREE.Vector3(), _look=new THREE.Vector3();
const capEl=document.getElementById('cap'); const ez=k=>1-Math.pow(1-k,3);

const clock=new THREE.Clock(); const T=16;
function animate(){ requestAnimationFrame(animate); const dt=clock.getDelta(), t=clock.elapsedTime; controls.update();
  ship.position.y=Math.sin(t*0.2)*0.5; ship.rotation.z=Math.sin(t*0.14)*0.012;
  // collar mouth in world space (= ship-local (6.5+8.9, 1, -12))
  COLLAR.set(6.5+8.9,1,-12).applyMatrix4(ship.matrixWorld);
  const PD=_v.copy(COLLAR); PD.x+=3.0; // capsule sits just outside the collar, nose touching
  _look.copy(COLLAR);
  const tt=(t%T)/T; let burn=0, docked=false;
  if(tt<0.58){ const k=ez(tt/0.58); cap.position.copy(P0).lerp(PM,k); burn=0.4+0.6*(k>0.5?1:0.3); }
  else if(tt<0.76){ const k=ez((tt-0.58)/0.18); cap.position.copy(PM).lerp(PD,k); burn=0.95; }
  else { cap.position.copy(PD); burn=0.04; docked=true; }
  cap.lookAt(_look);
  capEl.style.opacity=(tt>0.42 && tt<0.82)?0.9:0;
  thrLight.intensity=burn*10; thr.forEach(c=>c.material.emissiveIntensity=0.6+burn*4);
  // dock lights: red while waiting, chase during approach, GREEN when docked
  const gcol=docked?0x35ff70:0xff5030;
  ringLights.forEach((m,i)=>{ m.emissive.setHex(gcol); m.emissiveIntensity=docked?3.2:(1.0+2.4*Math.max(0,Math.sin(t*3-i*0.5))); });
  dockLight.color.setHex(docked?0x40ff80:0xff7050); dockLight.intensity=docked?12:8+Math.sin(t*5)*2;
  clamps.forEach((p,i)=>{ const close=docked?0.5:-0.4; p.children[0].position.y += ((-0.7+close)-p.children[0].position.y)*0.1; });
  guides.forEach(g=>{ g.m.emissive.setHex(docked?0x35ff70:0xff9040); g.m.emissiveIntensity=1.0+3.0*Math.max(0,Math.sin(t*2.4 - g.i*0.5)); });
  for(const f of flicker){ const n=Math.sin(t*16+f.seed)*0.5+0.5; const drop=(Math.sin(t*2.5+f.seed)>0.88)?0.12:1.0; f.m.material.emissiveIntensity=f.base*(0.45+0.55*n)*drop; }
  beacon.material.emissiveIntensity=(Math.sin(t*3)>0.7)?5:0.3; eLight.intensity=34+Math.sin(t*5)*6; planet.rotation.y+=dt*0.005;
  Grade.uniforms.uTime.value=t; composer.render();
}
addEventListener('resize',resize); resize(); animate();
</script>
