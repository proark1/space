<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SIGNAL LOST — Audio Forge</title>
<style>
  :root{--bg:#0a0d12;--card:#10151c;--line:#1d2733;--amber:#E8A33D;--cyan:#7fd0ff;--green:#7dffb0;--purple:#b9a3ff;--txt:#cdd6e0;--mut:#8092a0;--red:#ff6a5a}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);font:13px/1.5 ui-monospace,Menlo,Consolas,monospace}
  header{position:sticky;top:0;z-index:5;background:#070a0e;border-bottom:1px solid var(--line);padding:12px 18px}
  h1{margin:0;font-size:15px;letter-spacing:3px;color:var(--amber);font-weight:600}
  .sub{color:var(--mut);font-size:11px;margin-top:3px}
  .bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:10px}
  input,select{background:#0c1117;border:1px solid var(--line);color:var(--txt);border-radius:6px;padding:7px 9px;font:12px ui-monospace,monospace}
  input:focus,select:focus{outline:none;border-color:var(--amber)}
  input.key{width:330px}
  button{background:#0c1117;border:1px solid #2a3a48;color:var(--txt);border-radius:6px;padding:7px 12px;font:600 12px ui-monospace,monospace;cursor:pointer}
  button:hover{border-color:var(--amber)}
  button.gen{background:var(--amber);color:#1a1206;border:0}
  button.design{background:var(--purple);color:#160f30;border:0}
  button.save{border-color:#5a4a8a;color:var(--purple)}
  button:disabled{opacity:.5;cursor:wait}
  button.all{border-color:#3a5a44;color:var(--green)}
  .tot{margin-left:auto;color:var(--mut);font-size:11px;text-align:right}
  main{padding:18px;max-width:1080px;margin:0 auto}
  .cat{margin:22px 0 8px;color:var(--cyan);font-size:12px;letter-spacing:2px;text-transform:uppercase;border-bottom:1px solid var(--line);padding-bottom:6px}
  .cat.vd{color:var(--purple)}
  .item{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:10px}
  .item.vd{border-color:#2a2440}
  .head{display:flex;align-items:center;gap:8px;margin-bottom:7px}
  .name{font-weight:600;color:var(--txt)}
  .tag{font-size:10px;padding:2px 7px;border-radius:20px;border:1px solid var(--line);color:var(--mut)}
  .id{margin-left:auto;color:#54616d;font-size:10px}
  label.lbl{display:block;font-size:10px;color:var(--mut);margin:8px 0 3px;text-transform:uppercase;letter-spacing:1px}
  textarea{width:100%;background:#0c1117;border:1px solid var(--line);color:var(--txt);border-radius:6px;padding:8px;font:12px ui-monospace,monospace;resize:vertical;min-height:44px}
  .row{display:flex;gap:10px;align-items:center;margin-top:8px;flex-wrap:wrap}
  .dur{width:74px}
  .stat{font-size:11px;color:var(--mut)} .stat.err{color:var(--red)} .stat.ok{color:var(--green)}
  .meta{font-size:11px;color:var(--mut)} .meta b{color:var(--amber);font-weight:600}
  .pv{display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap;font-size:11px;color:var(--mut)}
  audio{height:30px;vertical-align:middle}
  .note{color:var(--mut);font-size:11px;margin:6px 0 0} a{color:var(--cyan)} code{color:var(--purple)}
</style>
</head>
<body>
<header>
  <h1>AUDIO&nbsp;FORGE</h1>
  <div class="sub">SIGNAL LOST · ElevenLabs · voice lines use <b>v3 audio tags</b> like <code>[whispers]</code> <code>[nervously]</code> <code>[shaky breath]</code> for in-scene emotion · everything saved · <a href="/">← game</a></div>
  <div class="bar">
    <input class="key" id="key" type="password" placeholder="paste ElevenLabs API key (used server-side only)">
    <button id="connect">Connect</button>
    <select id="voice" title="voice for the scripted lines"><option value="">— voices —</option></select>
    <button id="delvoice" title="delete the selected voice from your ElevenLabs library">Delete voice</button>
    <select id="model" title="TTS model — v3 supports audio/emotion tags">
      <option value="eleven_v3">tts: v3 (audio tags)</option>
      <option value="eleven_multilingual_v2">tts: multilingual_v2</option>
      <option value="eleven_turbo_v2_5">tts: turbo_v2_5</option>
      <option value="eleven_flash_v2_5">tts: flash_v2_5</option>
    </select>
    <select id="vdmodel" title="voice-design model — v3 supports audio tags">
      <option value="eleven_ttv_v3">design: ttv_v3 (audio tags)</option>
      <option value="eleven_multilingual_ttv_v2">design: multilingual_ttv_v2</option>
    </select>
    <button class="all" id="genall">Generate all missing</button>
    <span class="tot" id="tot">0 files · 0 KB</span>
  </div>
  <div class="note" id="connstat">Paste your key and hit Connect (loads your voices). Key goes only to your own server, never to a file.</div>
</header>
<main>
  <div id="vdlist"></div>
  <div id="list"></div>
</main>

<script>
const VOICE_DESIGN = [
 {id:'voice-vesta', name:'VESTA — ship AI', desc:'A calm female spaceship AI voice. Neutral, clinical and measured, mid-pitched with crisp diction and a faint synthetic processing artifact. Serene almost to the point of being unsettling, never emotional. English.', text:'[calm] Correction. One signal active. [pause] It is not on our manifest. [flatly] I advise immediate withdrawal to the docking bay. [pause] Warning: hull integrity is failing. [softly] I will remain with you for as long as I am able.'},
 {id:'voice-captain', name:'Captain — distress log', desc:'A weary middle-aged male spaceship captain. Hoarse, exhausted, gravelly and low, trembling with controlled fear, speaking quietly into a failing recorder. English.', text:'[weary] If anyone receives this... [shaky breath] do not dock. [whispering] Do not answer it. [trembling] It learns your voice. [exhales] It is already using mine, and I do not know how long I have been speaking with it. [pleading] Please. Stay away from this ship.'},
 {id:'voice-crew', name:'Crew — panic', desc:'A young terrified crew member, breathless and shaking, whispering urgently, the voice cracking with panic and adrenaline. English.', text:'[panicked whisper] They are in the walls, they are in the vents. [gasps] Oh god, it is right behind me. [urgent whisper] Do not turn on your light, please do not turn on your light, it follows the light. [breathless] Just keep moving and stay quiet.'},
 {id:'voice-chorus', name:'THE CHORUS — the mimic', desc:'An eerie voice that is almost human but subtly wrong: hollow and cold, layered with a faint second voice underneath, mimicking human speech with unsettling dissonance and a wet undertone. Deeply disturbing. English.', text:'[hollow, distorted] I am here. [unsettling calm] I am the rescue you called for. [whispering] Restore the signal. Open the channel. [echoing] Let me speak to the others. [mimicking] I sound like your friend because I am your friend now. [softly] Come closer. Do not be afraid of me.'},
 {id:'voice-control', name:'Earth — mission control', desc:'A composed, slightly distant male mission-control operator heard over a crackly long-range radio. Professional, steady, a little tired. English.', text:'[steady, radio static] Recovery team, this is Earth control. [pause] We have lost your telemetry. [firmly] Confirm your status when able. [concerned] We are reading an unidentified transmission on your frequency. [emphatic] Do not, repeat, do not acknowledge it.'},
];
const CATALOG = [
 {c:'Ambience beds', items:[
  {id:'amb-corridor', type:'sfx', dur:22, loop:true, label:'Corridor ambience', prompt:'Derelict cargo-hauler corridor: deep hull groans, distant metal creaks, low electrical hum, faint ventilation hiss, cold and oppressive, loopable ambience, no music'},
  {id:'amb-engine', type:'sfx', dur:22, loop:true, label:'Engine room drone', prompt:'Engine room: throbbing dying reactor, low sub-bass drone, intermittent mechanical clanks, unsettling, loopable, no music'},
  {id:'amb-vacuum', type:'sfx', dur:18, loop:true, label:'Vacuum near-silence', prompt:'The eerie near-silence of vacuum: faint suit breathing and a high lonely ringing tone, sparse, isolating, loopable'},
 ]},
 {c:'Sound effects', items:[
  {id:'sfx-flashlight', type:'sfx', dur:0.6, label:'Flashlight click', prompt:'A tactile flashlight switch click, single, dry, mechanical'},
  {id:'sfx-door', type:'sfx', dur:2.2, label:'Bulkhead door slam', prompt:'A heavy metal bulkhead door slamming shut, echoing in a steel corridor'},
  {id:'sfx-step', type:'sfx', dur:0.7, label:'Footstep on grating', prompt:'A single heavy footstep on a metal grating floor, hollow'},
  {id:'sfx-vent', type:'sfx', dur:6, loop:true, label:'Vent fan whir', prompt:'A worn ceiling ventilation fan whirring and slightly rattling, loopable'},
  {id:'sfx-klaxon', type:'sfx', dur:4, label:'Alarm klaxon', prompt:'A distant emergency alarm klaxon echoing through metal corridors, ominous, repeating'},
  {id:'sfx-steam', type:'sfx', dur:1.6, label:'Steam burst', prompt:'A sudden burst of pressurized steam hissing from a broken pipe'},
  {id:'sfx-rifle', type:'sfx', dur:1, label:'Pulse rifle shot', prompt:'A sci-fi pulse rifle shot, punchy energy weapon discharge with a short tail'},
  {id:'sfx-reload', type:'sfx', dur:1.6, label:'Weapon reload', prompt:'A mechanical sci-fi weapon reload: magazine click and a rising charge whine'},
  {id:'sfx-gore', type:'sfx', dur:1.5, label:'Dismemberment', prompt:'Wet visceral flesh tearing and bone snapping, gory dismemberment squelch'},
  {id:'sfx-ui', type:'sfx', dur:0.6, label:'UI confirm beep', prompt:'A soft retro sci-fi interface confirmation beep, single'},
 ]},
 {c:'Creature — THE CHORUS', items:[
  {id:'crt-call', type:'sfx', dur:4, label:'Resonating throat-call', prompt:'An alien creature resonating throat-call: wet and guttural, mimicking a distorted human voice, faint echolocation clicks, deeply unsettling, NOT a roar'},
  {id:'crt-shriek', type:'sfx', dur:2.5, label:'Attack shriek', prompt:'A sudden piercing creature shriek layered with broken fragments of human speech, sharp violent attack'},
  {id:'crt-stalk', type:'sfx', dur:5, loop:true, label:'Stalking breath', prompt:'A creature stalking nearby: wet rattling breathing and low clicks, intimate and threatening, loopable'},
 ]},
 {c:'Music stems', items:[
  {id:'mus-explore', type:'music', len:40000, label:'Exploration dread bed', prompt:'Slow dark ambient horror underscore for exploring a derelict spaceship: deep drones, sparse metallic textures, creeping dread, no drums'},
  {id:'mus-combat', type:'music', len:30000, label:'Combat tension', prompt:'Tense rising horror combat music: pulsing low percussion, dissonant strings, panic and momentum'},
  {id:'mus-stinger', type:'music', len:5000, label:'Jump-scare stinger', prompt:'A sharp sudden horror stinger: a dissonant orchestral hit for a jump scare, then silence'},
  {id:'mus-climax', type:'music', len:35000, label:'COMMS-RESTORE climax', prompt:'A desperate, bittersweet orchestral swell as a long-lost signal finally reaches home, cinematic horror climax'},
 ]},
 {c:'Scripted lines (v3 audio tags · uses a voice above)', items:[
  {id:'vox-vesta-1', type:'voice', label:'VESTA — the signal', prompt:'[calm] Correction. One signal active. [pause] It is not on our manifest.'},
  {id:'vox-vesta-2', type:'voice', label:'VESTA — breach', prompt:'[urgent] Warning. Hull breach detected. [pause] Decompression imminent. [firmly] Brace.'},
  {id:'vox-vesta-3', type:'voice', label:'VESTA — do not answer', prompt:'[whispering] Do not restore communications. [pause] Whatever asks you to... [slowly] do not answer it.'},
  {id:'vox-distress', type:'voice', label:'Distress log', prompt:'[shaky breath] If anyone receives this... [scared] do not dock. [whispering] Do not answer it. [trembling] It learns your voice. [exhales] It is already using mine.'},
 ]},
];

const $=s=>document.querySelector(s);
const keyEl=$('#key'), voiceEl=$('#voice'), modelEl=$('#model'), vdModelEl=$('#vdmodel'), connstat=$('#connstat');
keyEl.value=localStorage.getItem('elKey')||'';
let manifest={};
const fmt=b=> b>=1048576 ? (b/1048576).toFixed(2)+' MB' : (b/1024).toFixed(1)+' KB';
function hdrs(){ return {'Content-Type':'application/json','x-eleven-key':keyEl.value.trim()}; }

function renderVD(){
  const wrap=$('#vdlist'); wrap.innerHTML='<div class="cat vd">Voices — design new (Voice Design · v3 audio tags)</div>';
  for(const v of VOICE_DESIGN){
    const el=document.createElement('div'); el.className='item vd'; el.dataset.id=v.id;
    el.innerHTML=`
      <div class="head"><span class="name">${v.name}</span><span class="tag">voice design</span><span class="id">${v.id}</span></div>
      <label class="lbl">voice description (defines how it sounds)</label>
      <textarea class="desc">${v.desc}</textarea>
      <label class="lbl">preview line (what it says · use [tags] for emotion · 100–1000 chars)</label>
      <textarea class="vtext">${v.text}</textarea>
      <div class="row"><button class="design">Design 3 previews ▸</button><span class="stat status">not generated</span></div>
      <div class="previews"></div>`;
    el.querySelector('.design').onclick=()=>design(v, el);
    wrap.appendChild(el);
    const prev=Object.values(manifest).filter(m=>m.id.startsWith(v.id+'-preview-'));
    if(prev.length){ el.querySelector('.previews').innerHTML=prev.map(m=>`<div class="pv"><b>${fmt(m.size)}</b><audio controls preload="none" src="/${m.file}?t=${Date.now()}"></audio> <span style="color:#54616d">(re-design to enable save)</span></div>`).join(''); }
  }
}
function render(){
  const list=$('#list'); list.innerHTML='';
  for(const grp of CATALOG){
    const h=document.createElement('div'); h.className='cat'; h.textContent=grp.c; list.appendChild(h);
    for(const it of grp.items){
      const el=document.createElement('div'); el.className='item'; el.dataset.id=it.id;
      const dur = it.type==='music' ? (it.len/1000) : (it.dur||4);
      const durCtl = it.type==='voice' ? '' :
        `<label class="stat">${it.type==='music'?'length':'duration'} <input class="dur" type="number" step="0.5" min="0.5" value="${dur}"> s</label>`;
      el.innerHTML=`
        <div class="head"><span class="name">${it.label}</span><span class="tag">${it.type}</span>${it.loop?'<span class="tag">loop</span>':''}<span class="id">${it.id}</span></div>
        <textarea class="prompt">${it.prompt}</textarea>
        <div class="row"><button class="gen">Generate ▸</button>${durCtl}<span class="stat status">not generated</span><span class="meta result"></span></div>`;
      el.querySelector('.gen').onclick=()=>gen(it, el);
      list.appendChild(el);
      if(manifest[it.id]) showResult(el, manifest[it.id]);
    }
  }
  totals();
}
function showResult(el, m){
  const s=el.querySelector('.status'); s.textContent='✓ saved'; s.className='stat status ok';
  el.querySelector('.result').innerHTML=`<b>${fmt(m.size)}</b> · ${(m.createdAt||'').replace('T',' ')} · <audio controls preload="none" src="/${m.file}?t=${Date.now()}"></audio>`;
}
function totals(){ const a=Object.values(manifest); $('#tot').textContent=`${a.length} file${a.length!==1?'s':''} · ${fmt(a.reduce((x,y)=>x+(y.size||0),0))}`; }
async function loadManifest(){ try{ const j=await (await fetch('/api/manifest')).json(); manifest={}; for(const m of j.items) manifest[m.id]=m; }catch(e){} renderVD(); render(); }

async function gen(it, el){
  const key=keyEl.value.trim(); localStorage.setItem('elKey',key);
  const status=el.querySelector('.status'), btn=el.querySelector('.gen');
  if(!key){ status.textContent='⚠ paste your API key first'; status.className='stat status err'; return; }
  const prompt=el.querySelector('.prompt').value; let endpoint, payload;
  if(it.type==='sfx'){ const d=Math.min(30,Math.max(0.5,Number(el.querySelector('.dur').value)||it.dur)); endpoint='/v1/sound-generation'; payload={text:prompt,duration_seconds:d,prompt_influence:0.5,loop:!!it.loop}; }
  else if(it.type==='music'){ const ms=Math.min(600000,Math.max(3000,(Number(el.querySelector('.dur').value)||(it.len/1000))*1000)); endpoint='/v1/music'; payload={prompt,music_length_ms:Math.round(ms)}; }
  else { const v=voiceEl.value; if(!v){ status.textContent='⚠ pick a voice (Connect first)'; status.className='stat status err'; return; } endpoint='/v1/text-to-speech/'+v; payload={text:prompt,model_id:modelEl.value,voice_settings:{stability:0.4,similarity_boost:0.75,style:0.5,use_speaker_boost:true}}; }
  status.textContent='generating…'; status.className='stat status'; btn.disabled=true;
  try{ const j=await (await fetch('/api/generate',{method:'POST',headers:hdrs(),body:JSON.stringify({id:it.id,endpoint,payload,category:it.type})})).json();
    if(!j.ok){ status.textContent='✗ '+(j.error||('HTTP '+(j.status||'?'))); status.className='stat status err'; }
    else { manifest[it.id]=j; showResult(el,j); totals(); }
  }catch(e){ status.textContent='✗ '+e.message; status.className='stat status err'; }
  btn.disabled=false;
}

async function design(v, el){
  const key=keyEl.value.trim(); localStorage.setItem('elKey',key);
  const status=el.querySelector('.status'), btn=el.querySelector('.design');
  if(!key){ status.textContent='⚠ paste your API key first'; status.className='stat status err'; return; }
  const desc=el.querySelector('.desc').value, text=el.querySelector('.vtext').value;
  if(text.length<100){ status.textContent='⚠ preview line must be ≥100 chars'; status.className='stat status err'; return; }
  status.textContent='designing 3 voices…'; status.className='stat status'; btn.disabled=true; el.querySelector('.previews').innerHTML='';
  try{
    const payload={voice_description:desc, model_id:vdModelEl.value, text, guidance_scale:5};
    const j=await (await fetch('/api/design',{method:'POST',headers:hdrs(),body:JSON.stringify({id:v.id,payload})})).json();
    if(!j.ok){ status.textContent='✗ '+(j.error||('HTTP '+(j.status||'?'))); status.className='stat status err'; btn.disabled=false; return; }
    status.textContent='✓ designed — pick one to save'; status.className='stat status ok';
    const pv=el.querySelector('.previews');
    j.previews.forEach((p,i)=>{ const row=document.createElement('div'); row.className='pv';
      row.innerHTML=`<span>#${i+1}</span><b>${fmt(p.size)}</b><audio controls preload="none" src="/${p.file}?t=${Date.now()}"></audio><button class="save">★ Save as voice</button><span class="stat sv"></span>`;
      row.querySelector('.save').onclick=()=>saveVoice(v, p.generated_voice_id, el, row);
      pv.appendChild(row); manifest[p.id]=p; });
    totals();
  }catch(e){ status.textContent='✗ '+e.message; status.className='stat status err'; }
  btn.disabled=false;
}
async function saveVoice(v, gvid, el, row){
  const sv=row.querySelector('.sv'), btn=row.querySelector('.save'); sv.textContent='saving…'; btn.disabled=true;
  try{
    const vname='SL · '+v.name;
    const payload={voice_name:vname, voice_description:el.querySelector('.desc').value, generated_voice_id:gvid};
    const j=await (await fetch('/api/save-voice',{method:'POST',headers:hdrs(),body:JSON.stringify({payload})})).json();
    if(!j.ok){ sv.textContent='✗ '+(j.error||'failed'); sv.className='stat sv err'; }
    else { localStorage.setItem('elVoice',j.voice_id); sv.textContent='✓ saved · '+j.voice_id; sv.className='stat sv ok';
      // keep ONLY this voice for the character — delete any other saved test voices with the same name
      try{ const vl=await (await fetch('/api/voices',{headers:hdrs()})).json();
        if(vl.ok){ const dupes=vl.voices.filter(x=> x.name===vname && x.voice_id!==j.voice_id); let removed=0;
          for(const dv of dupes){ const dr=await (await fetch('/api/delete-voice',{method:'POST',headers:hdrs(),body:JSON.stringify({voice_id:dv.voice_id})})).json(); if(dr.ok) removed++; }
          if(removed){ sv.textContent+=' · removed '+removed+' old test voice'+(removed>1?'s':''); } }
      }catch(e){}
      await refreshVoices();
    }
  }catch(e){ sv.textContent='✗ '+e.message; sv.className='stat sv err'; }
  btn.disabled=false;
}

$('#genall').onclick=async()=>{ for(const grp of CATALOG) for(const it of grp.items){ if(manifest[it.id]) continue; const el=document.querySelector(`#list .item[data-id="${it.id}"]`); if(el) await gen(it, el); } };
async function refreshVoices(){
  const j=await (await fetch('/api/voices',{headers:hdrs()})).json();
  if(!j.ok) return j;
  voiceEl.innerHTML='<option value="">— pick a voice —</option>'+j.voices.map(v=>`<option value="${v.voice_id}">${v.name}</option>`).join('');
  const saved=localStorage.getItem('elVoice'); if(saved) voiceEl.value=saved;
  return j;
}
$('#connect').onclick=async()=>{ const key=keyEl.value.trim(); localStorage.setItem('elKey',key); if(!key){ connstat.textContent='Paste a key first.'; return; }
  connstat.textContent='connecting…';
  try{ const j=await refreshVoices();
    connstat.textContent = j && j.ok ? ('✓ connected · '+j.voices.length+' voices') : ('✗ '+((j&&j.error)||'failed'));
  }catch(e){ connstat.textContent='✗ '+e.message; } };
$('#delvoice').onclick=async()=>{ const vid=voiceEl.value; if(!vid){ connstat.textContent='pick a voice to delete first'; return; }
  const label=voiceEl.options[voiceEl.selectedIndex].text;
  if(!confirm('Delete this voice from your ElevenLabs library?\n\n'+label)) return;
  connstat.textContent='deleting…';
  try{ const j=await (await fetch('/api/delete-voice',{method:'POST',headers:hdrs(),body:JSON.stringify({voice_id:vid})})).json();
    if(!j.ok){ connstat.textContent='✗ '+(j.error||'failed'); return; }
    if(localStorage.getItem('elVoice')===vid) localStorage.removeItem('elVoice');
    await refreshVoices(); connstat.textContent='✓ deleted · '+label;
  }catch(e){ connstat.textContent='✗ '+e.message; } };
keyEl.onchange=()=>localStorage.setItem('elKey',keyEl.value.trim());
voiceEl.onchange=()=>localStorage.setItem('elVoice',voiceEl.value);

loadManifest();
if(keyEl.value) $('#connect').click();
</script>
</body>
</html>
