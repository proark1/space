<style>
  html,body{margin:0;height:100%;background:#070809;overflow:hidden}
  #c{width:100vw;height:100vh;display:block}
  #hud{position:fixed;left:14px;bottom:12px;font:11px ui-monospace,Menlo,monospace;color:#8a97a4;pointer-events:none}

  #title{position:fixed;left:14px;top:12px;font:600 13px ui-monospace,monospace;letter-spacing:3px;color:#E8A33D;pointer-events:none}
  #phase{position:fixed;left:50%;bottom:30px;transform:translateX(-50%);font:11px ui-monospace,monospace;color:#E8A33D;pointer-events:none;letter-spacing:3px;text-shadow:0 0 6px #000}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="title">SIGNAL&nbsp;LOST · LAUNCH</div>
<div id="nav"><a href="/launch">▸ the capsule</a><a href="/exterior">▸ the derelict</a></div>
<div id="hud"><b>drag</b> to orbit · <b>scroll</b> to zoom · she launches on a loop</div>
<div id="phase">— HOLD —</div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>

<script type="module">
import * as THREE from 'three';
import './nav.js?v=2';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
import { Mixer, noiseBed, tone, burst, blip, ClipBank } from './audio.js';
import { FLOW, fadeIn, goNext } from './flow.js';

const canvas=document.getElementById('c');
const DPR=Math.min(window.devicePixelRatio||1,2);
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,powerPreference:'high-performance'});
renderer.setPixelRatio(DPR); renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping; const BASE_EXP=1.18; renderer.toneMappingExposure=BASE_EXP;

const scene=new THREE.Scene();
const SKY_GROUND=new THREE.Color(0x0f1318), SKY_SPACE=new THREE.Color(0x02030a);
const FOG_GROUND=new THREE.Color(0x12161c), FOG_SPACE=new THREE.Color(0x03040b);
scene.background=SKY_GROUND.clone(); scene.fog=new THREE.FogExp2(FOG_GROUND.clone().getHex(),0.0034);
const camera=new THREE.PerspectiveCamera(56,1,0.3,5000); camera.position.set(64,20,70);

const composer=new EffectComposer(renderer); composer.setPixelRatio(DPR);
composer.addPass(new RenderPass(scene,camera));
const bloom=new UnrealBloomPass(new THREE.Vector2(1,1),0.7,0.62,0.62); composer.addPass(bloom);
composer.addPass(new OutputPass());
const Grade=new ShaderPass({
 uniforms:{tDiffuse:{value:null},uTime:{value:0},uRes:{value:new THREE.Vector2(1,1)}},
 vertexShader:`varying vec2 vUv; void main(){vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
 fragmentShader:`varying vec2 vUv; uniform sampler2D tDiffuse; uniform float uTime; uniform vec2 uRes;
  float rnd(vec2 p){return fract(sin(dot(p,vec2(12.9898,78.233)))*43758.5);}
  void main(){vec2 uv=vUv,d=uv-0.5; float ca=0.0006+dot(d,d)*0.0026;
   vec3 col; col.r=texture2D(tDiffuse,uv+d*ca).r; col.g=texture2D(tDiffuse,uv).g; col.b=texture2D(tDiffuse,uv-d*ca).b;
   float g=dot(col,vec3(0.299,0.587,0.114)); col=mix(vec3(g),col,0.85);   // cold desaturated grade (lighter)
   col+=(rnd(uv*uRes+uTime)-0.5)*0.014;
   col*=mix(0.6,1.0,smoothstep(1.25,0.08,length(d))); gl_FragColor=vec4(max(col,0.0),1.0);} `
});
composer.addPass(Grade);
function resize(){const w=innerWidth,h=innerHeight;
 renderer.setSize(w,h,false); composer.setSize(w,h); Grade.uniforms.uRes.value.set(w*DPR,h*DPR);
 camera.aspect=w/h; camera.updateProjectionMatrix();}

const controls=new OrbitControls(camera,canvas);
controls.enableDamping=true; controls.dampingFactor=0.06; controls.autoRotate=true; controls.autoRotateSpeed=0.35;
controls.minDistance=28; controls.maxDistance=360; controls.maxPolarAngle=Math.PI*0.52; controls.target.set(0,14,0);
const launchCamTarget=new THREE.Vector3(), launchCamPos=new THREE.Vector3(), launchLook=new THREE.Vector3();

function snap(m){ return m; }   // outer scene: no PS1 vertex snap — crisp, smooth geometry
function tex(draw,w=256,h=256){ const c=document.createElement('canvas'); c.width=w;c.height=h; draw(c.getContext('2d')); const t=new THREE.CanvasTexture(c); t.colorSpace=THREE.SRGBColorSpace; return t; }
function part(geo,m,parent,x,y,z,rx,ry,rz){ const o=new THREE.Mesh(geo,m); o.position.set(x||0,y||0,z||0); if(rx||ry||rz)o.rotation.set(rx||0,ry||0,rz||0); o.castShadow=o.receiveShadow=true; (parent instanceof THREE.Object3D?parent:scene).add(o); return o; }
const BOX=(w,h,d)=>new THREE.BoxGeometry(w,h,d);
const CYL=(rt,rb,h,s)=>new THREE.CylinderGeometry(rt,rb,h,s||28);
const CONE=(r,h,s)=>new THREE.ConeGeometry(r,h,s||24);
const lerp=(a,b,k)=>a+(b-a)*k, clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const smooth=(a,b,x)=>{ const t=clamp((x-a)/(b-a),0,1); return t*t*(3-2*t); };

// ==BUILD START==
const flick=[], beacons=[], floods=[], plumeCones=[], machD=[];

const grime=tex(x=>{ x.fillStyle='#6e7278'; x.fillRect(0,0,256,256);
  for(let i=0;i<2400;i++){ const v=(Math.random()*46-23)|0; x.fillStyle=`rgba(${110+v},${112+v},${116+v},${Math.random()*0.4})`; const s=Math.random()*3+1; x.fillRect(Math.random()*256,Math.random()*256,s,s);}
  for(let i=0;i<16;i++){ x.strokeStyle=`rgba(24,20,16,${Math.random()*0.4})`; x.beginPath(); x.moveTo(Math.random()*256,0); x.lineTo(Math.random()*256+30,256); x.stroke(); } });
grime.wrapS=grime.wrapT=THREE.RepeatWrapping; grime.repeat.set(3,3);
const M={
  concrete:new THREE.MeshStandardMaterial({color:0x44474c,map:grime,roughness:0.95,metalness:0.05,flatShading:false}),
  pad:     new THREE.MeshStandardMaterial({color:0x2f3338,map:grime,roughness:0.92,metalness:0.1,flatShading:false}),
  steel:   new THREE.MeshStandardMaterial({color:0x6b7079,roughness:0.5,metalness:0.7,flatShading:false}),
  dark:    new THREE.MeshStandardMaterial({color:0x32373d,map:grime,roughness:0.85,metalness:0.4,flatShading:false}),
  rocket:  new THREE.MeshStandardMaterial({color:0xb9bbb6,map:grime,roughness:0.7,metalness:0.25,flatShading:false}),
  rocket2: new THREE.MeshStandardMaterial({color:0x7a7d80,map:grime,roughness:0.72,metalness:0.3,flatShading:false}),
  rust:    new THREE.MeshStandardMaterial({color:0x6e4733,map:grime,roughness:0.95,metalness:0.15,flatShading:false}),
  nozzle:  new THREE.MeshStandardMaterial({color:0x26282c,roughness:0.5,metalness:0.7,flatShading:false}),
  capsule: new THREE.MeshStandardMaterial({color:0xc8c4b6,roughness:0.45,metalness:0.4,flatShading:false}),
  capGlass:new THREE.MeshStandardMaterial({color:0x092638,emissive:0x4db8ff,emissiveIntensity:0.5,roughness:0.08,metalness:0.28,transparent:true,opacity:0.72,depthWrite:false,flatShading:false}),
  hazard:  new THREE.MeshStandardMaterial({color:0x1a1204,emissive:0xE8A33D,emissiveIntensity:0.9,roughness:1}),
  beacon:  new THREE.MeshStandardMaterial({color:0x1a0303,emissive:0xff3525,emissiveIntensity:2.4,roughness:1}),
  flood:   new THREE.MeshStandardMaterial({color:0x222,emissive:0xdfeaff,emissiveIntensity:3.0,roughness:1}),
  win:     new THREE.MeshStandardMaterial({color:0x120e06,emissive:0xE8A33D,emissiveIntensity:1.0,roughness:1}),
  plume:   new THREE.MeshStandardMaterial({color:0x1a0a02,emissive:0xffd27a,emissiveIntensity:3.0,roughness:1,transparent:true,opacity:0.95,blending:THREE.AdditiveBlending,depthWrite:false}),
};
[M.concrete,M.pad,M.steel,M.dark,M.rocket,M.rocket2,M.rust,M.nozzle,M.capsule].forEach(snap);

// ---- lights (overcast night: cool ambient + orange cloud underlight + floodlights) ----
scene.add(new THREE.AmbientLight(0x2a3340,0.55));
scene.add(new THREE.HemisphereLight(0x39414e,0x191512,0.5));
const cloudUnder=new THREE.PointLight(0xff8a3a,0.7,600,1.4); cloudUnder.position.set(0,120,0); scene.add(cloudUnder);
const key=new THREE.DirectionalLight(0x9fb0c8,0.5); key.position.set(-80,90,40); key.castShadow=true;
key.shadow.mapSize.set(2048,2048); key.shadow.camera.near=20; key.shadow.camera.far=320;
key.shadow.camera.left=-90; key.shadow.camera.right=90; key.shadow.camera.top=140; key.shadow.camera.bottom=-20; key.shadow.bias=-0.0005; scene.add(key);

// ---- cloud deck (low overcast dome, dark zenith → orange horizon) ----
const cloudTex=tex(x=>{ const g=x.createLinearGradient(0,0,0,256); g.addColorStop(0,'#0a0d12'); g.addColorStop(0.62,'#1b1c22'); g.addColorStop(0.86,'#5a3a22'); g.addColorStop(1,'#8a4e26'); x.fillStyle=g; x.fillRect(0,0,256,256);
  x.globalAlpha=0.5; for(let i=0;i<120;i++){ const v=(Math.random()*40)|0; x.fillStyle=`rgb(${28+v},${24+v},${26+v})`; x.beginPath(); x.ellipse(Math.random()*256,120+Math.random()*120,30+Math.random()*70,12+Math.random()*22,0,0,7); x.fill(); } x.globalAlpha=1; },256,256);
const cloudMat=new THREE.MeshBasicMaterial({map:cloudTex,side:THREE.BackSide,fog:false});
const cloudDome=new THREE.Mesh(new THREE.SphereGeometry(900,28,18,0,Math.PI*2,0,Math.PI*0.5),cloudMat); scene.add(cloudDome);
// stars (revealed on ascent)
const starsMat=new THREE.PointsMaterial({size:2,sizeAttenuation:false,color:0xcfe0ff,transparent:true,opacity:0,depthWrite:false,fog:false});
{ const N=1400,p=new Float32Array(N*3); for(let i=0;i<N;i++){ const v=new THREE.Vector3().randomDirection().multiplyScalar(820); v.y=Math.abs(v.y)*0.9+30; p[i*3]=v.x;p[i*3+1]=v.y;p[i*3+2]=v.z; } const g=new THREE.BufferGeometry(); g.setAttribute('position',new THREE.BufferAttribute(p,3)); scene.add(new THREE.Points(g,starsMat)); }

// ---- ground + pad + trench + chevrons ----
part(new THREE.PlaneGeometry(1400,1400),M.concrete,scene,0,0,0,-Math.PI/2,0,0).receiveShadow=true;
part(BOX(54,2,54),M.pad,scene,0,1,0);
part(BOX(40,2.6,40),M.dark,scene,0,2.2,0);
part(BOX(12,3.2,12),M.dark,scene,0,2.4,0);                       // flame hole rim
part(BOX(9,6,9),new THREE.MeshBasicMaterial({color:0x000000}),scene,0,-1,0); // dark trench
for(let i=0;i<10;i++){ const a=i/10*Math.PI*2; part(BOX(3,0.1,0.8),M.hazard,scene,Math.cos(a)*22,3.5,Math.sin(a)*22,0,-a,0); }

// ---- gantry / service tower ----
const tower=new THREE.Group(); scene.add(tower); tower.position.set(-12,0,0);
for(const sx of [-3,3]) for(const sz of [-3,3]) part(BOX(0.7,52,0.7),M.steel,tower,sx,26,sz);
for(let y=4;y<=50;y+=4){ part(BOX(6.6,0.4,0.4),M.steel,tower,0,y,3); part(BOX(6.6,0.4,0.4),M.steel,tower,0,y,-3); part(BOX(0.4,0.4,6.6),M.steel,tower,3,y,0); part(BOX(0.4,0.4,6.6),M.steel,tower,-3,y,0);
  if(y%8===0){ part(BOX(6.4,0.3,6.4),M.dark,tower,0,y,0); } }
for(const y of [12,22,32]){ part(BOX(9,0.6,1.2),M.steel,tower,7,y,0); part(CYL(0.25,0.25,8,8),M.rust,tower,11.5,y,0,0,0,Math.PI/2); } // umbilical arms
beacons.push(part(new THREE.SphereGeometry(0.5,8,8),M.beacon,tower,0,52.5,0).material);
beacons.push(part(new THREE.SphereGeometry(0.4,8,8),M.beacon,tower,3,40,3).material);

// ---- blast walls + distant base silhouette ----
for(let i=0;i<5;i++){ const a=Math.PI*0.5+i*0.5; part(BOX(14,7,2),M.concrete,scene,Math.cos(a)*42,3.5,Math.sin(a)*42,0,-a,0.05); }
for(let i=0;i<26;i++){ const a=Math.random()*Math.PI*2, r=240+Math.random()*180, h=8+Math.random()*46; const b=part(BOX(10+Math.random()*16,h,10+Math.random()*16),M.dark,scene,Math.cos(a)*r,h/2,Math.sin(a)*r);
  if(Math.random()>0.5) part(BOX(0.6,0.6,0.6),M.win,scene,Math.cos(a)*r+(Math.random()-0.5)*6,h*0.6,Math.sin(a)*r+(Math.random()-0.5)*6); }

// ---- floodlight masts ----
for(let i=0;i<5;i++){ const a=Math.PI*0.2+i*0.42, r=30; const x=Math.cos(a)*r, z=Math.sin(a)*r;
  part(CYL(0.3,0.4,16,8),M.steel,scene,x,8,z); const head=part(BOX(1.6,1.0,0.6),M.flood,scene,x,16,z); floods.push(head.material);
  const sp=new THREE.SpotLight(0xdfeaff,120,80,Math.PI/7,0.4,1.6); sp.position.set(x,16,z); sp.target.position.set(0,16,0); scene.add(sp); scene.add(sp.target); }
// rotating klaxon
const klaxon=new THREE.Group(); scene.add(klaxon); klaxon.position.set(16,9,12);
part(CYL(0.3,0.3,9,8),M.steel,klaxon,0,-4,0); part(new THREE.SphereGeometry(0.7,10,10),M.beacon,klaxon,0,1,0);
const klaxonBeam=part(CONE(2.2,9,12),new THREE.MeshBasicMaterial({color:0xffa030,transparent:true,opacity:0.16,depthWrite:false,blending:THREE.AdditiveBlending,fog:false}),klaxon,0,1,4.2,Math.PI/2,0,0);

// ---- THE ROCKET (rises as a whole; origin at pad deck) ----
const rocket=new THREE.Group(); scene.add(rocket); rocket.position.set(0,3,0);
(function buildRocket(g){
  part(CYL(2.6,2.8,22,36),M.rocket,g,0,15,0);                                  // booster body
  for(let y=6;y<=24;y+=3) part(CYL(2.83,2.83,0.5,36),M.rocket2,g,0,y,0);        // bands
  part(BOX(0.5,18,0.5),M.rust,g,2.6,15,0.6); part(BOX(0.4,16,0.4),M.dark,g,-2.4,15,1.0); // conduits
  for(let i=0;i<3;i++){ const a=i/3*Math.PI*2; part(BOX(2.0,0.5,0.12),M.hazard,g,Math.cos(a)*2.7,7+i*0.0,Math.sin(a)*2.7,0,-a,0); } // hazard ring
  part(CYL(2.8,2.2,2.4,32),M.nozzle,g,0,3.5,0);                                 // engine skirt
  for(let i=0;i<5;i++){ const a=i/5*Math.PI*2, r=i<4?1.4:0; const nx=i<4?Math.cos(a)*r:0, nz=i<4?Math.sin(a)*r:0; part(CONE(0.85,1.8,12),M.nozzle,g,nx,1.6,nz,Math.PI,0,0); }
  part(CYL(2.2,2.6,1.6,32),M.dark,g,0,27.2,0);                                  // interstage
  part(CYL(2.0,2.2,7,36),M.rocket,g,0,31.5,0);                                  // 2nd stage
  for(const a of [0,Math.PI*0.5,Math.PI,Math.PI*1.5]) part(BOX(0.4,7,0.3),M.rocket2,g,Math.cos(a)*2.05,31.5,Math.sin(a)*2.05);
  // capsule (matches the /launch & /exterior silhouette)
  part(CYL(1.7,2.0,2.4,16),M.dark,g,0,36,0);                                    // adapter
  part(CYL(1.5,1.7,2.6,16),M.capsule,g,0,38.6,0);                               // capsule body
  part(CONE(1.5,2.4,16),M.capsule,g,0,41.4,0);                                  // capsule nose
  part(CYL(1.26,1.46,0.34,16),M.capGlass,g,0,39.7,0);                           // panoramic glass belt
  part(CYL(0.55,1.18,1.2,16),M.capGlass,g,0,41.15,0);                           // glass roof/canopy below the escape tower
  for(const a of [0,Math.PI*0.5,Math.PI,Math.PI*1.5]){
    part(BOX(0.08,1.25,0.86),M.capGlass,g,Math.cos(a)*1.48,38.75,Math.sin(a)*1.48,0,-a,0);
  }
  part(CYL(0.18,0.18,4.2,10),M.steel,g,0,44.8,0);                               // launch-escape tower
  part(CONE(0.5,1.2,10),M.rust,g,0,47.4,0);
  // fins / strakes
  for(const a of [0,Math.PI*0.5,Math.PI,Math.PI*1.5]) part(BOX(0.3,4,2.6),M.dark,g,Math.cos(a)*2.9,5,Math.sin(a)*2.9,0,-a,0);
  // greeble
  for(let i=0;i<40;i++){ const a=Math.random()*Math.PI*2, y=6+Math.random()*30, s=0.2+Math.random()*0.7; part(BOX(s,s*1.4,s*0.5),Math.random()>0.7?M.rust:M.rocket2,g,Math.cos(a)*2.72,y,Math.sin(a)*2.72,0,-a,0); }
})(rocket);

// ---- engine plume (emissive cones + light; ignites/sustains on the timeline) ----
const plume=new THREE.Group(); rocket.add(plume); plume.position.set(0,0.6,0); plume.scale.set(0.001,0.001,0.001);
plumeCones.push(part(CONE(1.9,6,14),M.plume.clone(),plume,0,-3,0,Math.PI,0,0));
plumeCones.push(part(CONE(1.2,10,14),M.plume.clone(),plume,0,-6,0,Math.PI,0,0));
plumeCones.push(part(CONE(0.7,16,12),new THREE.MeshBasicMaterial({color:0xfff0c0,transparent:true,opacity:0.7,depthWrite:false,blending:THREE.AdditiveBlending,fog:false}),plume,0,-9,0,Math.PI,0,0));
for(let i=0;i<5;i++){ const dia=part(new THREE.SphereGeometry(0.55-i*0.07,8,8),new THREE.MeshBasicMaterial({color:0xfff4d0,transparent:true,opacity:0,depthWrite:false,blending:THREE.AdditiveBlending,fog:false}),plume,0,-2.5-i*2.0,0); machD.push(dia); }  // mach diamonds
const plumeLight=new THREE.PointLight(0xff9a40,0,60,2); plumeLight.position.set(0,1,0); rocket.add(plumeLight);

// ---- rain ----
const RAINN=650, rainPos=new Float32Array(RAINN*3);
for(let i=0;i<RAINN;i++){ rainPos[i*3]=(Math.random()-0.5)*180; rainPos[i*3+1]=Math.random()*120; rainPos[i*3+2]=(Math.random()-0.5)*180; }
const rainGeo=new THREE.BufferGeometry(); rainGeo.setAttribute('position',new THREE.BufferAttribute(rainPos,3));
const rain=new THREE.Points(rainGeo,new THREE.PointsMaterial({color:0x9fb4c4,size:0.95,sizeAttenuation:true,transparent:true,opacity:0.26,depthWrite:false,fog:true})); scene.add(rain);

// ---- smoke (pad steam pre-launch → ground billow on ignition) ----
const SMOKEN=440, smokePos=new Float32Array(SMOKEN*3), smokeSeed=new Float32Array(SMOKEN);
for(let i=0;i<SMOKEN;i++){ const a=Math.random()*Math.PI*2, r=Math.random(); smokePos[i*3]=Math.cos(a)*r; smokePos[i*3+1]=Math.random()*0.4; smokePos[i*3+2]=Math.sin(a)*r; smokeSeed[i]=Math.random(); }
const smokeGeo=new THREE.BufferGeometry(); smokeGeo.setAttribute('position',new THREE.BufferAttribute(smokePos,3));
// soft round puff texture so the points feather and overlap into smooth smoke (instead of hard squares)
const smokeTex=tex(x=>{ const g=x.createRadialGradient(128,128,2,128,128,126); g.addColorStop(0,'rgba(255,255,255,0.92)'); g.addColorStop(0.4,'rgba(236,239,243,0.5)'); g.addColorStop(0.75,'rgba(206,211,218,0.15)'); g.addColorStop(1,'rgba(200,205,210,0)'); x.fillStyle=g; x.fillRect(0,0,256,256); });
const smokeMat=new THREE.PointsMaterial({color:0xbfc4c8,map:smokeTex,size:8,sizeAttenuation:true,transparent:true,opacity:0.0,depthWrite:false,fog:true});
const smoke=new THREE.Points(smokeGeo,smokeMat); scene.add(smoke); smoke.position.set(0,3,0);
// ==BUILD END==

// ---- timeline + render ----
const phaseEl=document.getElementById('phase');
const clock=new THREE.Clock();
const _c=new THREE.Color();
// event-driven launch: ignition fires at `launchAt`; before it she holds on the pad and counts down.
const FLOW_FAST=FLOW && new URLSearchParams(location.search).get('fast')==='1';
const IGN=0.6, CLIMB=FLOW_FAST?4.2:12, FLIGHT=FLOW_FAST?5.4:13.5, HOLD0=FLOW_FAST?0.6:7.0, RELOOP=7.0;     // seconds
let T=0, launchAt=null, holdDur=HOLD0, prevSince=-1, lightning=0, lastBeep=99, voCountdown=false;
function armLaunch(d){ launchAt=T+d; holdDur=d; lastBeep=99; }   // (re)arm — ignition in d seconds
function setPhase(s){ if(phaseEl.textContent!==s) phaseEl.textContent=s; }
function animate(){ requestAnimationFrame(animate); const dt=Math.min(clock.getDelta(),0.05); T+=dt; const t=T;
  if(launchAt===null){ launchAt=T+HOLD0; holdDur=HOLD0; }        // auto-arm; audio VO re-arms this to sync ignition to the spoken countdown
  const since=T-launchAt;                                        // <0 = hold/countdown, >=0 = flight
  // --- flight curve (seconds since ignition) ---
  let burn=0, ry=0, dark=0;
  if(since>=0){ burn=smooth(0,IGN,since); const p=since/CLIMB; ry=p*p*340; dark=FLOW_FAST?smooth(2.1,4.6,since):smooth(6,13,since); }
  rocket.position.y=3+ry;
  // plume
  plume.scale.set(lerp(0.001,1.0,burn), lerp(0.001,1.0,burn*(0.7+0.3*Math.sin(t*30+1))), lerp(0.001,1.0,burn));
  plume.visible=burn>0.01; plumeLight.intensity=burn*55*(0.85+0.15*Math.sin(t*45));
  for(const c of plumeCones){ if(c.material.emissive) c.material.emissiveIntensity=3.0*(0.8+0.2*Math.sin(t*38+c.id)); }
  for(let i=0;i<machD.length;i++){ machD[i].visible=burn>0.06; machD[i].material.opacity=burn*(0.5+0.45*Math.sin(t*30-i*1.3)); }
  // smoke billows at ignition, drifts, fades as she climbs
  const billow=since>=0?smooth(0,2.2,since):0;
  smoke.scale.set(lerp(2,34,billow), lerp(1,12,billow), lerp(2,34,billow));
  smokeMat.opacity=0.6*billow*(1-(since>=0?smooth(7,12,since):0));
  // --- sky darkens as she climbs out of the weather ---
  scene.background.copy(SKY_GROUND).lerp(SKY_SPACE,dark);
  scene.fog.color.copy(FOG_GROUND).lerp(FOG_SPACE,dark); scene.fog.density=lerp(0.0034,0.0006,dark);
  cloudMat.color.copy(_c.setRGB(1,1,1)).lerp(_c.clone().setRGB(0.18,0.2,0.26),dark*0.7);
  starsMat.opacity=dark*0.9; lightning*=0.88; cloudUnder.intensity=lerp(0.7,0.05,dark)+lightning*5;
  // --- audio: countdown in the final seconds of HOLD, GO + ignition exactly at launchAt ---
  if(padAudio){ padAudio.thrust(burn,dark); padAudio.klaxon(since<-0.2,t);
    if(since<0 && !voCountdown){ const n=Math.ceil(-since); if(n>=1 && n<=4 && n!==lastBeep){ lastBeep=n; padAudio.beep(false); } }   // procedural 4..1 when no spoken VO
    if(prevSince<0 && since>=0){ padAudio.ignite(); padAudio.beep(true); }                                                            // GO + ignition at launchAt
  }
  if(since<-0.2 && Math.random()<0.0045){ lightning=0.55+Math.random()*0.45; if(padAudio) padAudio.thunder(); }
  prevSince=since;
  if(since>FLIGHT){ if(FLOW){ goNext('/launch?flow=1'); } else { armLaunch(RELOOP); voCountdown=false; } }   // flow: cut to the cockpit transit; standalone: loop
  // --- fade in at each hold start, fade out at reset (hides the seam) ---
  let fade=1; const tin=since+holdDur;
  if(tin<0.8) fade=smooth(0,0.8,tin);
  if(since>FLIGHT-0.8) fade=Math.min(fade,1-smooth(FLIGHT-0.8,FLIGHT,Math.min(since,FLIGHT)));
  renderer.toneMappingExposure=BASE_EXP*fade*(1+lightning*0.5);
  // --- camera follows her up; ambient pad life ---
  // Once she leaves the tower, the launch becomes a scripted tracking shot so the rocket
  // stays in frame until the cockpit handoff.
  if(since>=-0.2){
    controls.autoRotate=false;
    controls.enabled=false;
    const rocketY=rocket.position.y+30;
    const follow=smooth(-0.2,1.4,since);
    const high=smooth(CLIMB*0.34,CLIMB*0.98,since);
    launchCamTarget.set(0,clamp(rocketY,18,430),0);
    launchCamPos.set(
      lerp(58,38,follow)+high*32,
      launchCamTarget.y+lerp(13,30,high),
      lerp(70,92,follow)+high*44
    );
    const chase=FLOW_FAST?0.46:0.34;
    camera.position.lerp(launchCamPos,follow?chase:0.2);
    launchLook.copy(controls.target).lerp(launchCamTarget,follow?(FLOW_FAST?0.62:0.5):0.28);
    controls.target.copy(launchLook);
    camera.lookAt(controls.target);
  } else {
    controls.enabled=true;
    controls.autoRotate=true;
    controls.target.y += (clamp(14+ry*0.5,14,150)-controls.target.y)*0.04;
  }
  for(const b of beacons) b.emissiveIntensity=(Math.sin(t*4)>0.4)?2.6:0.3;
  for(const f of floods) f.emissiveIntensity=3.0*(0.9+0.1*Math.sin(t*20+f.id*0.1));
  klaxon.rotation.y=t*2.2;
  for(let i=0;i<RAINN;i++){ rainPos[i*3+1]-= (60+ (i%30))*dt; if(rainPos[i*3+1]<0){ rainPos[i*3+1]=110+Math.random()*20; rainPos[i*3]=(Math.random()-0.5)*180; rainPos[i*3+2]=(Math.random()-0.5)*180; } }
  rainGeo.attributes.position.needsUpdate=true; rain.material.opacity=lerp(0.26,0.0,dark);
  for(let i=0;i<SMOKEN;i++){ smokePos[i*3+1]+= (0.2+smokeSeed[i]*0.5)*dt; if(smokePos[i*3+1]>3.5) smokePos[i*3+1]=0; }
  smokeGeo.attributes.position.needsUpdate=true;
  setPhase(since<-4?'— HOLD —':since<0?'>> COUNTDOWN':since<IGN?'>> IGNITION':since<6?'>> LIFTOFF':since<13?'>> ASCENT':'· · ·');
  if(controls.enabled) controls.update();
  const shk=burn*0.45*(1-dark*0.6); if(shk>0.001){ camera.position.x+=(Math.random()-0.5)*shk; camera.position.y+=(Math.random()-0.5)*shk; camera.position.z+=(Math.random()-0.5)*shk; }
  Grade.uniforms.uTime.value=t; composer.render();
}

// ---- launch soundscape (rich procedural; auto-layers real Audio Forge clips) ----
let padAudio=null;
function startAudio(){ if(padAudio)return; try{
  const mix=new Mixer(0.95); mix.resume(); const ctx=mix.ctx, B=mix.master;
  const rain=noiseBed(ctx,B,{type:'bandpass',freq:2200,q:0.5,gain:0.016});        // soft rain (was way too loud)
  noiseBed(ctx,B,{type:'highpass',freq:6500,q:0.4,gain:0.004});                   // faint drizzle
  tone(ctx,B,{type:'sawtooth',freq:44,gain:0.008});                              // distant industrial hum
  // engine roar voiced across the spectrum so it is audible on laptop speakers, not just inaudible sub-bass
  const roarSub=noiseBed(ctx,B,{type:'lowpass',freq:95,q:1.0,gain:0});
  const roarMid=noiseBed(ctx,B,{type:'bandpass',freq:480,q:0.4,gain:0});
  const roarHi =noiseBed(ctx,B,{type:'highpass',freq:1500,q:0.3,gain:0});          // the crackle you can actually hear
  const sub=tone(ctx,B,{type:'sine',freq:36,gain:0});
  const klax=tone(ctx,B,{type:'sine',freq:520,gain:0});                           // soft alarm, not a harsh square beep
  padAudio={
    thrust(v,dark){ roarSub.g.gain.value=v*0.32; roarMid.g.gain.value=v*0.30*(1-dark*0.5); roarHi.g.gain.value=v*0.15*(1-dark*0.6); sub.g.gain.value=v*0.16; rain.g.gain.value=0.016*(1-dark*0.9); },
    klaxon(on,t){ klax.g.gain.value=on?(Math.sin(t*5)>0.4?0.005:0):0; },
    ignite(){ burst(ctx,B,{type:'lowpass',freq:170,q:0.7,gain:0.5,decay:1.3}); burst(ctx,B,{type:'bandpass',freq:1300,q:0.4,gain:0.32,decay:0.8}); burst(ctx,B,{type:'highpass',freq:3200,q:0.3,gain:0.16,decay:0.45}); },
    thunder(){ burst(ctx,B,{type:'lowpass',freq:80,q:0.8,gain:0.26,decay:1.6}); },
    beep(go){ blip(ctx,B,{type:'sine',freq:go?900:560,gain:0.13,dur:go?0.5:0.16}); },
  };
  // ambience beds + the spoken countdown (generate vox-control-count with the Earth Control voice in /admin).
  // Ignition is synced to the END of the spoken countdown, so she lifts off exactly on "...one."
  new ClipBank(mix).load().then(async b=>{
    b.play('pad-rain',{loop:true,gain:0.22}); b.play('pad-ambience',{loop:true,gain:0.4});
    const Dc=await b.dur('vox-control-count');
    if(Dc){ voCountdown=true; const lead=0.8; setTimeout(()=>b.play('vox-control-count',{gain:1.1}), lead*1000); armLaunch(lead+Dc+0.2); }
    else armLaunch(HOLD0);
  });
}catch(e){} }
addEventListener('pointerdown',startAudio);

window.__pad={rocket,camera,controls,get state(){ const top=new THREE.Vector3(0,rocket.position.y+48,0).project(camera); const mid=new THREE.Vector3(0,rocket.position.y+24,0).project(camera); return {rocketY:rocket.position.y,cameraY:camera.position.y,targetY:controls.target.y,flowFast:FLOW_FAST,rocketNdc:{topX:top.x,topY:top.y,midX:mid.x,midY:mid.y}}; }};
addEventListener('resize',resize); resize(); fadeIn(); animate();
</script>
