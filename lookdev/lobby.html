function normalizeUnitSettings(value,fallback=adminUnitSettings){
  const source=value&&typeof value==='object'?value:{};
  return {
    height:finiteNumber(source.height,fallback.height),
    scale:finiteNumber(source.scale,fallback.scale),
    yaw:finiteNumber(source.yaw,fallback.yaw),
    positionY:finiteNumber(source.positionY,fallback.positionY),
    colliderRadius:finiteNumber(source.colliderRadius,fallback.colliderRadius),
    colliderHeight:finiteNumber(source.colliderHeight,fallback.colliderHeight),
    materialEnabled:typeof source.materialEnabled==='boolean'?source.materialEnabled:!!source.materialColor,
    materialColor:typeof source.materialColor==='string'?source.materialColor:fallback.materialColor,
    emissiveEnabled:typeof source.emissiveEnabled==='boolean'?source.emissiveEnabled:!!source.emissiveColor,
    emissiveColor:typeof source.emissiveColor==='string'?source.emissiveColor:fallback.emissiveColor,
    emissiveIntensity:finiteNumber(source.emissiveIntensity,fallback.emissiveIntensity),
    showCollider:typeof source.showCollider==='boolean'?source.showCollider:fallback.showCollider

}

const Grade=new ShaderPass({
 uniforms:{tDiffuse:{value:null},uTime:{value:0},uRes:{value:new THREE.Vector2(1,1)}},
 vertexShader:`varying vec2 vUv; void main(){vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
 fragmentShader:`varying vec2 vUv; uniform sampler2D tDiffuse; uniform float uTime; uniform vec2 uRes;
  float rnd(vec2 p){return fract(sin(dot(p,vec2(12.9898,78.233)))*43758.5);}
  void main(){vec2 uv=vUv,d=uv-0.5; float ca=0.0004+dot(d,d)*0.0018;
   vec3 col; col.r=texture2D(tDiffuse,uv+d*ca).r; col.g=texture2D(tDiffuse,uv).g; col.b=texture2D(tDiffuse,uv-d*ca).b;
   col+=(rnd(uv*uRes+uTime)-0.5)*0.01; col*=mix(0.74,1.0,smoothstep(1.25,0.12,length(d))); gl_FragColor=vec4(max(col,0.0),1.0);} `
});
composer.addPass(Grade);
function resize(){const w=innerWidth,h=innerHeight; renderer.setSize(w,h,false); composer.setSize(w,h); Grade.uniforms.uRes.value.set(w*DPR,h*DPR); camera.aspect=w/h; camera.updateProjectionMatrix();}

function part(geo,m,parent,x,y,z,rx,ry,rz){const o=new THREE.Mesh(geo,m);o.position.set(x||0,y||0,z||0);if(rx||ry||rz)o.rotation.set(rx||0,ry||0,rz||0);o.castShadow=o.receiveShadow=true;(parent instanceof THREE.Object3D?parent:scene).add(o);return o;}

function makeHazardTex(){ const c=document.createElement('canvas'); c.width=192; c.height=64; const x=c.getContext('2d');
  x.fillStyle='#c79234'; x.fillRect(0,0,192,64);
  x.fillStyle='#16191f'; for(let i=-64;i<192;i+=40){ x.beginPath(); x.moveTo(i,0); x.lineTo(i+20,0); x.lineTo(i+20-64,64); x.lineTo(i-64,64); x.closePath(); x.fill(); }
  const t=new THREE.CanvasTexture(c); t.colorSpace=THREE.SRGBColorSpace; t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(2,1); return t; }

function posterFallback(label,color='#9fd0ff'){
  const c=document.createElement('canvas'); c.width=768; c.height=1024; const x=c.getContext('2d');
  x.fillStyle='#060b10'; x.fillRect(0,0,c.width,c.height);
  x.strokeStyle=color; x.lineWidth=18; x.strokeRect(38,38,c.width-76,c.height-76);
  x.fillStyle='rgba(255,255,255,.05)'; for(let i=0;i<42;i++){ x.fillRect(Math.random()*c.width,Math.random()*c.height,Math.random()*120+20,2); }
  x.fillStyle=color; x.font='bold 74px monospace'; x.textAlign='center'; x.textBaseline='middle';
  label.split(' ').forEach((word,i,arr)=>x.fillText(word,c.width/2,c.height/2+(i-(arr.length-1)/2)*88));
  const t=new THREE.CanvasTexture(c); t.colorSpace=THREE.SRGBColorSpace; t.anisotropy=8; return t;
}
function framePoster(w,h,x,y,z,ry){
  const side=Math.abs(Math.sin(ry))>0.7;
  const fx=side ? x+(x<0?-0.08:0.08) : x;
  const fz=side ? z : z+(z<0?-0.08:0.08);
  return side ? part(BOX(0.1,h+0.18,w+0.18),M.trim,scene,fx,y,fz) : part(BOX(w+0.18,h+0.18,0.1),M.trim,scene,fx,y,fz);
}
function generatedWallArt(id,label,w,h,x,y,z,ry=0,color='#9fd0ff',glow=0.44){
  framePoster(w,h,x,y,z,ry);
  const fallback=posterFallback(label,color);
  const mat=new THREE.MeshStandardMaterial({map:fallback,emissive:0xffffff,emissiveMap:fallback,emissiveIntensity:glow,color:0x000000,roughness:1});
  const plane=new THREE.Mesh(new THREE.PlaneGeometry(w,h),mat);
  plane.position.set(x,y,z); plane.rotation.y=ry; scene.add(plane);
  loadManifestTexture(THREE,id).then(tex=>{ if(!tex)return; mat.map=tex; mat.emissiveMap=tex; mat.needsUpdate=true; });
  return plane;
}

function drawBig(cur){

  gx.fillStyle='#4f8f6e'; gx.fillText('CREW',840,478); gx.fillStyle='#7dffb0'; gx.fillText('4 / 4  READY',1000,478);
  bigTex.needsUpdate=true;
}

const bigScreen=new THREE.Mesh(new THREE.PlaneGeometry(8.4,2.9),new THREE.MeshStandardMaterial({map:bigTex,emissive:0x66ffaa,emissiveMap:bigTex,emissiveIntensity:1.15,color:0x000000,roughness:1,side:THREE.DoubleSide}));

let adminLobbyModel=null, adminLobbyModelUrl='', adminLobbyModelBase=null;
function tuneAdminLobbyModel(cfg){
  if(!adminLobbyModel||!adminLobbyModelBase)return;
  adminLobbyModel.scale.copy(adminLobbyModelBase.scale).multiplyScalar(finiteNumber(cfg.scale,1));
  adminLobbyModel.rotation.y=adminLobbyModelBase.rotationY+finiteNumber(cfg.rotationY,0);
  adminLobbyModel.position.copy(adminLobbyModelBase.position);
  adminLobbyModel.position.y+=finiteNumber(cfg.positionY,0);
  adminLobbyModel.position.z-=1.5;
}
async function applyAdminLobbyConfig(cfg){
  if(!cfg)return;
  applyMaterialTuning({
    base:[M.floor,M.wall,M.wall2,M.trim,M.door,M.crate],
    emissive:[M.strip,M.amber]
  }, cfg, 0xc9ced6, 0xbfe9ff);
  ambientLight.intensity=finiteNumber(cfg.ambientIntensity,ambientLight.intensity);
  key.intensity=finiteNumber(cfg.keyIntensity,key.intensity);
  if(scene.fog) scene.fog.density=finiteNumber(cfg.fogDensity,scene.fog.density);
  const modelUrl=typeof cfg.modelUrl==='string'?cfg.modelUrl.trim():'';
  if(modelUrl!==adminLobbyModelUrl){
    if(adminLobbyModel){ scene.remove(adminLobbyModel); adminLobbyModel=null; adminLobbyModelBase=null; }
    adminLobbyModelUrl=modelUrl;
    if(modelUrl){
      adminLobbyModel=await attachAdminModel(THREE,GLTFLoader,scene,cfg,{targetSize:5});
      if(adminLobbyModel){
        adminLobbyModelBase={
          position:adminLobbyModel.position.clone(),
          rotationY:adminLobbyModel.rotation.y,
          scale:adminLobbyModel.scale.clone()
        };
      }
    }
  }
  tuneAdminLobbyModel(cfg);
}
async function applyAdminLobby(){
  const cfg=await loadAdminScene('lobby');
  await applyAdminLobbyConfig(cfg);
}
void applyAdminLobby();
addEventListener('message',event=>{

});
function applyAdminUnitSettings(settings){
  if(ADMIN_UNIT&&ADMIN_UNIT!=='unit-crate')return;
  adminUnitSettings=normalizeUnitSettings(settings,adminUnitSettings);
  const scale=Math.max(0.05,adminUnitSettings.scale*(adminUnitSettings.height/1.8));
  for(const target of adminCrateTargets){
    target.mesh.position.copy(target.position);
    target.mesh.position.y+=adminUnitSettings.positionY;
    target.mesh.rotation.y=target.rotationY+adminUnitSettings.yaw;
    target.mesh.scale.copy(target.scale).multiplyScalar(scale);
    if(target.mesh.material?.color){
      if(!target.mesh.material.userData.adminBaseColor)target.mesh.material.userData.adminBaseColor=target.mesh.material.color.clone();
      if(adminUnitSettings.materialEnabled)target.mesh.material.color.set(adminUnitSettings.materialColor);
      else target.mesh.material.color.copy(target.mesh.material.userData.adminBaseColor);
    }
    if(target.mesh.material?.emissive){
      if(!target.mesh.material.userData.adminBaseEmissive)target.mesh.material.userData.adminBaseEmissive=target.mesh.material.emissive.clone();
      if(adminUnitSettings.emissiveEnabled){ target.mesh.material.emissive.set(adminUnitSettings.emissiveColor); target.mesh.material.emissiveIntensity=adminUnitSettings.emissiveIntensity; }
      else target.mesh.material.emissive.copy(target.mesh.material.userData.adminBaseEmissive);
    }
    target.collider.visible=adminUnitSettings.showCollider!==false;
    target.collider.position.set(target.position.x,adminUnitSettings.positionY+Math.max(0.01,adminUnitSettings.colliderHeight)*0.5,target.position.z);
    target.collider.scale.set(Math.max(0.01,adminUnitSettings.colliderRadius),Math.max(0.01,adminUnitSettings.colliderHeight),Math.max(0.01,adminUnitSettings.colliderRadius));
  }
}
void loadAdminUnitSettings().then(()=>applyAdminUnitSettings(adminUnitSettings));

  if(event.data.unitId&&event.data.unitId!==ADMIN_UNIT)return;

// ---- FP / TP controller ----
const EYE=1.95, SPEED=3.4, BACK=3.6;
const pos=new THREE.Vector3(1.6,0,3.2); let yaw=-0.6, pitch=-0.04, mode='fp', locked=false;   // face between the hatch and the big briefing screen
const OBST=[];   // clear lobby floor: no crate/bench blockers in the player path
function pushOut(cx,cz,r){ const dx=pos.x-cx, dz=pos.z-cz, d=Math.hypot(dx,dz); if(d>1e-4 && d<r){ pos.x=cx+dx/d*r; pos.z=cz+dz/d*r; } }
const keys={};
const lockEl=document.getElementById('lock'), viewEl=document.getElementById('view');
canvas.addEventListener('click',()=>{ if(!locked) canvas.requestPointerLock(); });
document.addEventListener('pointerlockchange',()=>{ locked=document.pointerLockElement===canvas; lockEl.style.display=locked?'none':'block'; });
document.addEventListener('mousemove',e=>{ if(!locked)return; yaw-=e.movementX*0.0023; pitch=clamp(pitch-e.movementY*0.0023,-1.2,1.2); });
addEventListener('keydown',e=>{ keys[e.code]=true;
  if(e.code==='KeyV'){ mode=mode==='fp'?'tp':'fp'; viewEl.textContent='VIEW: '+(mode==='fp'?'FIRST PERSON':'THIRD PERSON'); }
  if(e.code==='Enter') startSeq();
  if(['KeyW','KeyA','KeyS','KeyD','Space'].includes(e.code)) e.preventDefault();
});
addEventListener('keyup',e=>{ keys[e.code]=false; });

// ---- host sequence ----
const startBtn=document.getElementById('start'), statusEl=document.getElementById('status'), boardLink=document.getElementById('board');
const roomNameEl=document.getElementById('roomName'), roomCodeEl=document.getElementById('roomCode'), roomSignalEl=document.getElementById('roomSignal');
const createRoomBtn=document.getElementById('createRoom'), joinRoomBtn=document.getElementById('joinRoom'), copyInviteBtn=document.getElementById('copyInvite');
boardLink.onclick=e=>{ e.preventDefault(); goNext('/pad?flow=1'); };   // board -> the launch sequence
let phase='wait', doorOpen=0, seqT=0, flowBoarded=false;
const DOOR_CLOSED_X=0.91, DOOR_SLIDE_X=1.68, DOOR_PASS_X=1.75;
let localReady=false; const readyPeers=new Set();
function readinessInfo(){
  const st={...MULTI.state(),isHost:MULTI.isHost()};
  const peers=MULTI.peers();
  const peerIds=new Set(peers.map(p=>p.id));
  for(const id of [...readyPeers]) if(!peerIds.has(id)) readyPeers.delete(id);
  const humanCount=Math.min(4,(st.code?peers.length+1:1));
  const npcReady=Math.max(0,4-humanCount);
  const remoteReady=Math.min(peers.length,readyPeers.size);
  const hostReady=st.isHost||localReady;
  const ready=Math.min(4,npcReady+remoteReady+(hostReady?1:0));
  return {st,peers,humanCount,npcReady,remoteReady,hostReady,ready,allHumansReady:hostReady&&remoteReady>=peers.length};
}
function randomRoom(){ return Math.random().toString(36).replace(/[^a-z0-9]/g,'').slice(2,8).toUpperCase().padEnd(6,'7'); }
function roomLink(code=roomCodeEl.value.trim().toUpperCase()){
  const url=new URL('/lobby',location.href);
  if(FLOW)url.searchParams.set('flow','1');
  url.searchParams.set('room',code);
  url.searchParams.set('name',(roomNameEl.value||MULTI.name||'PLAYER').trim().slice(0,18));
  const signal=roomSignalEl.value.trim();
  if(signal)url.searchParams.set('signal',signal);
  return url;
}
function goRoom(code){
  const name=(roomNameEl.value||MULTI.name||'PLAYER').trim().slice(0,18).toUpperCase();
  localStorage.setItem('sl-player-name',name);
  location.href=roomLink(code).toString();
}
function updateRoomStatus(){
  roomNameEl.value=roomNameEl.value||MULTI.name||'';
  roomCodeEl.value=roomCodeEl.value||MULTI.code||'';
  roomSignalEl.value=roomSignalEl.value||new URLSearchParams(location.search).get('signal')||localStorage.getItem('sl-signal-url')||'';
  const {st,peers,ready,remoteReady,allHumansReady}=readinessInfo();
  if(st.code){
    const gate=st.isHost&&!allHumansReady?` · WAITING ${remoteReady}/${peers.length} CREW`:'';
    statusEl.textContent=`● ROOM ${st.code} · ${st.isHost?'HOST':'CLIENT'} · ${st.peers+1}/4 CREW · READY ${ready}/4${gate}`;
    startBtn.textContent=st.isHost?(allHumansReady?'▶ START LAUNCH SEQUENCE':'WAITING FOR CREW READY'):(localReady?'✓ READY · WAITING FOR HOST':'READY UP');
    startBtn.disabled=phase!=='wait'||(st.isHost&&!allHumansReady);
  } else {
    statusEl.textContent='● YOU ARE HOST · NPC CREW STANDING BY · START WHEN READY';
    startBtn.textContent='▶ START LAUNCH SEQUENCE';
    startBtn.disabled=phase!=='wait';
  }
}
createRoomBtn.onclick=()=>goRoom(randomRoom());
joinRoomBtn.onclick=()=>{ const code=roomCodeEl.value.trim().toUpperCase(); if(code)goRoom(code); };
copyInviteBtn.onclick=async()=>{ const code=roomCodeEl.value.trim().toUpperCase()||MULTI.code||randomRoom(); roomCodeEl.value=code; try{ await navigator.clipboard.writeText(roomLink(code).toString()); copyInviteBtn.textContent='COPIED'; setTimeout(()=>copyInviteBtn.textContent='INVITE',1200); }catch(e){ copyInviteBtn.textContent='COPY FAIL'; } };
MULTI.onRoster(updateRoomStatus);
MULTI.onHostChange(updateRoomStatus);
MULTI.onTask(event=>{
  if(event.type==='ready'){ if(event.payload?.ready)readyPeers.add(event.from); else readyPeers.delete(event.from); updateRoomStatus(); }
  if(event.type==='lobby-start' && phase==='wait') startSeq(true);
});
function toggleReady(){ localReady=!localReady; MULTI.broadcastTask('ready',{ready:localReady}); updateRoomStatus(); }
function startSeq(fromRemote=false){
  if(phase!=='wait')return;
  if(!fromRemote && MULTI.code && !MULTI.isHost()){ toggleReady(); return; }
  if(!fromRemote && MULTI.code && !readinessInfo().allHumansReady){ statusEl.textContent='● WAITING FOR CONNECTED CREW TO READY UP'; updateRoomStatus(); return; }
  if(!fromRemote && MULTI.code) MULTI.broadcastTask('lobby-start',{});
  phase='open'; startBtn.disabled=true; statusEl.textContent='● LAUNCH SEQUENCE INITIATED — STAND BY';
  if(FLOW&&AUTO_START){ setTimeout(()=>{ if(flowBoarded)return; flowBoarded=true; statusEl.textContent='● CREW ABOARD — SEALING HATCH'; goNext('/pad?flow=1'); },7600); }
}
startBtn.onclick=()=>startSeq();
if(AUTO_START) setTimeout(startSeq,900);
updateRoomStatus();

let lobbyAudio=null;
function startLobbyAudio(){
  if(lobbyAudio)return;
  try{
    const mix=new Mixer(0.72); mix.resume(); const ctx=mix.ctx, B=mix.master;
    tone(ctx,B,{type:'sine',freq:58,gain:0.026});
    tone(ctx,B,{type:'triangle',freq:116,gain:0.008});
    noiseBed(ctx,B,{type:'bandpass',freq:920,q:0.6,gain:0.014});
    lobbyAudio={
      glitch(){ if(Math.random()<0.55) blip(ctx,B,{type:'square',freq:360+Math.random()*260,gain:0.045,dur:0.08}); burst(ctx,B,{type:'bandpass',freq:1200+Math.random()*900,q:0.8,gain:0.04,decay:0.16}); }
    };
    new ClipBank(mix).load().then(b=>{
      b.play('lobby-ambience',{loop:true,gain:0.36});
      b.play('lobby-screen-glitch',{gain:0.45});
      setTimeout(()=>b.play('vox-lobby-brief',{gain:0.92}),900);
    });
  }catch(e){}
}
addEventListener('pointerdown',startLobbyAudio);
addEventListener('keydown',startLobbyAudio);

const clock=new THREE.Clock(); const _f=new THREE.Vector3();
function animate(){ requestAnimationFrame(animate); const dt=Math.min(clock.getDelta(),0.05); const t=clock.elapsedTime;
  for(const L of lights) L.m.material.emissiveIntensity=L.b*(0.88+0.12*Math.sin(t*4+L.s));
  earth.rotation.y+=dt*0.01;
  briefT-=dt; if(briefT<=0){ briefBlink=!briefBlink; drawBig(briefBlink); if(lobbyAudio&&Math.random()<0.18)lobbyAudio.glitch(); briefT=0.55; }   // briefing cursor blink
  // --- move the player ---
  const s=Math.sin(yaw), c=Math.cos(yaw); const fx=-s, fz=-c, rx=c, rz=-s;   // forward & right on the floor
  let mx=0,mz=0;
  if(keys.KeyW){mx+=fx;mz+=fz;} if(keys.KeyS){mx-=fx;mz-=fz;}
  if(keys.KeyD){mx+=rx;mz+=rz;} if(keys.KeyA){mx-=rx;mz-=rz;}
  if(mx||mz){ const l=Math.hypot(mx,mz); mx/=l; mz/=l; pos.x+=mx*SPEED*dt; pos.z+=mz*SPEED*dt; }
  for(const o of OBST) pushOut(o.x,o.z,o.r);                                              // can't walk through furniture
  for(const a of aiCrew){ if(a.a.visible) pushOut(a.a.position.x,a.a.position.z,0.72); }   // can't walk through the crew
  // room bounds, with the doorway open when the doors have slid back
  pos.x=clamp(pos.x,-7,7);
  const throughDoor=(doorOpen>0.8 && Math.abs(pos.x)<DOOR_PASS_X);
  pos.z=clamp(pos.z, throughDoor?-9:-7, 7);
  player.position.set(pos.x,0,pos.z); player.rotation.y=yaw+Math.PI;
  const walking=(mx||mz)?1:0; player.position.y=Math.abs(Math.sin(t*9))*0.05*walking;   // walk bob
  // --- camera FP / TP ---
  if(mode==='fp'){ camera.position.set(pos.x,EYE,pos.z); player.visible=false; }
  else { camera.position.set(pos.x - fx*BACK, EYE+0.9, pos.z - fz*BACK); player.visible=true; }
  camera.rotation.set(pitch,yaw,0);
  // walk through the open door → board
  if(pos.z<-7.6){ goNext('/pad?flow=1'); }   // walked through the hatch -> launch sequence
  // --- host-start: doors open, AI crew run aboard ---
  if(phase==='open'){ doorOpen=Math.min(1,doorOpen+dt*(FLOW&&AUTO_START?1.8:0.7)); doorL.position.x=-DOOR_CLOSED_X-doorOpen*DOOR_SLIDE_X; doorR.position.x=DOOR_CLOSED_X+doorOpen*DOOR_SLIDE_X;
    if(doorOpen>=1){ phase='walk'; seqT=0; statusEl.textContent='● DOORS OPEN — WALK TO THE HATCH TO BOARD'; boardLink.style.display='inline-block'; } }
  if(phase==='walk'){ seqT+=dt;
    for(const a of aiCrew){ const lt=Math.max(0,seqT-a.delay), k=Math.min(1,lt/2.4);
      const p=a.from.clone().lerp(a.to,k*k*(3-2*k)); a.a.position.set(p.x,Math.abs(Math.sin(lt*7))*0.06*(k<1?1:0),p.z);
      if(k>0.01){ const d=a.to.clone().sub(a.from); a.a.rotation.y=Math.atan2(d.x,d.z); } a.a.visible=k<0.99; }
    if(FLOW&&AUTO_START&&!flowBoarded&&seqT>2.2){ flowBoarded=true; statusEl.textContent='● CREW ABOARD — SEALING HATCH'; goNext('/pad?flow=1'); }
  } else { for(const a of aiCrew) a.a.position.y=Math.sin(t*1.5+a.s)*0.012; }
  Grade.uniforms.uTime.value=t; composer.render();
}
window.__lobby={crewSummary:CREW_SUMMARY,multiplayer:MULTI,get state(){ return {player:!!player,crewCount:aiCrew.length,visibleCrew:aiCrew.filter(c=>c.a.visible).length,crewSummary:CREW_SUMMARY,multiplayer:MULTI.state(),readiness:readinessInfo(),phase,doorOpen}; }};
addEventListener('resize',resize); resize(); fadeIn(); animate();
</script>
