<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SIGNAL LOST — departure lobby</title>
<style>
  html,body{margin:0;height:100%;background:#05070d;overflow:hidden}
  #c{width:100vw;height:100vh;display:block;cursor:crosshair}
  #hud{position:fixed;left:14px;bottom:12px;font:11px ui-monospace,Menlo,monospace;color:#8a97a4;pointer-events:none}
  #hud b{color:#E8A33D}
  #nav{position:fixed;right:14px;top:12px;font:12px ui-monospace,monospace;display:flex;gap:8px}
  #nav a{color:#9fd0ff;text-decoration:none;background:rgba(8,12,18,.7);border:1px solid #20303c;border-radius:6px;padding:6px 10px}
  #title{position:fixed;left:14px;top:12px;font:600 13px ui-monospace,monospace;letter-spacing:3px;color:#E8A33D;pointer-events:none}
  #view{position:fixed;right:14px;top:46px;font:11px ui-monospace,monospace;color:#7dffb0;background:rgba(8,12,18,.7);border:1px solid #20303c;border-radius:6px;padding:5px 9px;pointer-events:none}
  #panel{position:fixed;left:50%;bottom:34px;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px}
  #start{font:600 13px ui-monospace,monospace;letter-spacing:2px;color:#04140a;background:#7dffb0;border:0;border-radius:8px;padding:11px 20px;cursor:pointer}
  #start:hover{background:#9affc4} #start:disabled{opacity:.5;cursor:default}
  #status{font:11px ui-monospace,monospace;color:#9fd0ff;letter-spacing:2px;text-shadow:0 0 6px #000;min-height:14px}
  #board{color:#7dffb0;text-decoration:none;border:1px solid #2c5a40;border-radius:8px;padding:9px 16px;font:600 12px ui-monospace,monospace;display:none}
  #lock{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);font:12px ui-monospace,monospace;color:#cdd6e0;background:rgba(6,10,16,.82);border:1px solid #20303c;border-radius:10px;padding:14px 20px;text-align:center;letter-spacing:1px}
  #lock b{color:#E8A33D}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="title">SIGNAL&nbsp;LOST · DEPARTURE LOBBY</div>
<div id="nav"><a href="/units">▸ crew</a><a href="/launch">▸ capsule</a></div>
<div id="view">VIEW: FIRST PERSON</div>
<div id="hud"><b>WASD</b> walk · <b>mouse</b> look · <b>V</b> first/third person · host: <b>Enter</b> to start</div>
<div id="panel"><div id="status">● 4 CREW READY · WAITING FOR HOST</div><button id="start">▶ HOST · START LAUNCH SEQUENCE</button><a id="board" href="/launch">▸ BOARD THE CAPSULE</a></div>
<div id="lock"><b>click</b> to enter the lobby<br>WASD walk · mouse look · <b>V</b> toggle view</div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>

<script type="module">
import * as THREE from 'three';
import './nav.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
import { makeAstronaut } from './units.js';
import { FLOW, fadeIn, goNext } from './flow.js';

const canvas=document.getElementById('c');
const DPR=Math.min(window.devicePixelRatio||1,2);
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,powerPreference:'high-performance'});
renderer.setPixelRatio(DPR); renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.16;

const scene=new THREE.Scene(); scene.background=new THREE.Color(0x080b12);
scene.fog=new THREE.FogExp2(0x080b12,0.009);
const camera=new THREE.PerspectiveCamera(66,1,0.05,400); camera.rotation.order='YXZ';

const composer=new EffectComposer(renderer); composer.setPixelRatio(DPR);
composer.addPass(new RenderPass(scene,camera));
const bloom=new UnrealBloomPass(new THREE.Vector2(1,1),0.5,0.6,0.78); composer.addPass(bloom);
composer.addPass(new OutputPass());
const Grade=new ShaderPass({
 uniforms:{tDiffuse:{value:null},uTime:{value:0},uRes:{value:new THREE.Vector2(1,1)}},
 vertexShader:`varying vec2 vUv; void main(){vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
 fragmentShader:`varying vec2 vUv; uniform sampler2D tDiffuse; uniform float uTime; uniform vec2 uRes;
  float rnd(vec2 p){return fract(sin(dot(p,vec2(12.9898,78.233)))*43758.5);}
  void main(){vec2 uv=vUv,d=uv-0.5; float ca=0.0004+dot(d,d)*0.0018;
   vec3 col; col.r=texture2D(tDiffuse,uv+d*ca).r; col.g=texture2D(tDiffuse,uv).g; col.b=texture2D(tDiffuse,uv-d*ca).b;
   col+=(rnd(uv*uRes+uTime)-0.5)*0.01; col*=mix(0.74,1.0,smoothstep(1.25,0.12,length(d))); gl_FragColor=vec4(max(col,0.0),1.0);} `
});
composer.addPass(Grade);
function resize(){const w=innerWidth,h=innerHeight; renderer.setSize(w,h,false); composer.setSize(w,h); Grade.uniforms.uRes.value.set(w*DPR,h*DPR); camera.aspect=w/h; camera.updateProjectionMatrix();}

function part(geo,m,parent,x,y,z,rx,ry,rz){const o=new THREE.Mesh(geo,m);o.position.set(x||0,y||0,z||0);if(rx||ry||rz)o.rotation.set(rx||0,ry||0,rz||0);o.castShadow=o.receiveShadow=true;(parent instanceof THREE.Object3D?parent:scene).add(o);return o;}
const BOX=(w,h,d)=>new THREE.BoxGeometry(w,h,d);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

// ==BUILD START==
const lights=[];
const M={
  floor:new THREE.MeshStandardMaterial({color:0x3a4049,roughness:0.55,metalness:0.3}),
  wall: new THREE.MeshStandardMaterial({color:0xc9ced6,roughness:0.6,metalness:0.1}),
  wall2:new THREE.MeshStandardMaterial({color:0x9aa0aa,roughness:0.62,metalness:0.12}),
  trim: new THREE.MeshStandardMaterial({color:0x20242b,roughness:0.5,metalness:0.5}),
  strip:new THREE.MeshStandardMaterial({color:0x0a1a20,emissive:0xbfe9ff,emissiveIntensity:1.6,roughness:1}),
  amber:new THREE.MeshStandardMaterial({color:0x1a1204,emissive:0xE8A33D,emissiveIntensity:1.2,roughness:1}),
  door: new THREE.MeshStandardMaterial({color:0x70767f,roughness:0.4,metalness:0.7}),
  glass:new THREE.MeshStandardMaterial({color:0x0a1622,transparent:true,opacity:0.12,roughness:0.1,metalness:0.5,side:THREE.DoubleSide,depthWrite:false}),
  crate:new THREE.MeshStandardMaterial({color:0x4a505a,roughness:0.7,metalness:0.3}),
};
part(BOX(16,0.3,16),M.floor,scene,0,-0.15,0);
for(let x=-7;x<=7;x+=2) part(BOX(0.06,0.04,16),M.trim,scene,x,0.02,0);
part(BOX(16,0.3,16),M.wall2,scene,0,4.5,0);                              // ceiling
part(BOX(16,5,0.3),M.wall,scene,0,2.3,-8);                              // far wall (door)
part(BOX(0.3,5,16),M.wall,scene,-8,2.3,0);                              // left wall
part(BOX(0.3,5,16),M.wall,scene,8,2.3,0);                               // right wall (window)
part(BOX(16,5,0.3),M.wall2,scene,0,2.3,8);                              // near wall
for(let z=-6;z<=6;z+=3){ const s=part(BOX(9,0.12,0.4),M.strip,scene,0,4.32,z); lights.push({m:s,b:1.6,s:Math.random()*9}); }
// viewport onto space + Earth
part(BOX(0.34,3.2,9),M.trim,scene,7.85,2.6,0);
part(new THREE.PlaneGeometry(8.4,2.9),M.glass,scene,7.78,2.6,0,0,-Math.PI/2,0);
{ const N=900,p=new Float32Array(N*3); for(let i=0;i<N;i++){ p[i*3]=40+Math.random()*120; p[i*3+1]=-20+Math.random()*80; p[i*3+2]=(Math.random()-0.5)*120; }
  const g=new THREE.BufferGeometry(); g.setAttribute('position',new THREE.BufferAttribute(p,3));
  scene.add(new THREE.Points(g,new THREE.PointsMaterial({color:0xcfe0ff,size:0.4,sizeAttenuation:true,transparent:true,opacity:0.9,fog:false}))); }
const earth=part(new THREE.SphereGeometry(14,40,40),new THREE.MeshStandardMaterial({color:0x1d5fa0,emissive:0x0a2f55,emissiveIntensity:0.4,roughness:1}),scene,46,-6,-14);
part(new THREE.SphereGeometry(15,40,40),new THREE.MeshBasicMaterial({color:0x5fa0e6,transparent:true,opacity:0.16,side:THREE.BackSide,fog:false}),scene,46,-6,-14);
// boarding door
part(BOX(3.6,4.2,0.2),M.trim,scene,0,2.0,-7.78);
part(BOX(3.2,4.0,1.2),new THREE.MeshStandardMaterial({color:0x05080c,roughness:1}),scene,0,2.0,-8.5);
const doorL=part(BOX(1.55,3.9,0.18),M.door,scene,-0.8,2.0,-7.74);
const doorR=part(BOX(1.55,3.9,0.18),M.door,scene,0.8,2.0,-7.74);
part(BOX(3.5,0.18,0.24),M.amber,scene,0,4.05,-7.7);
for(const sx of [-1,1]) part(BOX(0.12,3.9,0.26),M.strip,scene,1.85*sx,2.0,-7.72);
part(BOX(1.5,0.1,1.5),M.strip,scene,0,0.01,-5.6);                        // floor marker by the door
// dressing
part(BOX(3.2,0.18,0.7),M.crate,scene,-4.5,0.55,3,0,0.2,0); part(BOX(0.18,0.5,0.7),M.trim,scene,-5.9,0.3,3.3); part(BOX(0.18,0.5,0.7),M.trim,scene,-3.1,0.3,2.7);
for(let i=0;i<4;i++){ part(BOX(1.0,2.2,0.7),M.wall2,scene,-7.3,1.1,-3+i*1.3); part(BOX(0.84,0.05,0.5),M.strip,scene,-6.78,1.9,-3+i*1.3); }
part(BOX(1.4,1.4,1.4),M.crate,scene,4.6,0.7,3.4); part(BOX(1.0,1.0,1.0),M.crate,scene,3.4,0.5,4.2,0,0.4,0);
// --- mission briefing screen on the wall (for the crew to read) ---
part(BOX(4.4,2.95,0.16),M.trim,scene,-4.6,2.5,-7.86);
const briefC=document.createElement('canvas'); briefC.width=512; briefC.height=320; const bxx=briefC.getContext('2d');
const briefTex=new THREE.CanvasTexture(briefC); briefTex.colorSpace=THREE.SRGBColorSpace;
function drawBrief(cur){ bxx.fillStyle='#06120c'; bxx.fillRect(0,0,512,320); bxx.strokeStyle='#1f5a36'; bxx.lineWidth=4; bxx.strokeRect(10,10,492,300);
  bxx.fillStyle='#E8A33D'; bxx.font='bold 23px monospace'; bxx.fillText('// MISSION BRIEFING', 26, 46);
  bxx.fillStyle='#7dffb0'; bxx.font='15px monospace';
  ['TARGET   : derelict hauler — gone dark','OBJECTIVE: re-establish contact','           restore her comms array','           — that is the whole job','','STATUS   : three crews lost to the silence','CREW     : 4 / 4  ready','','> "bring her voice back."','              — EARTH CONTROL'].forEach((l,i)=>bxx.fillText(l,26,82+i*22));
  bxx.fillStyle='#ff6a5a'; bxx.font='13px monospace'; bxx.fillText('! DO NOT ANSWER ANYTHING THAT ANSWERS BACK'+(cur?' _':''),26,306); briefTex.needsUpdate=true; }
drawBrief(true);
const brief=new THREE.Mesh(new THREE.PlaneGeometry(4.0,2.5),new THREE.MeshStandardMaterial({map:briefTex,emissive:0x66ffaa,emissiveMap:briefTex,emissiveIntensity:1.25,color:0x000000,roughness:1}));
brief.position.set(-4.6,2.5,-7.77); scene.add(brief);
const briefLight=new THREE.PointLight(0x66ffaa,1.1,5,2); briefLight.position.set(-4.6,2.5,-7.0); scene.add(briefLight);
let briefT=0, briefBlink=true;

// YOU (controllable) + up to 3 AI crew waiting
const player=makeAstronaut({accent:0xc8552f}); scene.add(player);
const TEAM=[0x2f86c8,0x3fae5a,0xb58ad6];
const POS=[[-2.2,1.0,0.4],[2.4,-0.4,-0.7],[-0.6,2.6,1.2]];   // x, z, facing
const aiCrew=[];
POS.forEach((p,i)=>{ const a=makeAstronaut({accent:TEAM[i]}); a.position.set(p[0],0,p[1]); a.rotation.y=p[2]; scene.add(a);
  aiCrew.push({a, from:new THREE.Vector3(p[0],0,p[1]), to:new THREE.Vector3((i-1)*0.5,0,-7.8), delay:i*0.4, s:Math.random()*9}); });
// ==BUILD END==

// ---- lighting ----
scene.add(new THREE.AmbientLight(0x4a5260,0.7));
scene.add(new THREE.HemisphereLight(0x9fb0c8,0x202428,0.7));
const key=new THREE.DirectionalLight(0xeaf2ff,1.5); key.position.set(6,9,6); key.castShadow=true;
key.shadow.mapSize.set(2048,2048); key.shadow.camera.near=1; key.shadow.camera.far=50; key.shadow.camera.left=-12; key.shadow.camera.right=12; key.shadow.camera.top=12; key.shadow.camera.bottom=-12; key.shadow.bias=-0.0004; scene.add(key);
const eg=new THREE.DirectionalLight(0x6fa8e0,0.5); eg.position.set(12,1,-3); scene.add(eg);   // Earth glow through the viewport

// ---- FP / TP controller ----
const EYE=1.95, SPEED=3.4, BACK=3.6;
const pos=new THREE.Vector3(1.6,0,3.2); let yaw=0, pitch=-0.05, mode='fp', locked=false;   // face into the room (toward the hatch)
const OBST=[{x:4.6,z:3.4,r:1.45},{x:3.4,z:4.2,r:1.15},{x:-4.5,z:3,r:1.5}];   // crates + bench — no walking through
function pushOut(cx,cz,r){ const dx=pos.x-cx, dz=pos.z-cz, d=Math.hypot(dx,dz); if(d>1e-4 && d<r){ pos.x=cx+dx/d*r; pos.z=cz+dz/d*r; } }
const keys={};
const lockEl=document.getElementById('lock'), viewEl=document.getElementById('view');
canvas.addEventListener('click',()=>{ if(!locked) canvas.requestPointerLock(); });
document.addEventListener('pointerlockchange',()=>{ locked=document.pointerLockElement===canvas; lockEl.style.display=locked?'none':'block'; });
document.addEventListener('mousemove',e=>{ if(!locked)return; yaw-=e.movementX*0.0023; pitch=clamp(pitch-e.movementY*0.0023,-1.2,1.2); });
addEventListener('keydown',e=>{ keys[e.code]=true;
  if(e.code==='KeyV'){ mode=mode==='fp'?'tp':'fp'; viewEl.textContent='VIEW: '+(mode==='fp'?'FIRST PERSON':'THIRD PERSON'); }
  if(e.code==='Enter') startSeq();
  if(['KeyW','KeyA','KeyS','KeyD','Space'].includes(e.code)) e.preventDefault();
});
addEventListener('keyup',e=>{ keys[e.code]=false; });

// ---- host sequence ----
const startBtn=document.getElementById('start'), statusEl=document.getElementById('status'), boardLink=document.getElementById('board');
boardLink.onclick=e=>{ e.preventDefault(); goNext('/pad?flow=1'); };   // board -> the launch sequence
let phase='wait', doorOpen=0, seqT=0;
function startSeq(){ if(phase!=='wait')return; phase='open'; startBtn.disabled=true; statusEl.textContent='● LAUNCH SEQUENCE INITIATED — STAND BY'; }
startBtn.onclick=startSeq;

const clock=new THREE.Clock(); const _f=new THREE.Vector3();
function animate(){ requestAnimationFrame(animate); const dt=Math.min(clock.getDelta(),0.05); const t=clock.elapsedTime;
  for(const L of lights) L.m.material.emissiveIntensity=L.b*(0.88+0.12*Math.sin(t*4+L.s));
  earth.rotation.y+=dt*0.01;
  briefT-=dt; if(briefT<=0){ briefBlink=!briefBlink; drawBrief(briefBlink); briefT=0.55; }   // briefing cursor blink
  // --- move the player ---
  const s=Math.sin(yaw), c=Math.cos(yaw); const fx=-s, fz=-c, rx=c, rz=-s;   // forward & right on the floor
  let mx=0,mz=0;
  if(keys.KeyW){mx+=fx;mz+=fz;} if(keys.KeyS){mx-=fx;mz-=fz;}
  if(keys.KeyD){mx+=rx;mz+=rz;} if(keys.KeyA){mx-=rx;mz-=rz;}
  if(mx||mz){ const l=Math.hypot(mx,mz); mx/=l; mz/=l; pos.x+=mx*SPEED*dt; pos.z+=mz*SPEED*dt; }
  for(const o of OBST) pushOut(o.x,o.z,o.r);                                              // can't walk through furniture
  for(const a of aiCrew){ if(a.a.visible) pushOut(a.a.position.x,a.a.position.z,0.72); }   // can't walk through the crew
  // room bounds, with the doorway open when the doors have slid back
  pos.x=clamp(pos.x,-7,7);
  const throughDoor=(doorOpen>0.8 && Math.abs(pos.x)<1.5);
  pos.z=clamp(pos.z, throughDoor?-9:-7, 7);
  player.position.set(pos.x,0,pos.z); player.rotation.y=yaw+Math.PI;
  const walking=(mx||mz)?1:0; player.position.y=Math.abs(Math.sin(t*9))*0.05*walking;   // walk bob
  // --- camera FP / TP ---
  if(mode==='fp'){ camera.position.set(pos.x,EYE,pos.z); player.visible=false; }
  else { camera.position.set(pos.x - fx*BACK, EYE+0.9, pos.z - fz*BACK); player.visible=true; }
  camera.rotation.set(pitch,yaw,0);
  // walk through the open door → board
  if(pos.z<-7.6){ goNext('/pad?flow=1'); }   // walked through the hatch -> launch sequence
  // --- host-start: doors open, AI crew run aboard ---
  if(phase==='open'){ doorOpen=Math.min(1,doorOpen+dt*0.7); doorL.position.x=-0.8-doorOpen*1.45; doorR.position.x=0.8+doorOpen*1.45;
    if(doorOpen>=1){ phase='walk'; seqT=0; statusEl.textContent='● DOORS OPEN — WALK TO THE HATCH TO BOARD'; boardLink.style.display='inline-block'; } }
  if(phase==='walk'){ seqT+=dt;
    for(const a of aiCrew){ const lt=Math.max(0,seqT-a.delay), k=Math.min(1,lt/2.4);
      const p=a.from.clone().lerp(a.to,k*k*(3-2*k)); a.a.position.set(p.x,Math.abs(Math.sin(lt*7))*0.06*(k<1?1:0),p.z);
      if(k>0.01){ const d=a.to.clone().sub(a.from); a.a.rotation.y=Math.atan2(d.x,d.z); } a.a.visible=k<0.99; }
  } else { for(const a of aiCrew) a.a.position.y=Math.sin(t*1.5+a.s)*0.012; }
  Grade.uniforms.uTime.value=t; composer.render();
}
addEventListener('resize',resize); resize(); fadeIn(); animate();
</script>
</body>
</html>
