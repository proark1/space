let adminLobbyModel=null, adminLobbyModelUrl='', adminLobbyModelBase=null;
function tuneAdminLobbyModel(cfg){
  if(!adminLobbyModel||!adminLobbyModelBase)return;
  adminLobbyModel.scale.copy(adminLobbyModelBase.scale).multiplyScalar(finiteNumber(cfg.scale,1));
  adminLobbyModel.rotation.y=adminLobbyModelBase.rotationY+finiteNumber(cfg.rotationY,0);
  adminLobbyModel.position.copy(adminLobbyModelBase.position);
  adminLobbyModel.position.y+=finiteNumber(cfg.positionY,0);
  adminLobbyModel.position.z-=1.5;
}
async function applyAdminLobbyConfig(cfg){
  if(!cfg)return;
  applyMaterialTuning({
    base:[M.floor,M.wall,M.wall2,M.trim,M.door,M.crate],
    emissive:[M.strip,M.amber]
  }, cfg, 0xc9ced6, 0xbfe9ff);
  ambientLight.intensity=finiteNumber(cfg.ambientIntensity,ambientLight.intensity);
  key.intensity=finiteNumber(cfg.keyIntensity,key.intensity);
  if(scene.fog) scene.fog.density=finiteNumber(cfg.fogDensity,scene.fog.density);
  const modelUrl=typeof cfg.modelUrl==='string'?cfg.modelUrl.trim():'';
  if(modelUrl!==adminLobbyModelUrl){
    if(adminLobbyModel){ scene.remove(adminLobbyModel); adminLobbyModel=null; adminLobbyModelBase=null; }
    adminLobbyModelUrl=modelUrl;
    if(modelUrl){
      adminLobbyModel=await attachAdminModel(THREE,GLTFLoader,scene,cfg,{targetSize:5});
      if(adminLobbyModel){
        adminLobbyModelBase={
          position:adminLobbyModel.position.clone(),
          rotationY:adminLobbyModel.rotation.y,
          scale:adminLobbyModel.scale.clone()
        };
      }
    }
  }
  tuneAdminLobbyModel(cfg);
}
async function applyAdminLobby(){
  const cfg=await loadAdminScene('lobby');
  await applyAdminLobbyConfig(cfg);
}
void applyAdminLobby();
addEventListener('message',event=>{
  if(!event.data||event.data.type!=='sl-admin-scene-preview'||event.data.sceneId!=='lobby')return;
  void applyAdminLobbyConfig(event.data.settings);
});

// ---- FP / TP controller ----
const EYE=1.95, SPEED=3.4, BACK=3.6;
const pos=new THREE.Vector3(1.6,0,3.2); let yaw=-0.6, pitch=-0.04, mode='fp', locked=false;   // face between the hatch and the big briefing screen
const OBST=[{x:4.6,z:3.4,r:1.45},{x:3.4,z:4.2,r:1.15},{x:-4.5,z:3,r:1.5}];   // crates + bench — no walking through
function pushOut(cx,cz,r){ const dx=pos.x-cx, dz=pos.z-cz, d=Math.hypot(dx,dz); if(d>1e-4 && d<r){ pos.x=cx+dx/d*r; pos.z=cz+dz/d*r; } }
const keys={};
const lockEl=document.getElementById('lock'), viewEl=document.getElementById('view');
canvas.addEventListener('click',()=>{ if(!locked) canvas.requestPointerLock(); });
document.addEventListener('pointerlockchange',()=>{ locked=document.pointerLockElement===canvas; lockEl.style.display=locked?'none':'block'; });
document.addEventListener('mousemove',e=>{ if(!locked)return; yaw-=e.movementX*0.0023; pitch=clamp(pitch-e.movementY*0.0023,-1.2,1.2); });
addEventListener('keydown',e=>{ keys[e.code]=true;
  if(e.code==='KeyV'){ mode=mode==='fp'?'tp':'fp'; viewEl.textContent='VIEW: '+(mode==='fp'?'FIRST PERSON':'THIRD PERSON'); }
  if(e.code==='Enter') startSeq();
  if(['KeyW','KeyA','KeyS','KeyD','Space'].includes(e.code)) e.preventDefault();
});
addEventListener('keyup',e=>{ keys[e.code]=false; });

// ---- host sequence ----
const startBtn=document.getElementById('start'), statusEl=document.getElementById('status'), boardLink=document.getElementById('board');
boardLink.onclick=e=>{ e.preventDefault(); goNext('/pad?flow=1'); };   // board -> the launch sequence
let phase='wait', doorOpen=0, seqT=0;
function startSeq(){ if(phase!=='wait')return; phase='open'; startBtn.disabled=true; statusEl.textContent='● LAUNCH SEQUENCE INITIATED — STAND BY'; }
startBtn.onclick=startSeq;
if(AUTO_START) setTimeout(startSeq,900);

const clock=new THREE.Clock(); const _f=new THREE.Vector3();
function animate(){ requestAnimationFrame(animate); const dt=Math.min(clock.getDelta(),0.05); const t=clock.elapsedTime;
  for(const L of lights) L.m.material.emissiveIntensity=L.b*(0.88+0.12*Math.sin(t*4+L.s));
  earth.rotation.y+=dt*0.01;
  briefT-=dt; if(briefT<=0){ briefBlink=!briefBlink; drawBig(briefBlink); briefT=0.55; }   // briefing cursor blink
  // --- move the player ---
  const s=Math.sin(yaw), c=Math.cos(yaw); const fx=-s, fz=-c, rx=c, rz=-s;   // forward & right on the floor
  let mx=0,mz=0;
  if(keys.KeyW){mx+=fx;mz+=fz;} if(keys.KeyS){mx-=fx;mz-=fz;}
  if(keys.KeyD){mx+=rx;mz+=rz;} if(keys.KeyA){mx-=rx;mz-=rz;}
  if(mx||mz){ const l=Math.hypot(mx,mz); mx/=l; mz/=l; pos.x+=mx*SPEED*dt; pos.z+=mz*SPEED*dt; }
  for(const o of OBST) pushOut(o.x,o.z,o.r);                                              // can't walk through furniture
  for(const a of aiCrew){ if(a.a.visible) pushOut(a.a.position.x,a.a.position.z,0.72); }   // can't walk through the crew
  // room bounds, with the doorway open when the doors have slid back
  pos.x=clamp(pos.x,-7,7);
  const throughDoor=(doorOpen>0.8 && Math.abs(pos.x)<1.5);
  pos.z=clamp(pos.z, throughDoor?-9:-7, 7);
  player.position.set(pos.x,0,pos.z); player.rotation.y=yaw+Math.PI;
  const walking=(mx||mz)?1:0; player.position.y=Math.abs(Math.sin(t*9))*0.05*walking;   // walk bob
  // --- camera FP / TP ---
  if(mode==='fp'){ camera.position.set(pos.x,EYE,pos.z); player.visible=false; }
  else { camera.position.set(pos.x - fx*BACK, EYE+0.9, pos.z - fz*BACK); player.visible=true; }
  camera.rotation.set(pitch,yaw,0);
  // walk through the open door → board
  if(pos.z<-7.6){ goNext('/pad?flow=1'); }   // walked through the hatch -> launch sequence
  // --- host-start: doors open, AI crew run aboard ---
  if(phase==='open'){ doorOpen=Math.min(1,doorOpen+dt*0.7); doorL.position.x=-0.8-doorOpen*1.45; doorR.position.x=0.8+doorOpen*1.45;
    if(doorOpen>=1){ phase='walk'; seqT=0; statusEl.textContent='● DOORS OPEN — WALK TO THE HATCH TO BOARD'; boardLink.style.display='inline-block'; } }
  if(phase==='walk'){ seqT+=dt;
    for(const a of aiCrew){ const lt=Math.max(0,seqT-a.delay), k=Math.min(1,lt/2.4);
      const p=a.from.clone().lerp(a.to,k*k*(3-2*k)); a.a.position.set(p.x,Math.abs(Math.sin(lt*7))*0.06*(k<1?1:0),p.z);
      if(k>0.01){ const d=a.to.clone().sub(a.from); a.a.rotation.y=Math.atan2(d.x,d.z); } a.a.visible=k<0.99; }
  } else { for(const a of aiCrew) a.a.position.y=Math.sin(t*1.5+a.s)*0.012; }
  Grade.uniforms.uTime.value=t; composer.render();
}
addEventListener('resize',resize); resize(); fadeIn(); animate();
</script>
