scene.fog=new THREE.FogExp2(0x05080f,0.0010);
const camera=new THREE.PerspectiveCamera(62,1,0.04,8000);
camera.rotation.order='YXZ'; camera.position.set(0,0.02,0.85);   // YOU sit in the back seat of the ring
const FLOW_FAST=new URLSearchParams(location.search).get('fast')==='1';

const Grade=new ShaderPass({
 uniforms:{tDiffuse:{value:null},uTime:{value:0},uRes:{value:new THREE.Vector2(1,1)}},
 vertexShader:`varying vec2 vUv; void main(){vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
 fragmentShader:`varying vec2 vUv; uniform sampler2D tDiffuse; uniform float uTime; uniform vec2 uRes;
  float rnd(vec2 p){return fract(sin(dot(p,vec2(12.9898,78.233)))*43758.5);}
  void main(){vec2 uv=vUv,d=uv-0.5; float ca=0.0005+dot(d,d)*0.0024;
   vec3 col; col.r=texture2D(tDiffuse,uv+d*ca).r; col.g=texture2D(tDiffuse,uv).g; col.b=texture2D(tDiffuse,uv-d*ca).b;
   col+=(rnd(uv*uRes+uTime)-0.5)*0.012;
   col*=mix(0.7,1.0,smoothstep(1.22,0.1,length(d))); gl_FragColor=vec4(max(col,0.0),1.0);} `
});
composer.addPass(Grade);
function resize(){const w=innerWidth,h=innerHeight;

 camera.aspect=w/h; camera.updateProjectionMatrix();}

// ---- free-look + tiny capsule walk space ----
let yaw=0, pitch=0, dragging=false, lx=0, ly=0;
const PITCHMAX=1.12;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const wrapAngle=v=>((v+Math.PI)%(Math.PI*2)+Math.PI*2)%(Math.PI*2)-Math.PI;
const keys={};
const seatedPos=new THREE.Vector3(0,0.02,0.85);
const targetCamPos=seatedPos.clone();
let standing=false;
function lookLocked(){ return document.pointerLockElement===canvas; }
function setLookMode(){ document.body.classList.toggle('look',dragging||lookLocked()); }
addEventListener('pointerdown',e=>{ dragging=true; lx=e.clientX; ly=e.clientY; if(canvas.requestPointerLock&&!lookLocked()) canvas.requestPointerLock(); setLookMode(); });
addEventListener('pointerup',()=>{ dragging=false; setLookMode(); });
addEventListener('pointerlockchange',setLookMode);
addEventListener('pointermove',e=>{
  const locked=lookLocked();
  if(!dragging&&!locked)return;
  const dx=locked?e.movementX:(e.clientX-lx);
  const dy=locked?e.movementY:(e.clientY-ly);
  yaw-=dx*0.0034;
  pitch=clamp(pitch-dy*0.0034,-PITCHMAX,PITCHMAX);
  if(!locked){ lx=e.clientX; ly=e.clientY; }
});
addEventListener('keydown',e=>{ keys[e.code]=true; if(e.code==='Space'){ standing=!standing; e.preventDefault(); } if(['KeyW','KeyA','KeyS','KeyD'].includes(e.code)) e.preventDefault(); });
addEventListener('keyup',e=>{ keys[e.code]=false; });

// ---- PS1 vertex snap ----
function snap(m){ return m; }   // outer scene: no PS1 vertex snap — crisp, smooth geometry

// ---- safe helpers (parent is guarded: a non-Object3D never reaches .add) ----
function tex(draw,w=256,h=256){ const c=document.createElement('canvas'); c.width=w;c.height=h; draw(c.getContext('2d')); const t=new THREE.CanvasTexture(c); t.colorSpace=THREE.SRGBColorSpace; return t; }
function part(geo,m,parent,x,y,z,rx,ry,rz){ const o=new THREE.Mesh(geo,m); o.position.set(x||0,y||0,z||0); if(rx||ry||rz)o.rotation.set(rx||0,ry||0,rz||0); o.castShadow=o.receiveShadow=true; (parent instanceof THREE.Object3D?parent:scene).add(o); return o; }

const CYL=(rt,rb,h,s)=>new THREE.CylinderGeometry(rt,rb,h,s||24);

// ==BUILD START==
const flick=[];   // {m, b(base), s(seed)} emissive readouts + engines
const crew=[];    // {g, s} seated crewmate groups (idle bob)

// ---- materials ----
const grime=tex(x=>{ x.fillStyle='#7d828c'; x.fillRect(0,0,256,256);

  for(let i=0;i<14;i++){ x.strokeStyle=`rgba(20,18,14,${Math.random()*0.35})`; x.beginPath(); x.moveTo(Math.random()*256,0); x.lineTo(Math.random()*256+30,256); x.stroke(); } });

const world=new THREE.Group(); scene.add(world);
{ const N=3000,p=new Float32Array(N*3),col=new Float32Array(N*3);
  for(let i=0;i<N;i++){ const v=new THREE.Vector3().randomDirection().multiplyScalar(1600+Math.random()*1500); p[i*3]=v.x;p[i*3+1]=v.y;p[i*3+2]=v.z; const c=Math.random(),r=0.6+Math.random()*0.4; col[i*3]=r;col[i*3+1]=r*(0.85+c*0.15);col[i*3+2]=r*(0.9+c*0.1);}

  world.add(new THREE.Points(g,new THREE.PointsMaterial({size:2,sizeAttenuation:false,vertexColors:true,transparent:true,opacity:0.9,depthWrite:false,fog:false}))); }
{ const s=new THREE.Mesh(SPH(26,16,16),new THREE.MeshBasicMaterial({color:0xffe9c4,fog:false})); s.position.set(-520,360,-380); world.add(s); }
// faint nebula band for depth in the void
const nebTex=tex(x=>{ const g=x.createRadialGradient(150,110,8,150,110,180); g.addColorStop(0,'#18233e'); g.addColorStop(0.5,'#0a1020'); g.addColorStop(1,'#04060c'); x.fillStyle=g; x.fillRect(0,0,256,256); x.globalAlpha=0.35; for(let i=0;i<46;i++){ x.fillStyle=['#243a66','#3a2a58','#163a46'][i%3]; x.beginPath(); x.ellipse(Math.random()*256,Math.random()*256,20+Math.random()*64,12+Math.random()*28,Math.random()*6,0,7); x.fill(); } x.globalAlpha=1; },256,256);
world.add(new THREE.Mesh(SPH(1500,24,16),new THREE.MeshBasicMaterial({map:nebTex,side:THREE.BackSide,fog:false})));

// Earth (recedes)
const earthTex=tex(x=>{ x.fillStyle='#0b3b6b'; x.fillRect(0,0,512,256);
  for(let i=0;i<30;i++){ x.fillStyle=['#234d2a','#2f6235','#3a6b3a','#5a5f34'][i%4]; x.beginPath(); x.ellipse(Math.random()*512,30+Math.random()*196,20+Math.random()*70,14+Math.random()*40,Math.random()*6,0,7); x.fill(); }
  x.fillStyle='#dfeaf2'; x.fillRect(0,0,512,12); x.fillRect(0,244,512,12);
  x.globalAlpha=0.5; x.fillStyle='#fff'; for(let i=0;i<54;i++){ x.beginPath(); x.ellipse(Math.random()*512,Math.random()*256,14+Math.random()*52,7+Math.random()*16,0,0,7); x.fill(); } x.globalAlpha=1; },512,256);
const earth=new THREE.Group(); world.add(earth); earth.position.set(-26,-12,-92);

earth.add(new THREE.Mesh(SPH(32,40,40),new THREE.MeshBasicMaterial({color:0x5fa0e6,transparent:true,opacity:0.16,side:THREE.BackSide,fog:false})));

// derelict (simplified; the full ship + dock live at /exterior — this is the approach silhouette)
const ship=new THREE.Group(); world.add(ship);
(function buildShip(g){
  const seg=[M.hull,M.dark];
  for(let i=0;i<5;i++){ const z=-16+i*8; part(BOX(7,5,8),seg[i%2],g,0,0,z); part(BOX(7.3,0.7,8),M.dark,g,0,2.6,z); part(BOX(7.3,0.7,8),M.dark,g,0,-2.6,z); }
  part(BOX(5,4,7),M.hull,g,0,0,-22); part(BOX(3.6,2.6,5),M.dark,g,0,0,-27);                 // nose
  part(BOX(6,3,7),M.dark,g,0,3.6,-11); part(BOX(4.5,2.2,5),M.hull,g,0,5.4,-11); part(BOX(4,1.1,4),M.amber,g,0,6.6,-11); // command tower
  // Launch-facing docking collar: the capsule approaches this visible target before /dock.
  const approachDockZ=24;
  buildApproachDockFaceZ({THREE,parent:g,part,BOX,CYL,SPH,M,baseZ:approachDockZ});
  const dockBeacon=new THREE.MeshBasicMaterial({color:0x9ffcff,fog:false,depthWrite:false,toneMapped:false});
  const dockBeaconAmber=new THREE.MeshBasicMaterial({color:0xffc36a,fog:false,depthWrite:false,toneMapped:false});
  part(new THREE.TorusGeometry(3.55,0.08,10,72),dockBeaconAmber,g,0,0,approachDockZ+1.35);
  part(new THREE.TorusGeometry(2.45,0.075,10,64),dockBeaconAmber,g,0,0,approachDockZ+1.58);
  part(new THREE.TorusGeometry(1.55,0.065,10,56),dockBeacon,g,0,0,approachDockZ+1.78);
  part(new THREE.TorusGeometry(0.72,0.05,8,44),dockBeacon,g,0,0,approachDockZ+1.94);
  for(let i=0;i<10;i++){ const an=i/10*Math.PI*2; part(SPH(0.08,8,8),dockBeacon,g,Math.cos(an)*2.75,Math.sin(an)*2.75,approachDockZ+1.5); }
  for(const sgn of [-1,1]) for(let i=0;i<5;i++) part(SPH(0.09,8,8),dockBeacon,g,sgn*4.25,-3.0+i*1.5,approachDockZ+1.25);
  // station-like silhouette: truss, radiator/solar wings, and dishes so it reads as a place, not only a hull.
  part(BOX(38,0.35,0.35),M.metal,g,0,8,-2);
  part(BOX(24,0.28,8),M.dark,g,-26,8,-2,0,0,0.08);
  part(BOX(24,0.28,8),M.dark,g,26,8,-2,0,0,-0.08);
  for(let i=-4;i<=4;i++){ part(BOX(0.18,0.36,8.2),M.metal,g,-26+i*2.7,8,-2,0,0,0.08); part(BOX(0.18,0.36,8.2),M.metal,g,26+i*2.7,8,-2,0,0,-0.08); }
  const dish=part(new THREE.ConeGeometry(2.1,1.2,18,1,true),M.metal,g,-7,7.5,-17,Math.PI,0,0); dish.scale.z=0.75;
  part(BOX(9,7.5,8),M.dark,g,0,0,22);                                                        // engine block
  [[-2.4,-1.9],[2.4,-1.9],[-2.4,1.9],[2.4,1.9]].forEach(([ex,ey])=>{ const e=part(CYL(1.0,0.3,1.0,12),M.engine,g,ex,ey,27); e.rotation.x=Math.PI/2; flick.push({m:e,b:2.2,s:Math.random()*9}); });
  const rl=(c,x,y,z)=>part(SPH(0.32,8,8),new THREE.MeshStandardMaterial({color:0,emissive:c,emissiveIntensity:3,roughness:1}),g,x,y,z);
  rl(0xff3030,-3.7,0,-22); rl(0x30ff60,3.7,0,-22);
  for(let i=0;i<60;i++){ const s=0.3+Math.random()*1.1; const side=Math.floor(Math.random()*3); let x,y,z=-20+Math.random()*44; if(side===0){y=2.4;x=(Math.random()-0.5)*5;}else if(side===1){x=3.7;y=(Math.random()-0.5)*4;}else{x=-3.7;y=(Math.random()-0.5)*4;} part(BOX(s,s*0.5,s*0.7),Math.random()>0.8?M.metal:M.dark,g,x,y,z); }
})(ship);
const shipGlow=new THREE.PointLight(0x37e0c0,8,44,2); shipGlow.position.set(0,0,30); ship.add(shipGlow);
ship.position.set(64,12,-340);

canopy.scale.z=1.18; canopy.renderOrder=3; // curved transparent shell visible from the seat

part(new THREE.TorusGeometry(1.58,0.055,10,72),M.metal,cabin,0,1.0,-0.1,Math.PI/2,0,0);
part(new THREE.TorusGeometry(1.22,0.035,8,64),M.cyan,cabin,0,1.1,-0.1,Math.PI/2,0,0);
part(new THREE.TorusGeometry(0.62,0.026,8,44),M.cyan,cabin,0,1.18,-0.1,Math.PI/2,0,0);

part(new THREE.PlaneGeometry(3.2,1.85),M.glass,cabin,1.52,0.02,-0.12,0,Math.PI/2,0);
for(const x of [-1.6,1.6]){
  part(BOX(0.18,2.18,0.16),M.metal,cabin,x,0.02,-1.72);

}

part(BOX(0.08,0.1,2.5),M.metal,cabin,1.5,-0.82,-0.2);
// window frame (front) — widened so launch, Earth, and the derelict stay visible while free-looking.
part(BOX(3.25,0.22,0.25),M.metal,cabin,0,1.02,-1.62);
part(BOX(3.25,0.28,0.25),M.dark,cabin,0,-0.92,-1.62);
part(BOX(0.22,2.28,0.25),M.metal,cabin,-1.48,0.02,-1.62);
part(BOX(0.22,2.28,0.25),M.metal,cabin,1.48,0.02,-1.62);
part(new THREE.PlaneGeometry(2.95,1.95),M.glass,cabin,0,0.05,-1.6);
for(const x of [-0.95,0.95]) part(BOX(0.08,1.88,0.18),M.metal,cabin,x,0.05,-1.61);
part(BOX(2.75,0.06,0.18),M.cyan,cabin,0,0.97,-1.6);
part(BOX(2.75,0.06,0.18),M.cyan,cabin,0,-0.85,-1.6);
// dash console
part(BOX(3.0,0.5,0.7),M.dark,cabin,0,-0.62,-1.15,-0.5,0,0);
const readout=(mat,w,h,x,z,base)=>{ const m=part(BOX(w,h,0.02),mat,cabin,x,-0.5,z,-0.5,0,0); flick.push({m,b:base,s:Math.random()*9}); return m; };
readout(M.cyan,0.5,0.18,-0.8,-1.05,1.1);
readout(M.amber,0.4,0.16,-0.1,-1.02,1.0);
readout(M.cyan,0.3,0.14,0.5,-1.04,0.9);
readout(M.red,0.14,0.14,0.95,-1.06,1.4);
for(let i=0;i<8;i++) part(CYL(0.04,0.04,0.06,8),M.metal,cabin,-1.0+i*0.26,-0.52,-1.0,-0.5,0,0);

// seats + crew — 4 in an inward-facing ring (max 4 players) so the crew can see each other
function seat(px,pz,faceY,accent,tone,opts={}){
  const s=new THREE.Group(); s.position.set(px,0,pz); s.rotation.y=faceY; cabin.add(s);
  part(BOX(0.7,0.12,0.7),M.seat,s,0,-0.95,0);
  part(BOX(0.7,1.0,0.12),M.seat,s,0,-0.5,0.32);
  part(BOX(0.12,0.5,0.7),M.seat,s,-0.31,-0.7,0); part(BOX(0.12,0.5,0.7),M.seat,s,0.31,-0.7,0);
  if(accent!=null){
    const floating=!!opts.float;
    const c=new THREE.Group(); c.position.set(0,floating?-0.56:-0.95,0.04); c.rotation.y=Math.PI; c.userData.by=c.position.y; s.add(c);
    const a=makeAstronaut({accent,seated:!floating,tone}); a.scale.setScalar(floating?0.5:0.56); c.add(a);
    crew.push({g:c,root:a,s:Math.random()*9,float:floating});
  }
  return s;
}
// ring: YOU at the back (camera), up to 3 crew facing inward — everyone sees everyone
seat(0,0.85,0,null);                  // YOU (back seat / camera) — face the centre & window
seat(0,-0.85,Math.PI,ACTIVE_CREW[0].accent,ACTIVE_CREW[0].tone);       // pilot, faces you
seat(-0.85,0,-Math.PI/2,null);                                           // empty side restraint
seat(0.85,0,Math.PI/2,ACTIVE_CREW[2].accent,ACTIVE_CREW[2].tone);      // medic
function freeFloatingCrewmate(accent,tone){
  const c=new THREE.Group();
  c.position.set(-0.18,-0.1,-0.18);
  c.rotation.set(0.2,-0.55,0.26);
  c.userData.by=c.position.y; c.userData.bx=c.position.x; c.userData.bz=c.position.z;
  cabin.add(c);
  const a=makeAstronaut({accent,tone});
  a.scale.setScalar(0.55);
  c.add(a);
  crew.push({g:c,root:a,s:Math.random()*9,float:true,free:true});
}
freeFloatingCrewmate(ACTIVE_CREW[1].accent,ACTIVE_CREW[1].tone);         // engineer in visible zero-g
// ==BUILD END==

// ---- transit timeline + render loop ----
const statEl=document.getElementById('stat');
const lerp=(a,b,k)=>a+(b-a)*k;
const ease=k=>k<0.5?2*k*k:1-Math.pow(-2*k+2,2)/2;
const clock=new THREE.Clock(); const LOOP=FLOW_FAST?22:46;
function animate(){ requestAnimationFrame(animate); const dt=Math.min(clock.getDelta(),0.05); const t=clock.elapsedTime;
  if(standing){
    const s=Math.sin(yaw), c=Math.cos(yaw), fx=-s, fz=-c, rx=c, rz=-s;
    let mx=0,mz=0;
    if(keys.KeyW){mx+=fx;mz+=fz;} if(keys.KeyS){mx-=fx;mz-=fz;}
    if(keys.KeyD){mx+=rx;mz+=rz;} if(keys.KeyA){mx-=rx;mz-=rz;}
    if(mx||mz){ const l=Math.hypot(mx,mz); targetCamPos.x+=mx/l*1.15*dt; targetCamPos.z+=mz/l*1.15*dt; }
    targetCamPos.x=clamp(targetCamPos.x,-1.02,1.02);
    targetCamPos.z=clamp(targetCamPos.z,-0.98,1.1);
    targetCamPos.y+=(0.62-targetCamPos.y)*Math.min(1,dt*5.5);
  } else {
    targetCamPos.lerp(seatedPos,Math.min(1,dt*4.5));
  }
  camera.position.lerp(targetCamPos,Math.min(1,dt*8));
  camera.rotation.y=yaw; camera.rotation.x=pitch;
  MULTI.publishPose({x:0,y:0,z:0,yaw,hidden:false});
  const tt=(t%LOOP)/LOOP, e=ease(tt);
  if(FLOW && tt>0.96){ goNext('/dock?flow=1'); }   // flow: final approach -> manual docking
  // Earth recedes, shrinks, drifts to the window's edge
  earth.position.set(lerp(-26,-78,e), lerp(-12,-22,e), lerp(-92,-320,e));
  earth.scale.setScalar(lerp(1.0,0.42,e)); earthBall.rotation.y+=dt*0.012;
  // the derelict closes from a far speck → looms in the window
  ship.position.set(lerp(64,-5.5,e), lerp(12,9.5,e), lerp(-340,-120,e));
  ship.scale.setScalar(lerp(0.55,2.8,e)); ship.rotation.y=lerp(0.7,0.0,e); ship.rotation.x=Math.sin(t*0.1)*0.02;
  shipGlow.intensity=7+Math.sin(t*4)*2;
  // micro cabin life (kept tiny so it doesn't fight free-look)
  cabin.rotation.z=Math.sin(t*0.32)*0.006; cabin.position.y=Math.sin(t*0.6)*0.004;
  for(const c of crew){
    if(c.float){
      const zeroG=Math.min(1,Math.max(0,(e-0.24)/0.28));
      if(c.free){
        c.g.position.x=c.g.userData.bx+Math.sin(t*0.72+c.s)*0.34*zeroG;
        c.g.position.y=lerp(c.g.userData.by,0.16+Math.sin(t*1.15+c.s)*0.16,zeroG);
        c.g.position.z=c.g.userData.bz+Math.cos(t*0.58+c.s)*0.46*zeroG;
        c.g.rotation.x=0.22+Math.sin(t*0.54+c.s)*0.34*zeroG;
        c.g.rotation.y=-0.55+Math.sin(t*0.42+c.s)*0.95*zeroG;
        c.g.rotation.z=0.26+Math.sin(t*0.65+c.s)*0.5*zeroG;
      } else {
        c.g.position.x=Math.sin(t*0.72+c.s)*0.22*zeroG;
        c.g.position.y=lerp(c.g.userData.by,0.02+Math.sin(t*1.15+c.s)*0.1,zeroG);
        c.g.position.z=0.08+Math.cos(t*0.58+c.s)*0.3*zeroG;
        c.g.rotation.x=Math.sin(t*0.54+c.s)*0.22*zeroG;
        c.g.rotation.y=Math.PI+Math.sin(t*0.42+c.s)*0.7*zeroG;
        c.g.rotation.z=Math.sin(t*0.65+c.s)*0.34*zeroG;
      }
      animateAstronaut(c.root,'walk',t+c.s,0.32+zeroG*0.28);
    } else {
      c.g.position.y=c.g.userData.by+Math.sin(t*1.4+c.s)*0.012;
      c.g.rotation.z=Math.sin(t*0.7+c.s)*0.02;
    }
  }
  if(cabinAudio){ cabinAudio.approach(e,t); if(Math.random()<0.003) cabinAudio.creak(); if(e>0.7 && Math.random()<0.012) cabinAudio.stat(); }
  for(const f of flick){ f.m.material.emissiveIntensity=f.b*(0.62+0.38*Math.sin(t*8+f.s))*((Math.sin(t*1.7+f.s)>0.93)?0.4:1.0); }
  statEl.style.opacity=(e>0.72)?0.85:0;
  Grade.uniforms.uTime.value=t; composer.render();
}

// ---- cabin soundscape (rich procedural; auto-layers real Audio Forge clips) ----
let cabinAudio=null;
function startAudio(){ if(cabinAudio)return; try{
  const mix=new Mixer(0.85); mix.resume(); const ctx=mix.ctx, B=mix.master;
  tone(ctx,B,{type:'sine',freq:56,gain:0.05});                 // cabin power drone
  tone(ctx,B,{type:'triangle',freq:84,gain:0.014});
  noiseBed(ctx,B,{type:'lowpass',freq:360,q:0.7,gain:0.05});   // air handling
  const dread=tone(ctx,B,{type:'sine',freq:40,gain:0});        // dread swell as the derelict nears
  const carrier=tone(ctx,B,{type:'sine',freq:212,gain:0});     // the derelict's faint carrier tone
  const commsBed=noiseBed(ctx,B,{type:'bandpass',freq:1400,q:0.8,gain:0});
  cabinAudio={
    approach(e,t){ dread.g.gain.value=Math.max(0,e-0.5)*0.12; carrier.g.gain.value=Math.max(0,e-0.6)*0.02; carrier.o.frequency.value=212+Math.sin(t*1.3)*6; commsBed.g.gain.value=Math.max(0,e-0.7)*0.05; },
    creak(){ burst(ctx,B,{type:'lowpass',freq:90+Math.random()*60,q:1.5,gain:0.16,decay:1.2}); },
    stat(){ burst(ctx,B,{type:'bandpass',freq:1800,q:0.5,gain:0.07,decay:0.22}); },
  };
  new ClipBank(mix).load().then(b=>{ b.play('cabin-comms',{loop:true,gain:0.3}); b.play('cabin-drone',{loop:true,gain:0.3}); });
}catch(e){} }
addEventListener('pointerdown',startAudio);

window.__launch={crewSummary:CREW_SUMMARY,multiplayer:MULTI,get state(){ return {flowFast:FLOW_FAST,crewCount:crew.length,crewSummary:CREW_SUMMARY,multiplayer:MULTI.state(),standing,yaw,cameraX:camera.position.x,cameraY:camera.position.y,cameraZ:camera.position.z,canopyVisible:canopy.visible,canopyOpacity:canopy.material.opacity,earthZ:earth.position.z,earthScale:earth.scale.x,shipZ:ship.position.z,shipScale:ship.scale.x}; }};
addEventListener('resize',resize); resize(); fadeIn(); animate();
</script>
