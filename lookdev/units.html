<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SIGNAL LOST — units</title>
<style>
  html,body{margin:0;height:100%;background:#06080d;overflow:hidden;cursor:grab}
  body.look{cursor:grabbing}
  #c{width:100vw;height:100vh;display:block}
  #hud{position:fixed;left:14px;bottom:12px;font:11px ui-monospace,Menlo,monospace;color:#8a97a4;pointer-events:none}
  #hud b{color:#E8A33D}
  #nav{position:fixed;right:14px;top:12px;font:12px ui-monospace,monospace;display:flex;gap:8px}
  #nav a{color:#9fd0ff;text-decoration:none;background:rgba(8,12,18,.7);border:1px solid #20303c;border-radius:6px;padding:6px 10px}
  #title{position:fixed;left:14px;top:12px;font:600 13px ui-monospace,monospace;letter-spacing:3px;color:#E8A33D;pointer-events:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="title">SIGNAL&nbsp;LOST · UNITS</div>
<div id="nav"><a href="/launch">▸ the capsule</a><a href="/">▸ aboard</a></div>
<div id="hud"><b>drag</b> to orbit · <b>scroll</b> to zoom · walk · run · attack animation bench</div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>

<script type="module">
import * as THREE from 'three';
import './nav.js?v=2';
import { loadUnitModel } from './unitgltf.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
import { animateAstronaut, makeAstronaut } from './units_alpha.js?v=5';

const QUERY=new URLSearchParams(location.search);
const ADMIN_UNIT=QUERY.get('adminUnit')||'unit-crew';
let adminUnitSettings={height:1.85,scale:1,yaw:0,positionY:0,colliderRadius:0.35,colliderHeight:1.85,materialEnabled:false,materialColor:'#d9d3c3',emissiveEnabled:false,emissiveColor:'#36e0d0',emissiveIntensity:0,previewState:'bench',showCollider:true};
function finiteNumber(value,fallback){ const n=Number(value); return Number.isFinite(n)?n:fallback; }
function normalizeUnitSettings(value,fallback=adminUnitSettings){
  const source=value&&typeof value==='object'?value:{};
  const previewState=['bench','idle','walk','run','attack','death'].includes(source.previewState)?source.previewState:fallback.previewState;
  return {
    height:finiteNumber(source.height,fallback.height),
    scale:finiteNumber(source.scale,fallback.scale),
    yaw:finiteNumber(source.yaw,fallback.yaw),
    positionY:finiteNumber(source.positionY,fallback.positionY),
    colliderRadius:finiteNumber(source.colliderRadius,fallback.colliderRadius),
    colliderHeight:finiteNumber(source.colliderHeight,fallback.colliderHeight),
    materialEnabled:typeof source.materialEnabled==='boolean'?source.materialEnabled:!!source.materialColor,
    materialColor:typeof source.materialColor==='string'?source.materialColor:fallback.materialColor,
    emissiveEnabled:typeof source.emissiveEnabled==='boolean'?source.emissiveEnabled:!!source.emissiveColor,
    emissiveColor:typeof source.emissiveColor==='string'?source.emissiveColor:fallback.emissiveColor,
    emissiveIntensity:finiteNumber(source.emissiveIntensity,fallback.emissiveIntensity),
    previewState,
    showCollider:typeof source.showCollider==='boolean'?source.showCollider:fallback.showCollider
  };
}
async function loadAdminUnitSettings(){
  try{
    const payload=await (await fetch('/api/units',{cache:'no-store'})).json();
    const items=Array.isArray(payload.items)?payload.items:[];
    adminUnitSettings=normalizeUnitSettings(items.find(item=>item&&item.id===ADMIN_UNIT),adminUnitSettings);
  }catch(e){}
}

const canvas=document.getElementById('c');
const DPR=Math.min(window.devicePixelRatio||1,2);
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,powerPreference:'high-performance'});
renderer.setPixelRatio(DPR); renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.12;

const scene=new THREE.Scene(); scene.background=new THREE.Color(0x06080d);
scene.fog=new THREE.FogExp2(0x06080d,0.035);
const camera=new THREE.PerspectiveCamera(46,1,0.1,200); camera.position.set(0.45,1.58,5.75);

const composer=new EffectComposer(renderer); composer.setPixelRatio(DPR);
composer.addPass(new RenderPass(scene,camera));
const bloom=new UnrealBloomPass(new THREE.Vector2(1,1),0.38,0.58,0.8); composer.addPass(bloom);
composer.addPass(new OutputPass());
const Grade=new ShaderPass({
 uniforms:{tDiffuse:{value:null},uTime:{value:0},uRes:{value:new THREE.Vector2(1,1)}},
 vertexShader:`varying vec2 vUv; void main(){vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
 fragmentShader:`varying vec2 vUv; uniform sampler2D tDiffuse; uniform float uTime; uniform vec2 uRes;
  float rnd(vec2 p){return fract(sin(dot(p,vec2(12.9898,78.233)))*43758.5);}
  void main(){vec2 uv=vUv,d=uv-0.5; float ca=0.0004+dot(d,d)*0.0018;
   vec3 col; col.r=texture2D(tDiffuse,uv+d*ca).r; col.g=texture2D(tDiffuse,uv).g; col.b=texture2D(tDiffuse,uv-d*ca).b;
   col+=(rnd(uv*uRes+uTime)-0.5)*0.01;
   col*=mix(0.76,1.0,smoothstep(1.25,0.12,length(d))); gl_FragColor=vec4(max(col,0.0),1.0);} `
});
composer.addPass(Grade);
function resize(){const w=innerWidth,h=innerHeight; renderer.setSize(w,h,false); composer.setSize(w,h); Grade.uniforms.uRes.value.set(w*DPR,h*DPR); camera.aspect=w/h; camera.updateProjectionMatrix();}

const controls=new OrbitControls(camera,canvas);
controls.enableDamping=true; controls.dampingFactor=0.06; controls.target.set(0,1.1,-0.08);
controls.minDistance=2.2; controls.maxDistance=18; controls.maxPolarAngle=Math.PI*0.52;

// ---- studio lighting ----
scene.add(new THREE.AmbientLight(0x101824,0.24));
scene.add(new THREE.HemisphereLight(0x2a4052,0x120b09,0.38));
const key=new THREE.DirectionalLight(0xfff0e0,2.7); key.position.set(4,6,5); key.castShadow=true;
key.shadow.mapSize.set(2048,2048); key.shadow.camera.near=1; key.shadow.camera.far=30;
key.shadow.camera.left=-6; key.shadow.camera.right=6; key.shadow.camera.top=6; key.shadow.camera.bottom=-6; key.shadow.bias=-0.0004; scene.add(key);
const fill=new THREE.DirectionalLight(0x6f95c0,0.38); fill.position.set(-6,3,-1); scene.add(fill);
const rim=new THREE.DirectionalLight(0x74e8ff,2.4); rim.position.set(-3,4,-6); scene.add(rim);
const cyanGlow=new THREE.PointLight(0x16dfff,1.35,6.8,2); cyanGlow.position.set(-0.9,2.05,-3.0); scene.add(cyanGlow);
const redGlow=new THREE.PointLight(0xff2b18,3.7,7.0,2); redGlow.position.set(3.0,1.55,-1.0); scene.add(redGlow);
const amberBounce=new THREE.PointLight(0xffb45a,1.15,4.6,2); amberBounce.position.set(-2.8,0.6,2.0); scene.add(amberBounce);

// ---- derelict corridor staging ----
function tex(draw,w=512,h=512){const c=document.createElement('canvas');c.width=w;c.height=h;draw(c.getContext('2d'));const t=new THREE.CanvasTexture(c);t.colorSpace=THREE.SRGBColorSpace;return t;}
const gridTex=tex(x=>{ x.fillStyle='#0b0e14'; x.fillRect(0,0,512,512);
  for(let y=0;y<512;y+=64){ for(let xx=0;xx<512;xx+=64){ x.fillStyle=((xx+y)/64)%2?'#101721':'#0d121a'; x.fillRect(xx+2,y+2,60,60); } }
  x.strokeStyle='#253445'; x.lineWidth=2;
  for(let i=0;i<=16;i++){ const p=i/16*512; x.beginPath();x.moveTo(p,0);x.lineTo(p,512);x.stroke(); x.beginPath();x.moveTo(0,p);x.lineTo(512,p);x.stroke(); }
  x.fillStyle='rgba(135,190,230,.18)'; for(let i=0;i<26;i++) x.fillRect((i*79)%512,(i*137)%512,16+(i%5)*12,2+(i%3)); });
gridTex.wrapS=gridTex.wrapT=THREE.RepeatWrapping; gridTex.repeat.set(2.2,3.7);
const ground=new THREE.Mesh(new THREE.PlaneGeometry(8.4,10.5),new THREE.MeshPhysicalMaterial({map:gridTex,color:0x0b1016,roughness:0.66,metalness:0.18,clearcoat:0.12,clearcoatRoughness:0.5}));
ground.rotation.x=-Math.PI/2; ground.position.z=-1.05; ground.receiveShadow=true; scene.add(ground);
const wallMat=new THREE.MeshStandardMaterial({color:0x101620,roughness:0.86,metalness:0.28});
const trimMat=new THREE.MeshStandardMaterial({color:0x242b35,roughness:0.72,metalness:0.45});
const cableMat=new THREE.MeshStandardMaterial({color:0x05070a,roughness:0.8,metalness:0.12});
const redMat=new THREE.MeshStandardMaterial({color:0xff381f,emissive:0xff240e,emissiveIntensity:2.8,roughness:0.42});
const cyanMat=new THREE.MeshStandardMaterial({color:0x70ecff,emissive:0x18dfff,emissiveIntensity:1.55,roughness:0.28});
const part=(geo,mat,x,y,z,rx=0,ry=0,rz=0)=>{const m=new THREE.Mesh(geo,mat);m.position.set(x,y,z);m.rotation.set(rx,ry,rz);m.castShadow=m.receiveShadow=true;scene.add(m);return m;};
for(let i=0;i<7;i++){
  const z=2.1-i*0.9;
  part(new THREE.BoxGeometry(0.12,2.45,0.72),wallMat,-3.15,1.2,z,0,0.08,0);
  part(new THREE.BoxGeometry(0.12,2.45,0.72),wallMat, 3.15,1.2,z,0,-0.08,0);
  part(new THREE.BoxGeometry(0.04,2.0,0.52),trimMat,-3.03,1.24,z,0,0.08,0);
  part(new THREE.BoxGeometry(0.04,2.0,0.52),trimMat, 3.03,1.24,z,0,-0.08,0);
}
part(new THREE.BoxGeometry(5.8,2.7,0.16),wallMat,0,1.35,-4.15);
part(new THREE.BoxGeometry(1.35,0.08,0.08),cyanMat,-0.85,2.35,-4.02);
part(new THREE.BoxGeometry(0.08,0.9,0.08),redMat,3.02,1.65,-1.2);
part(new THREE.BoxGeometry(0.08,0.9,0.08),redMat,3.02,1.65,0.35);
for(let i=0;i<6;i++){
  const sx=-2.6+i*1.05;
  const curve=new THREE.CatmullRomCurve3([
    new THREE.Vector3(sx,2.85,-3.9),
    new THREE.Vector3(sx+0.24,2.45,-2.55+i*0.05),
    new THREE.Vector3(sx-0.12,2.7,-1.0+i*0.12),
  ]);
  part(new THREE.TubeGeometry(curve,24,0.018+(i%2)*0.006,8,false),cableMat,0,0,0);
}

// ---- the crew on a slow turntable ----
const turntable=new THREE.Group(); scene.add(turntable);
const colliderViz=new THREE.Mesh(
  new THREE.CylinderGeometry(1,1,1,32,1,true),
  new THREE.MeshBasicMaterial({color:0x36e0d0,transparent:true,opacity:0.22,wireframe:true,depthWrite:false})
);
colliderViz.renderOrder=10; scene.add(colliderViz);
const TEAM=[0xc8552f,0x2f86c8,0x3fae5a,0xb58ad6];
const EXPRESSIONS=['worried','focused','attack'];
const MODES=['walk','run','attack'];
const standing=[];
[-1.0,0,1.0].forEach((x,i)=>{ const a=makeAstronaut({accent:TEAM[i],expression:EXPRESSIONS[i],tone:i}); a.position.set(x,0,0); a.rotation.y=-0.18+i*0.18; a.userData.mode=MODES[i]; turntable.add(a); standing.push(a); });
// a seated crew member on a crate (how they ride in the capsule)
const crate=new THREE.Mesh(new THREE.BoxGeometry(0.95,0.8,0.95),new THREE.MeshStandardMaterial({color:0x2c3138,roughness:0.8,metalness:0.3,map:gridTex}));
crate.position.set(0,0.4,-2.05); crate.castShadow=crate.receiveShadow=true; turntable.add(crate);
const seated=makeAstronaut({accent:TEAM[3],seated:true,expression:'worried',tone:3}); seated.position.set(0,0.8,-2.05); seated.rotation.y=0.12; turntable.add(seated);

// If a crew model has been forged (/u/unit-crew.glb), use it for the standing crew — one instance per mode
// (walk / run / attack), animated from the GLB's own clips. Falls back to the procedural bench when none exists.
let crewModels=[];
loadUnitModel('unit-crew', {height:1.85}).then(base=>{
  if(!base) return;                                                  // none forged -> keep the procedural crew
  standing.forEach(a=>{ a.visible=false; });                          // hide the procedural standing crew
  [-1.0,0,1.0].forEach((x,i)=>{
    const inst = i===0 ? base : base.instance();                      // first + independent clones (own mixers)
    inst.root.position.set(x,0,0); inst.root.rotation.y=-0.18+i*0.18;
    inst.play(MODES[i]);                                              // walk / run / attack
    turntable.add(inst.root); crewModels.push(inst);
  });
  applyPreviewState();
  applyMaterialSettings(turntable);
});
globalThis.__crew={ get models(){return crewModels;}, standing };     // inspect forged crew
function applyPreviewState(){
  const state=adminUnitSettings.previewState||'bench';
  standing.forEach((a,i)=>{ a.userData.mode=state==='bench'?MODES[i]:state; });
  crewModels.forEach((c,i)=>c.play(state==='bench'?MODES[i]:state));
}
function updateColliderViz(){
  colliderViz.visible=adminUnitSettings.showCollider!==false;
  colliderViz.scale.set(Math.max(0.01,adminUnitSettings.colliderRadius),Math.max(0.01,adminUnitSettings.colliderHeight),Math.max(0.01,adminUnitSettings.colliderRadius));
  colliderViz.position.set(0,adminUnitSettings.positionY+Math.max(0.01,adminUnitSettings.colliderHeight)*0.5,0);
}
function applyMaterialSettings(root){
  root.traverse(o=>{
    if(!o.isMesh||!o.material)return;
    const materials=Array.isArray(o.material)?o.material:[o.material];
    for(const mat of materials){
      if(mat.color){
        if(!mat.userData.adminBaseColor)mat.userData.adminBaseColor=mat.color.clone();
        if(adminUnitSettings.materialEnabled)mat.color.set(adminUnitSettings.materialColor);
        else mat.color.copy(mat.userData.adminBaseColor);
      }
      if(mat.emissive){
        if(!mat.userData.adminBaseEmissive)mat.userData.adminBaseEmissive=mat.emissive.clone();
        if(adminUnitSettings.emissiveEnabled){ mat.emissive.set(adminUnitSettings.emissiveColor); mat.emissiveIntensity=adminUnitSettings.emissiveIntensity; }
        else mat.emissive.copy(mat.userData.adminBaseEmissive);
      }
    }
  });
}
function applyAdminUnitSettings(settings){
  adminUnitSettings=normalizeUnitSettings(settings,adminUnitSettings);
  const heightScale=adminUnitSettings.height/1.85;
  turntable.scale.setScalar(Math.max(0.05,heightScale*adminUnitSettings.scale));
  turntable.position.y=adminUnitSettings.positionY;
  applyPreviewState();
  updateColliderViz();
  applyMaterialSettings(turntable);
}
void loadAdminUnitSettings().then(()=>applyAdminUnitSettings(adminUnitSettings));
addEventListener('message',event=>{
  if(!event.data||event.data.type!=='sl-admin-unit-preview')return;
  if(event.data.unitId&&event.data.unitId!==ADMIN_UNIT)return;
  applyAdminUnitSettings(event.data.settings);
});

const clock=new THREE.Clock();
function animate(){ requestAnimationFrame(animate); const dt=clock.getDelta(); const t=clock.getElapsedTime();
  turntable.rotation.y=adminUnitSettings.yaw+Math.sin(t*0.18)*0.08;
  crewModels.forEach(c=>c.update(dt));                               // drive forged-crew animation (no-op if procedural)
  standing.forEach((a,i)=>animateAstronaut(a,a.userData.mode,t+i*0.08,1));
  const animState=standing.map(a=>({
    mode:a.userData.animState?.mode,
    bodyY:Number((a.userData.animState?.bodyY??0).toFixed(4)),
    armX:Number((a.userData.animState?.armX??0).toFixed(4)),
    forearmX:Number((a.userData.animState?.forearmX??0).toFixed(4)),
    legX:Number((a.userData.animState?.legX??0).toFixed(4)),
    shinX:Number((a.userData.animState?.shinX??0).toFixed(4)),
  }));
  globalThis.__unitAnimState=animState;
  document.documentElement.dataset.animState=JSON.stringify(animState);
  controls.update(); Grade.uniforms.uTime.value=t; composer.render();
}
addEventListener('pointerdown',()=>document.body.classList.add('look'));
addEventListener('pointerup',()=>document.body.classList.remove('look'));
addEventListener('resize',resize); resize(); animate();
</script>
</body>
</html>
