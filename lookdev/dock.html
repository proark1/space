<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SIGNAL LOST — manual docking</title>
<style>
  html,body{margin:0;height:100%;background:#02030a;overflow:hidden}
  #c{width:100vw;height:100vh;display:block}
  #title{position:fixed;left:14px;top:12px;font:600 13px ui-monospace,monospace;letter-spacing:3px;color:#E8A33D;pointer-events:none}
  #nav{position:fixed;right:14px;top:12px;font:12px ui-monospace,monospace;display:flex;gap:8px}
  #nav a{color:#9fd0ff;text-decoration:none;background:rgba(8,12,18,.7);border:1px solid #20303c;border-radius:6px;padding:6px 10px}
  #cross{position:fixed;left:50%;top:50%;width:54px;height:54px;transform:translate(-50%,-50%);pointer-events:none}
  #cross:before,#cross:after{content:'';position:absolute;background:#7dffb0;opacity:.8}
  #cross:before{left:50%;top:0;width:2px;height:100%;transform:translateX(-50%)}
  #cross:after{top:50%;left:0;height:2px;width:100%;transform:translateY(-50%)}
  #stats{position:fixed;left:50%;bottom:74px;transform:translateX(-50%);display:flex;gap:22px;font:11px ui-monospace,monospace;color:#9fd0ff;letter-spacing:1px;text-shadow:0 0 6px #000;pointer-events:none}
  #stats b{color:#fff} .good{color:#7dffb0!important} .bad{color:#ff6a5a!important}
  #prompt{position:fixed;left:50%;bottom:42px;transform:translateX(-50%);font:11px ui-monospace,monospace;color:#8a97a4;letter-spacing:2px;text-shadow:0 0 6px #000;pointer-events:none}
  #prompt b{color:#E8A33D}
  #result{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);display:none;flex-direction:column;align-items:center;gap:12px;text-align:center}
  #rtxt{font:700 22px ui-monospace,monospace;letter-spacing:4px}
  #result a,#result button{font:600 12px ui-monospace,monospace;letter-spacing:2px;text-decoration:none;border-radius:8px;padding:10px 18px;cursor:pointer;border:0}
  #enter{background:#7dffb0;color:#04140a;display:none} #retry{background:#1a1f27;color:#cdd6e0;border:1px solid #2a3a48}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="title">SIGNAL&nbsp;LOST · MANUAL DOCKING</div>
<div id="nav"><a href="/launch">▸ the capsule</a><a href="/exterior">▸ the derelict</a></div>
<div id="cross"></div>
<div id="stats"><div>DIST <b id="sd">—</b></div><div>ALIGN <b id="sa">—</b></div><div>SPEED <b id="ss">—</b></div></div>
<div id="prompt"><b>WASD / arrows</b> steer · <b>hold SPACE</b> to close · align the collar to the cross, come in slow</div>
<div id="result"><div id="rtxt"></div><a id="enter" href="/">▸ STEP INTO THE SHIP</a><button id="retry">↻ RETRY APPROACH</button></div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>

<script type="module">
import * as THREE from 'three';
import './nav.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
import { Mixer, noiseBed, tone, burst, blip, ClipBank } from './audio.js';
import { FLOW, fadeIn, goNext } from './flow.js';

const canvas=document.getElementById('c');
const DPR=Math.min(window.devicePixelRatio||1,2);
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,powerPreference:'high-performance'});
renderer.setPixelRatio(DPR); renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping; const BASE_EXP=1.3; renderer.toneMappingExposure=BASE_EXP;

const scene=new THREE.Scene(); scene.background=new THREE.Color(0x03040b);
scene.fog=new THREE.FogExp2(0x04060e,0.0016);
const camera=new THREE.PerspectiveCamera(60,1,0.05,6000); camera.rotation.order='YXZ';   // capsule axis, looking -Z

const composer=new EffectComposer(renderer); composer.setPixelRatio(DPR);
composer.addPass(new RenderPass(scene,camera));
const bloom=new UnrealBloomPass(new THREE.Vector2(1,1),0.6,0.6,0.7); composer.addPass(bloom);
composer.addPass(new OutputPass());
const Grade=new ShaderPass({
 uniforms:{tDiffuse:{value:null},uTime:{value:0},uRes:{value:new THREE.Vector2(1,1)}},
 vertexShader:`varying vec2 vUv; void main(){vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
 fragmentShader:`varying vec2 vUv; uniform sampler2D tDiffuse; uniform float uTime; uniform vec2 uRes;
  float rnd(vec2 p){return fract(sin(dot(p,vec2(12.9898,78.233)))*43758.5);}
  void main(){vec2 uv=vUv,d=uv-0.5; float ca=0.0006+dot(d,d)*0.0026;
   vec3 col; col.r=texture2D(tDiffuse,uv+d*ca).r; col.g=texture2D(tDiffuse,uv).g; col.b=texture2D(tDiffuse,uv-d*ca).b;
   col+=(rnd(uv*uRes+uTime)-0.5)*0.013; col*=mix(0.62,1.0,smoothstep(1.25,0.08,length(d))); gl_FragColor=vec4(max(col,0.0),1.0);} `
});
composer.addPass(Grade);
function resize(){const w=innerWidth,h=innerHeight; renderer.setSize(w,h,false); composer.setSize(w,h); Grade.uniforms.uRes.value.set(w*DPR,h*DPR); camera.aspect=w/h; camera.updateProjectionMatrix();}

function part(geo,m,parent,x,y,z,rx,ry,rz){const o=new THREE.Mesh(geo,m);o.position.set(x||0,y||0,z||0);if(rx||ry||rz)o.rotation.set(rx||0,ry||0,rz||0);o.castShadow=o.receiveShadow=true;(parent instanceof THREE.Object3D?parent:scene).add(o);return o;}
const BOX=(w,h,d)=>new THREE.BoxGeometry(w,h,d);
const CYL=(a,b,h,s)=>new THREE.CylinderGeometry(a,b,h,s||28);

// ==BUILD START==
const ringLights=[], clampPivots=[], approachLad=[];
function tex(draw){const c=document.createElement('canvas');c.width=c.height=256;draw(c.getContext('2d'));const t=new THREE.CanvasTexture(c);t.wrapS=t.wrapT=THREE.RepeatWrapping;t.colorSpace=THREE.SRGBColorSpace;return t;}
const grime=tex(x=>{ x.fillStyle='#6b727c'; x.fillRect(0,0,256,256); for(let i=0;i<2400;i++){ const v=(Math.random()*54-27)|0; x.fillStyle=`rgba(${120+v},${122+v},${128+v},${Math.random()*0.4})`; const s=Math.random()*3+1; x.fillRect(Math.random()*256,Math.random()*256,s,s);} for(let i=0;i<16;i++){ x.strokeStyle=`rgba(24,20,16,${Math.random()*0.4})`; x.beginPath(); x.moveTo(Math.random()*256,0); x.lineTo(Math.random()*256+30,256); x.stroke(); } }); grime.repeat.set(3,3);
const M={
  hull: new THREE.MeshStandardMaterial({color:0x828c9a,map:grime,roughness:0.8,metalness:0.4}),
  hull2:new THREE.MeshStandardMaterial({color:0x59626d,map:grime,roughness:0.84,metalness:0.4}),
  dark: new THREE.MeshStandardMaterial({color:0x39424c,map:grime,roughness:0.85,metalness:0.45}),
  metal:new THREE.MeshStandardMaterial({color:0x868f9e,roughness:0.34,metalness:0.8}),
  frame:new THREE.MeshStandardMaterial({color:0x12161c,roughness:0.7,metalness:0.4}),
  amber:new THREE.MeshStandardMaterial({color:0x1a1004,emissive:0xE8A33D,emissiveIntensity:1.2,roughness:1}),
  engine:new THREE.MeshStandardMaterial({color:0x04140f,emissive:0x37e0c0,emissiveIntensity:2.2,roughness:1}),
};
scene.add(new THREE.AmbientLight(0x3a4760,1.05));
scene.add(new THREE.HemisphereLight(0x4a667e,0x0c1018,0.85));
const sun=new THREE.DirectionalLight(0xfff0d6,3.2); sun.position.set(60,45,55); scene.add(sun);
const fill=new THREE.DirectionalLight(0x6f8bb0,0.85); fill.position.set(-50,10,30); scene.add(fill);
// stars + earth backdrop
{ const N=2200,p=new Float32Array(N*3); for(let i=0;i<N;i++){ const v=new THREE.Vector3().randomDirection().multiplyScalar(1400+Math.random()*900); p[i*3]=v.x;p[i*3+1]=v.y;p[i*3+2]=v.z; }
  const g=new THREE.BufferGeometry(); g.setAttribute('position',new THREE.BufferAttribute(p,3));
  scene.add(new THREE.Points(g,new THREE.PointsMaterial({color:0xcfe0ff,size:2,sizeAttenuation:false,transparent:true,opacity:0.85,fog:false}))); }
part(new THREE.SphereGeometry(150,40,40),new THREE.MeshStandardMaterial({color:0x16518c,emissive:0x07203a,emissiveIntensity:0.3,roughness:1}),scene,-220,-120,-520);

// ---- the derelict: a big ship section sitting in space + the docking port (align the collar to the cross) ----
const world=new THREE.Group(); scene.add(world);
const hull=new THREE.Group(); world.add(hull); hull.position.z=-7;
for(let ix=-1;ix<=1;ix++) for(let iy=-1;iy<=1;iy++) part(BOX(9.2,9.2,7),((ix+iy)&1)?M.hull:M.hull2,hull,ix*9,iy*9,0);   // ~28-wide hull face (a big ship section, not a wall)
part(BOX(34,34,14),M.dark,hull,0,0,-8);                                                  // hull bulk behind
part(BOX(10,10,2),M.dark,hull,0,0,3.7); part(BOX(7,7,1.1),M.metal,hull,0,0,4.6);         // recessed dock bay
for(let k=-1;k<=1;k++){ part(BOX(0.45,28,0.4),M.metal,hull,k*9,0,3.6); part(BOX(28,0.45,0.4),M.metal,hull,0,k*9,3.6); }   // panel seams
for(let i=0;i<80;i++){ const a=Math.random()*Math.PI*2, r=6+Math.random()*9, s=0.4+Math.random()*1.6; part(BOX(s,s*(0.4+Math.random()),0.5+Math.random()*1.2),Math.random()>0.7?M.metal:M.dark,hull,Math.cos(a)*r,Math.sin(a)*r,3.8+Math.random()*0.5); }   // greeble
for(let gy=-1;gy<=1;gy++){ if(gy===0) continue; for(let wx=-11;wx<=11;wx+=2.2){ if(Math.abs(wx)<6 && Math.abs(gy*9)<6) continue; if(Math.random()>0.4) part(BOX(0.7,0.45,0.2),M.amber,hull,wx,gy*9+(Math.random()-0.5)*4,3.9); } }   // lit windows
const rl=(c,x,y)=>part(new THREE.SphereGeometry(0.3,10,10),new THREE.MeshStandardMaterial({color:0,emissive:c,emissiveIntensity:3,roughness:1}),hull,x,y,4.3);
rl(0xff3030,-6,6); rl(0x30ff60,6,6); rl(0xff3030,-6,-6); rl(0x30ff60,6,-6);
part(BOX(9,5,7),M.dark,hull,0,15,1.5); part(BOX(6,3,5),M.hull,hull,0,18,2); part(BOX(4.5,1,4),M.amber,hull,0,19.6,2.5);   // command-tower hint above
part(CYL(1.7,2.0,2.4,16),M.engine,hull,-15,-13,1.5,Math.PI/2,0,0); part(CYL(1.7,2.0,2.4,16),M.engine,hull,-12,-15,1.5,Math.PI/2,0,0);   // engine glow to one side
const engL=new THREE.PointLight(0x37e0c0,9,32,2); engL.position.set(-13,-14,5); hull.add(engL);
part(BOX(16,0.5,11),M.metal,hull,20,3,-1,0,0,-0.5); for(let i=-3;i<4;i++) part(BOX(0.25,0.6,11),M.dark,hull,16+i*2.2,3+i*1.1,-1,0,0,-0.5);   // radiator wing
part(BOX(3.5,3,0.9),new THREE.MeshBasicMaterial({color:0x000000}),hull,11,-9,3.9);   // dark hull breach
// the docking port reaching out toward the capsule — a real berth: bay, target, collar, guidance funnel, approach ladder
part(BOX(4.4,4.4,3.5),M.metal,world,0,0,-3.2); part(BOX(3.8,0.5,3.5),M.amber,world,0,2.2,-3.2); part(BOX(3.8,0.5,3.5),M.amber,world,0,-2.2,-3.2);
for(let i=0;i<4;i++) part(CYL(2.0,2.0,0.6,28),(i&1?M.dark:M.metal),world,0,0,-2.4+i*0.6);                   // concertina airlock tube
// painted concentric alignment target behind the collar
const tgtRingMat=new THREE.MeshStandardMaterial({color:0,emissive:0x7dffb0,emissiveIntensity:1.4,roughness:1});
part(new THREE.TorusGeometry(0.8,0.05,8,40),tgtRingMat,world,0,0,-0.25); part(new THREE.TorusGeometry(1.5,0.05,8,40),tgtRingMat,world,0,0,-0.25);
part(CYL(3.0,3.4,0.9,32),M.metal,world,0,0,-1.3,Math.PI/2,0,0);                                            // collar base
const collar=part(CYL(2.4,2.4,1.0,36),M.metal,world,0,0,-0.6,Math.PI/2,0,0);                                // the docking collar
part(new THREE.TorusGeometry(2.4,0.18,12,40),M.amber,world,0,0,-0.1);                                       // lit collar rim
const tgt=part(new THREE.SphereGeometry(0.16,16,16),new THREE.MeshStandardMaterial({color:0,emissive:0x7dffb0,emissiveIntensity:3,roughness:1}),world,0,0,0.1);   // centre target
// guidance funnel — the alignment cone the capsule flies into (wide mouth toward the pilot)
part(new THREE.CylinderGeometry(3.0,2.4,1.6,30,1,true),new THREE.MeshStandardMaterial({color:0x6a7686,roughness:0.4,metalness:0.7,side:THREE.DoubleSide}),world,0,0,0.6,Math.PI/2,0,0);
// hazard chevrons ringing the funnel mouth
for(let a=0;a<12;a++){ const an=a/12*Math.PI*2; part(BOX(0.5,0.45,0.12),(a&1?M.amber:M.dark),world,Math.cos(an)*3.0,Math.sin(an)*3.0,1.3,0,0,an); }
// capture petals — visual latch teeth around the collar
for(let a=0;a<6;a++){ const an=a/6*Math.PI*2+0.25; part(BOX(1.0,0.12,0.8),M.metal,world,Math.cos(an)*2.15,Math.sin(an)*2.15,-0.35,0,0,an); }
for(let a=0;a<16;a++){ const an=a/16*Math.PI*2; const lm=part(new THREE.SphereGeometry(0.12,8,8),new THREE.MeshStandardMaterial({color:0,emissive:0xff5030,emissiveIntensity:2.6,roughness:1}),world,Math.cos(an)*2.4,Math.sin(an)*2.4,0.0); ringLights.push(lm.material); }
for(let a=0;a<4;a++){ const an=a/4*Math.PI*2+0.4; const piv=new THREE.Group(); piv.position.set(Math.cos(an)*2.7,Math.sin(an)*2.7,-0.4); piv.rotation.z=an; world.add(piv); part(BOX(1.4,0.3,0.5),M.metal,piv,0.7,0,0); clampPivots.push(piv); }
const dockLight=new THREE.PointLight(0xff7050,9,28,2); dockLight.position.set(0,0,2.5); world.add(dockLight);
// approach-light ladder streaming out toward the pilot — a clear corridor to fly down
for(let i=1;i<=6;i++){ for(const sgn of [1,-1]){ const lm=part(new THREE.SphereGeometry(0.18,8,8),new THREE.MeshStandardMaterial({color:0,emissive:0xff9040,emissiveIntensity:2.6,roughness:1}),world,sgn*2.9,0,1.6+i*2.4); approachLad.push({m:lm.material,i}); } }

// ---- ship interior: airlock + corridor you walk into after docking (revealed in-page, no reload) ----
const ship=new THREE.Group(); scene.add(ship); ship.visible=false;
const CW=3.6, CH=3.2, ZEND=-28; const corLights=[];
const cmFloor=new THREE.MeshStandardMaterial({color:0x2b3338,map:grime,roughness:0.9,metalness:0.08});
const cmWall=new THREE.MeshStandardMaterial({color:0x39434c,map:grime,roughness:0.92,metalness:0.12});
const cmWall2=new THREE.MeshStandardMaterial({color:0x2a323a,map:grime,roughness:0.95,metalness:0.08});
const cyanM=new THREE.MeshStandardMaterial({color:0x05131a,emissive:0x9FD0FF,emissiveIntensity:1.2,roughness:1});
part(new THREE.TorusGeometry(1.9,0.16,10,28),M.amber,ship,0,1.5,-1.8); part(new THREE.TorusGeometry(1.7,0.1,10,28),M.metal,ship,0,1.5,-1.5);   // airlock mouth you pass through
part(BOX(CW,0.2,2-ZEND),cmFloor,ship,0,0,(-2+ZEND)/2); part(BOX(CW,0.2,2-ZEND),cmWall2,ship,0,CH,(-2+ZEND)/2);
part(BOX(0.2,CH,2-ZEND),cmWall,ship,-CW/2,CH/2,(-2+ZEND)/2); part(BOX(0.2,CH,2-ZEND),cmWall,ship,CW/2,CH/2,(-2+ZEND)/2);
for(let z=-4;z>ZEND;z-=4){ part(BOX(0.3,CH,0.5),cmWall2,ship,-CW/2+0.15,CH/2,z); part(BOX(0.3,CH,0.5),cmWall2,ship,CW/2-0.15,CH/2,z); part(BOX(CW,0.4,0.5),cmWall2,ship,0,CH-0.2,z);
  part(new THREE.CylinderGeometry(0.06,0.06,CW-0.3,8),M.metal,ship,0,CH-0.42,z+1,0,0,Math.PI/2);
  const lit=(((z/4)|0)%2===0); part(BOX(0.9,0.06,0.5),lit?M.amber:cyanM,ship,0,CH-0.42,z+2);
  const pl=new THREE.PointLight(lit?0xE8A33D:0x9FD0FF,lit?4:1.4,8,1.6); pl.position.set(0,CH-0.6,z+2); ship.add(pl); corLights.push({pl,base:pl.intensity,seed:Math.random()*9}); }
part(BOX(CW,CH,0.3),cmWall2,ship,0,CH/2,ZEND); part(BOX(1.5,2.2,0.18),M.dark,ship,0,1.3,ZEND+0.2); part(BOX(1.1,0.18,0.06),M.amber,ship,0,2.5,ZEND+0.25);   // bulkhead door (deeper in)
const deepLight=new THREE.PointLight(0xff3a2a,0,7,2); deepLight.position.set(0,1.6,ZEND-1.5); ship.add(deepLight);
const shipAmb=new THREE.AmbientLight(0x223040,0); scene.add(shipAmb);
const flash=new THREE.SpotLight(0xffe6c0,0,28,0.55,0.5,1.3); const flashT=new THREE.Object3D(); scene.add(flashT); flash.target=flashT; scene.add(flash);

// ---- capsule window frame (you are looking out of the capsule) ----
const frame=new THREE.Group(); camera.add(frame); scene.add(camera);
const fr=(w,h,x,y)=>part(BOX(w,h,0.2),M.frame,frame,x,y,-1.15);
fr(3.4,0.5,0,1.05); fr(3.4,0.7,0,-1.15); fr(0.6,2.6,-1.5,0); fr(0.6,2.6,1.5,0);
part(BOX(0.2,0.1,0.05),M.amber,frame,-0.9,-0.78,-1.1); part(BOX(0.2,0.1,0.05),M.amber,frame,0.9,-0.78,-1.1);

// ---- explosion debris pool ----
const DEB=80, debGeo=new THREE.BufferGeometry(), debPos=new Float32Array(DEB*3), debVel=[];
for(let i=0;i<DEB;i++){ debPos[i*3]=debPos[i*3+1]=0; debPos[i*3+2]=-2; debVel.push(new THREE.Vector3()); }
debGeo.setAttribute('position',new THREE.BufferAttribute(debPos,3));
const debris=new THREE.Points(debGeo,new THREE.PointsMaterial({color:0xffa040,size:0.5,transparent:true,opacity:0,depthWrite:false,blending:THREE.AdditiveBlending,fog:false})); scene.add(debris);
// ==BUILD END==

// ---- HUD ----
const sd=document.getElementById('sd'), sa=document.getElementById('sa'), ss=document.getElementById('ss');
const result=document.getElementById('result'), rtxt=document.getElementById('rtxt'), enter=document.getElementById('enter'), retry=document.getElementById('retry');
enter.onclick=e=>{ e.preventDefault(); board(); };   // step into the ship — in-page, no reload

// ---- audio ----
let A=null;
function startAudio(){ if(A)return; try{ const mix=new Mixer(0.9); mix.resume(); const ctx=mix.ctx,B=mix.master;
  noiseBed(ctx,B,{type:'lowpass',freq:120,q:1.0,gain:0.05}); tone(ctx,B,{type:'sine',freq:40,gain:0.03});
  A={ thr(){ blip(ctx,B,{type:'square',freq:120,gain:0.04,dur:0.08}); }, clunk(){ burst(ctx,B,{type:'lowpass',freq:160,q:1,gain:0.5,decay:0.5}); }, boom(){ burst(ctx,B,{type:'lowpass',freq:90,q:0.7,gain:0.8,decay:1.4}); burst(ctx,B,{type:'highpass',freq:2500,q:0.3,gain:0.3,decay:0.7}); } };
  new ClipBank(mix).load().then(b=>{ b.play('space-drone',{loop:true,gain:0.4}); });
}catch(e){} }

// ---- input ----
const keys={};
addEventListener('keydown',e=>{ keys[e.code]=true; startAudio(); if([ 'Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault(); });
addEventListener('keyup',e=>{ keys[e.code]=false; });
addEventListener('pointerdown',startAudio);

// --- step into the ship: the docking minigame hands off to a first-person walk (same page) ---
function board(){ if(state==='board'||state==='inside')return; state='board'; boardT=0; result.style.display='none';
  document.getElementById('cross').style.display='none'; document.getElementById('stats').style.display='none';
  frame.visible=false; ship.visible=true; shipAmb.intensity=0.22; }
addEventListener('mousemove',e=>{ if(state==='inside' && document.pointerLockElement===canvas){ yaw-=e.movementX*0.0023; pitch=Math.max(-1.2,Math.min(1.2,pitch-e.movementY*0.0023)); } });
addEventListener('keydown',e=>{ if(state==='inside' && e.code==='KeyE' && pos.z<ZEND+3) goNext('/'); });
canvas.addEventListener('click',()=>{ if(state==='inside' && document.pointerLockElement!==canvas) canvas.requestPointerLock(); });

// ---- state / physics ----
const TOL=0.6, SPEED_MAX=1.7, THR=3.4, CLOSE=3.0, DAMP=0.8;
let offX,offY,voffX,voffY,dist,vdist,driftP,state,boomT,shake=0,thrT=0,boardT=0,yaw=0,pitch=0,apprT=0,apprX0=0,apprY0=0,apprXt=0,apprYt=0; const pos=new THREE.Vector3(), _fw=new THREE.Vector3();
const PROMPT_DOCK='<b>WASD / arrows</b> steer · <b>hold SPACE</b> to close · align the collar to the cross, come in slow';
function reset(){ const sgn=(Math.random()<.5?-1:1); apprX0=4.2*sgn; apprY0=2.6; apprXt=2.0*sgn; apprYt=-0.9; offX=apprX0; offY=apprY0; voffX=voffY=0; dist=120; vdist=0; apprT=0; driftP=Math.random()*9; state='approach'; result.style.display='none'; enter.style.display='none'; renderer.toneMappingExposure=BASE_EXP; debris.material.opacity=0;
  frame.visible=true; ship.visible=false; world.visible=true; shipAmb.intensity=0; flash.intensity=0; camera.position.set(0,0,0); camera.rotation.set(0,0,0);
  document.getElementById('cross').style.display=''; document.getElementById('stats').style.display=''; document.getElementById('prompt').style.display='';
  document.getElementById('prompt').innerHTML='<b>▸ APPROACH</b> · autopilot lining up the port — stand by for manual docking'; }
reset();
retry.onclick=reset;

const clock=new THREE.Clock(); const _v=new THREE.Vector3();
function animate(){ requestAnimationFrame(animate); const dt=Math.min(clock.getDelta(),0.05); const t=clock.elapsedTime;
  if(state==='approach'){
    // autopilot cruises in and lines the port up — reads as "arriving, heading for the dock" before manual control
    apprT+=dt; const k=Math.min(1,apprT/4.5), e=k<.5?2*k*k:1-Math.pow(-2*k+2,2)/2;
    const pd=dist; dist=120+(38-120)*e; offX=apprX0+(apprXt-apprX0)*e; offY=apprY0+(apprYt-apprY0)*e;
    vdist=Math.max(0,(pd-dist)/Math.max(dt,1e-4));
    sd.textContent=dist.toFixed(0)+'m'; sa.textContent='AUTO'; sa.className=''; ss.textContent='AUTO'; ss.className='';
    ringLights.forEach((m,i)=>{ m.emissive.setHex(0xff5030); m.emissiveIntensity=1+1.6*Math.max(0,Math.sin(t*4-i*0.4)); });
    tgt.material.emissive.setHex(0xffcf50);
    const grab=apprT>0.7 && (keys.Space||keys.KeyW||keys.KeyA||keys.KeyS||keys.KeyD||keys.ArrowUp||keys.ArrowDown||keys.ArrowLeft||keys.ArrowRight);
    if(k>=1||grab){ if(k>=1){ dist=38; offX=apprXt; offY=apprYt; } state='align'; voffX=voffY=0; vdist=0;
      document.getElementById('prompt').innerHTML=PROMPT_DOCK; }
  } else if(state==='align'){
    const dfx=Math.sin(t*0.7+driftP)*0.9+Math.sin(t*1.7)*0.4, dfy=Math.cos(t*0.5+driftP)*0.8;   // wandering drift
    let ix=0,iy=0,iz=0, thrusting=false;
    if(keys.ArrowLeft||keys.KeyA){ ix+=THR; thrusting=true; } if(keys.ArrowRight||keys.KeyD){ ix-=THR; thrusting=true; }
    if(keys.ArrowUp||keys.KeyW){ iy-=THR; thrusting=true; } if(keys.ArrowDown||keys.KeyS){ iy+=THR; thrusting=true; }
    if(keys.Space){ iz+=CLOSE; thrusting=true; }
    voffX+=(dfx+ix)*dt; voffY+=(dfy+iy)*dt; voffX*=Math.exp(-DAMP*dt); voffY*=Math.exp(-DAMP*dt);
    offX+=voffX*dt; offY+=voffY*dt;
    vdist+=iz*dt; vdist*=Math.exp(-0.4*dt); if(vdist<0)vdist=0; dist-=vdist*dt;
    if(thrusting && (thrT-=dt)<=0){ thrT=0.09; if(A)A.thr(); }
    const off=Math.hypot(offX,offY);
    // HUD
    sd.textContent=dist.toFixed(1)+'m'; sa.textContent=off.toFixed(2); ss.textContent=vdist.toFixed(2)+'m/s';
    sa.className=off<TOL?'good':'bad'; ss.className=vdist<SPEED_MAX?'good':'bad';
    // ring lights chase red; target light green when you are aligned
    const aligned=off<TOL;
    ringLights.forEach((m,i)=>{ m.emissive.setHex(aligned?0x35ff70:0xff5030); m.emissiveIntensity=aligned?2.8:(1+1.6*Math.max(0,Math.sin(t*4-i*0.4))); });
    tgt.material.emissive.setHex(aligned?0x7dffb0:0xffcf50);
    if(dist<=0.6){
      if(off<TOL && vdist<SPEED_MAX){ state='docked'; if(A)A.clunk(); clampPivots.forEach(p=>p.rotation.z+=0.5);
        rtxt.textContent='✓ HARD DOCK'; rtxt.className='good'; enter.style.display='inline-block'; result.style.display='flex';
        if(FLOW) setTimeout(board,2600); }   // flow: auto-board after the clunk
      else { state='boom'; boomT=0; if(A)A.boom(); shake=1; debris.material.opacity=1;
        for(let i=0;i<DEB;i++){ debPos[i*3]=-offX; debPos[i*3+1]=-offY; debPos[i*3+2]=-0.5; debVel[i].set((Math.random()-0.5)*16,(Math.random()-0.5)*16,(Math.random()-0.5)*16+4); }
        rtxt.textContent='✗ COLLISION'; rtxt.className='bad'; result.style.display='flex'; }
    }
  } else if(state==='boom'){ boomT+=dt; shake*=Math.exp(-3*dt);
    for(let i=0;i<DEB;i++){ debPos[i*3]+=debVel[i].x*dt; debPos[i*3+1]+=debVel[i].y*dt; debPos[i*3+2]+=debVel[i].z*dt; }
    debGeo.attributes.position.needsUpdate=true; debris.material.opacity=Math.max(0,1-boomT*0.5);
    renderer.toneMappingExposure=BASE_EXP*(1+Math.max(0,1.4-boomT*3));
  } else if(state==='docked'){ collarPulse(t); }
  else if(state==='board'){ collarPulse(t); boardT+=dt; const k=Math.min(1,boardT/2.4), e=k<.5?2*k*k:1-Math.pow(-2*k+2,2)/2;
    camera.position.set(0,1.6*e,-1-e*4.4); flash.intensity=120*e; flash.position.copy(camera.position); flashT.position.set(0,1.4,camera.position.z-3);
    if(k>=1){ state='inside'; world.visible=false; pos.set(0,0,camera.position.z); document.getElementById('prompt').innerHTML='<b>WASD</b> walk · <b>mouse</b> look · reach the bulkhead · <b>E</b> deeper in'; if(canvas.requestPointerLock) canvas.requestPointerLock(); } }
  else if(state==='inside'){
    const s=Math.sin(yaw),cc=Math.cos(yaw),fx=-s,fz=-cc,rxx=cc,rzz=-s; let mx=0,mz=0;
    if(keys.KeyW||keys.ArrowUp){mx+=fx;mz+=fz;} if(keys.KeyS||keys.ArrowDown){mx-=fx;mz-=fz;}
    if(keys.KeyD||keys.ArrowRight){mx+=rxx;mz+=rzz;} if(keys.KeyA||keys.ArrowLeft){mx-=rxx;mz-=rzz;}
    if(mx||mz){ const l=Math.hypot(mx,mz); pos.x+=mx/l*2.6*dt; pos.z+=mz/l*2.6*dt; }
    pos.x=Math.max(-CW/2+0.4,Math.min(CW/2-0.4,pos.x)); pos.z=Math.max(ZEND+0.9,Math.min(-1.2,pos.z));
    camera.position.set(pos.x,1.6+((mx||mz)?Math.sin(t*9)*0.04:0),pos.z); camera.rotation.set(pitch,yaw,0);
    flash.position.copy(camera.position); camera.getWorldDirection(_fw); flashT.position.copy(camera.position).add(_fw); flash.intensity=120;
    for(const L of corLights){ const n=Math.sin(t*16+L.seed)*0.5+0.5; L.pl.intensity=L.base*(0.4+0.6*n); }
    deepLight.intensity=0.5+0.5*Math.sin(t*3);
  }
  // place the dock per offset/approach; gentle approach sway
  world.position.set(-offX,-offY,-dist); world.rotation.z=Math.sin(t*0.2)*0.01;
  const docking=(state==='approach'||state==='align'||state==='boom');
  dockLight.color.setHex(docking?0xff7050:0x40ff80);
  approachLad.forEach(g=>{ g.m.emissive.setHex(docking?0xff9040:0x35ff70); g.m.emissiveIntensity=0.6+2.4*Math.max(0,Math.sin(t*3 + g.i*0.7)); });
  if(state==='align'||state==='boom') camera.position.set((Math.random()-0.5)*shake*0.4,(Math.random()-0.5)*shake*0.4,0);
  Grade.uniforms.uTime.value=t;
  try{ composer.render(); }catch(err){ document.getElementById('title').textContent='RENDER ERR: '+(err&&err.message||err); }
}
function collarPulse(t){ ringLights.forEach(m=>{ m.emissive.setHex(0x35ff70); m.emissiveIntensity=2.6+Math.sin(t*5)*0.6; }); tgt.material.emissive.setHex(0x7dffb0); }
addEventListener('resize',resize); resize(); fadeIn(); animate();
</script>
</body>
