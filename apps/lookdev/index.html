<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SIGNAL LOST — look-dev harness</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #05070a;
        overflow: hidden;
      }
      #scene {
        display: block;
        width: 100vw;
        height: 100vh;
        /* PS1 internal-res crunch: the small render buffer upscales with nearest-neighbour. */
        image-rendering: pixelated;
      }
      #hud {
        position: fixed;
        top: 12px;
        left: 14px;
        max-width: calc(100vw - 28px);
        font: 12px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
        color: #5b7a93;
        letter-spacing: 0;
        pointer-events: none;
        text-shadow: 0 1px 2px #000;
      }
      #prompt {
        position: fixed;
        left: 50%;
        bottom: 104px;
        z-index: 2;
        transform: translateX(-50%);
        max-width: min(560px, calc(100vw - 36px));
        padding: 9px 13px;
        border: 1px solid rgba(143, 212, 238, 0.38);
        background: rgba(3, 8, 12, 0.74);
        color: #d8edf5;
        font: 13px/1.3 ui-monospace, SFMono-Regular, Menlo, monospace;
        letter-spacing: 0;
        text-align: center;
        text-transform: uppercase;
        text-shadow: 0 1px 2px #000;
        pointer-events: none;
        opacity: 0;
        transition: opacity 120ms ease-out;
      }
      #radioLine {
        position: fixed;
        left: 50%;
        bottom: 150px;
        z-index: 2;
        transform: translateX(-50%);
        max-width: min(720px, calc(100vw - 36px));
        padding: 8px 12px;
        border-left: 2px solid rgba(127, 210, 255, 0.55);
        background: rgba(2, 7, 10, 0.62);
        color: #9fd0ff;
        font: 12px/1.35 ui-monospace, SFMono-Regular, Menlo, monospace;
        letter-spacing: 0;
        text-align: center;
        text-transform: uppercase;
        text-shadow: 0 1px 2px #000;
        pointer-events: none;
        opacity: 0;
        transition: opacity 140ms ease-out;
      }
      #runMeters {
        position: fixed;
        left: 14px;
        bottom: 16px;
        width: min(340px, calc(100vw - 28px));
        display: grid;
        gap: 7px;
        padding: 10px 11px;
        box-sizing: border-box;
        border: 1px solid rgba(91, 122, 147, 0.28);
        background: rgba(3, 8, 12, 0.68);
        color: #8fb4c9;
        font: 11px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
        letter-spacing: 0;
        text-transform: uppercase;
        pointer-events: none;
      }
      .meterRow {
        display: grid;
        grid-template-columns: 74px 1fr;
        align-items: center;
        gap: 9px;
      }
      .meterTrack {
        height: 7px;
        background: rgba(255, 255, 255, 0.08);
        overflow: hidden;
      }
      .meterFill {
        display: block;
        height: 100%;
        width: 0;
        background: #7fd2ff;
        box-shadow: 0 0 10px rgba(127, 210, 255, 0.45);
      }
      #tensionFill {
        background: #d44d42;
        box-shadow: 0 0 12px rgba(212, 77, 66, 0.5);
      }
      #commsMeter {
        opacity: 0.35;
        transition: opacity 140ms ease-out;
      }
      #encounterFlash {
        position: fixed;
        inset: 0;
        background:
          repeating-linear-gradient(0deg, rgba(127, 210, 255, 0.08) 0 1px, rgba(0, 0, 0, 0) 1px 4px),
          radial-gradient(circle at center, rgba(127, 210, 255, 0.08), rgba(255, 95, 51, 0.12));
        mix-blend-mode: screen;
        pointer-events: none;
        opacity: 0;
        transition: opacity 80ms linear;
      }
      #damageFlash {
        position: fixed;
        inset: 0;
        z-index: 3;
        background:
          radial-gradient(circle at center, rgba(255, 40, 26, 0) 44%, rgba(255, 40, 26, 0.34) 100%),
          rgba(155, 0, 0, 0.08);
        mix-blend-mode: screen;
        pointer-events: none;
        opacity: 0;
        transition: opacity 80ms linear;
      }
      #endScreen {
        position: fixed;
        inset: 0;
        z-index: 5;
        display: grid;
        place-items: center;
        padding: 24px;
        box-sizing: border-box;
        background: rgba(3, 6, 10, 0.82);
        color: #d8edf5;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        text-align: center;
        pointer-events: none;
        opacity: 0;
        transition: opacity 160ms ease-out;
      }
      #endScreen.visible {
        opacity: 1;
        pointer-events: auto;
      }
      #endTitle {
        margin: 0 0 10px;
        font-size: clamp(28px, 7vw, 58px);
        line-height: 0.95;
        letter-spacing: 0;
        text-transform: uppercase;
      }
      #endDetail {
        margin: 0 auto 18px;
        max-width: 520px;
        color: #8fb4c9;
        font-size: 13px;
        line-height: 1.45;
        text-transform: uppercase;
      }
      #restartRun {
        height: 34px;
        padding: 0 16px;
        border: 1px solid rgba(143, 212, 238, 0.48);
        background: #081018;
        color: #d8edf5;
        font: 12px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
        letter-spacing: 0;
        text-transform: uppercase;
        cursor: pointer;
      }
      #restartRun:hover,
      #restartRun:focus-visible {
        border-color: rgba(188, 235, 255, 0.82);
        background: #10202c;
        outline: none;
      }
      #net {
        position: fixed;
        right: 14px;
        top: 12px;
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px;
        background: rgba(3, 6, 10, 0.72);
        border: 1px solid rgba(91, 122, 147, 0.35);
        font: 12px/1.2 ui-monospace, SFMono-Regular, Menlo, monospace;
        color: #8fb4c9;
      }
      #net button,
      #net input {
        height: 26px;
        border: 1px solid rgba(91, 122, 147, 0.45);
        background: #081018;
        color: #c1d8e5;
        font: inherit;
      }
      #net button {
        padding: 0 9px;
        cursor: pointer;
      }
      #net input {
        width: 66px;
        padding: 0 6px;
        text-transform: uppercase;
      }
      #netStatus {
        min-width: 150px;
        color: #5b7a93;
      }
      #netToggle {
        display: none;
      }
      @media (max-width: 680px) {
        #hud {
          right: 14px;
          font-size: 11px;
        }
        #net {
          top: auto;
          right: 8px;
          bottom: 8px;
          flex-wrap: wrap;
          justify-content: flex-start;
        }
        #netToggle {
          display: inline-flex;
          align-items: center;
          justify-content: center;
          min-width: 42px;
        }
        #net:not(.open) {
          gap: 0;
          padding: 0;
          background: transparent;
          border-color: transparent;
        }
        #net:not(.open) > :not(#netToggle) {
          display: none;
        }
        #net.open {
          left: 8px;
          padding: 6px;
          background: rgba(3, 6, 10, 0.72);
          border-color: rgba(91, 122, 147, 0.35);
        }
        #netStatus {
          flex-basis: 100%;
          min-width: 0;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="scene"></canvas>
    <div id="hud">SIGNAL LOST — booting renderer…</div>
    <div id="radioLine" aria-live="polite"></div>
    <div id="prompt"></div>
    <div id="runMeters">
      <div class="meterRow">
        <span>Tension</span>
        <span class="meterTrack"><i id="tensionFill" class="meterFill"></i></span>
      </div>
      <div id="commsMeter" class="meterRow">
        <span>Comms</span>
        <span class="meterTrack"><i id="commsFill" class="meterFill"></i></span>
      </div>
    </div>
    <div id="encounterFlash"></div>
    <div id="damageFlash"></div>
    <div id="endScreen" aria-live="polite">
      <div>
        <h1 id="endTitle"></h1>
        <p id="endDetail"></p>
        <button id="restartRun" type="button">Restart Run</button>
      </div>
    </div>
    <div id="net"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
