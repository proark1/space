<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SIGNAL LOST — look-dev harness</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #05070a;
        overflow: hidden;
      }
      #scene {
        display: block;
        width: 100vw;
        height: 100vh;
        /* PS1 internal-res crunch: the small render buffer upscales with nearest-neighbour. */
        image-rendering: pixelated;
      }
      #hud {
        position: fixed;
        top: 12px;
        left: 14px;
        max-width: calc(100vw - 28px);
        font: 12px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
        color: #5b7a93;
        letter-spacing: 0.04em;
        pointer-events: none;
        text-shadow: 0 1px 2px #000;
      }
      #net {
        position: fixed;
        right: 14px;
        top: 12px;
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px;
        background: rgba(3, 6, 10, 0.72);
        border: 1px solid rgba(91, 122, 147, 0.35);
        font: 12px/1.2 ui-monospace, SFMono-Regular, Menlo, monospace;
        color: #8fb4c9;
      }
      #net button,
      #net input {
        height: 26px;
        border: 1px solid rgba(91, 122, 147, 0.45);
        background: #081018;
        color: #c1d8e5;
        font: inherit;
      }
      #net button {
        padding: 0 9px;
        cursor: pointer;
      }
      #net input {
        width: 66px;
        padding: 0 6px;
        text-transform: uppercase;
      }
      #netStatus {
        min-width: 150px;
        color: #5b7a93;
      }
      #netToggle {
        display: none;
      }
      @media (max-width: 680px) {
        #hud {
          right: 14px;
          font-size: 11px;
        }
        #net {
          top: auto;
          right: 8px;
          bottom: 8px;
          flex-wrap: wrap;
          justify-content: flex-start;
        }
        #netToggle {
          display: inline-flex;
          align-items: center;
          justify-content: center;
          min-width: 42px;
        }
        #net:not(.open) {
          gap: 0;
          padding: 0;
          background: transparent;
          border-color: transparent;
        }
        #net:not(.open) > :not(#netToggle) {
          display: none;
        }
        #net.open {
          left: 8px;
          padding: 6px;
          background: rgba(3, 6, 10, 0.72);
          border-color: rgba(91, 122, 147, 0.35);
        }
        #netStatus {
          flex-basis: 100%;
          min-width: 0;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="scene"></canvas>
    <div id="hud">SIGNAL LOST — booting renderer…</div>
    <div id="net"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
